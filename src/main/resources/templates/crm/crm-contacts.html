<!DOCTYPE html>
<!--
  crm/crm-contacts.html    GET /crm/contacts
  JS prefix: ct*
  Customer filter dropdown, primary badge enforcement
-->
<html th:replace="~{layout/base :: layout('CRM Contacts', ~{::section})}" xmlns:th="http://www.thymeleaf.org">
<section>

  <ol class="breadcrumb float-xl-end">
    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Home</a></li>
    <li class="breadcrumb-item">CRM</li>
    <li class="breadcrumb-item active">Contacts</li>
  </ol>
  <h1 class="page-header">Contacts <small>customer contact directory</small></h1>

  <div class="d-flex gap-2 mb-3 flex-wrap">
    <a th:href="@{/crm/leads}"         class="btn btn-sm btn-outline-primary"><i class="fa fa-user-plus me-1"></i> Leads</a>
    <a th:href="@{/crm/opportunities}" class="btn btn-sm btn-outline-primary"><i class="fa fa-funnel-dollar me-1"></i> Opportunities</a>
    <a th:href="@{/crm/contacts}"      class="btn btn-sm btn-primary"><i class="fa fa-address-book me-1"></i> Contacts</a>
    <a th:href="@{/crm/activities}"    class="btn btn-sm btn-outline-primary"><i class="fa fa-calendar-check me-1"></i> Activities</a>
    <a th:href="@{/crm/feedback}"      class="btn btn-sm btn-outline-warning"><i class="fa fa-star-half-alt me-1"></i> Feedback</a>
  </div>

  <div class="panel panel-inverse">
    <div class="panel-heading">
      <div class="panel-title d-flex gap-2 align-items-center flex-wrap">
        <a href="javascript:;" onclick="ctOpenCreate()">
          <span class="badge btn btn-outline-success"><i class="fa fa-plus me-1"></i> New Contact</span>
        </a>
        <!-- Customer filter -->
        <div style="width:280px">
          <select id="ctCustomerFilter" class="form-select form-select-sm"></select>
        </div>
      </div>
      <div class="panel-heading-btn">
        <a href="javascript:;" class="btn btn-sm btn-icon btn-default" data-toggle="panel-expand"><i class="fa fa-expand"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-success" data-toggle="panel-reload"><i class="fa fa-redo"></i></a>
      </div>
    </div>
    <div class="panel-body">
      <table id="ctTable" width="100%" class="table table-striped table-bordered align-middle">
        <thead><tr>
          <th width="1%">SL</th><th>Name</th><th>Customer</th>
          <th>Designation</th><th>Department</th>
          <th>Email</th><th>Phone</th><th>WhatsApp</th>
          <th class="text-center">Primary</th>
          <th class="text-center">Status</th>
          <th class="text-center" width="15%">Actions</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- CREATE / EDIT MODAL -->
    <div tabindex="-1" id="ctModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="ctModalTitle"><i class="fa fa-address-book me-1 text-success"></i> New Contact</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="ctForm" novalidate>
            <div class="modal-body">
              <div class="hs-box">
                <input type="hidden" id="ctId">
                <div class="row g-2">
                  <!-- Customer S2 -->
                  <div class="col-md-12 view-group">
                    <select id="ctCustomerId" class="form-select hs_span_view"></select>
                    <label class="input-label">Customer</label>
                  </div>
                  <div class="col-md-4 view-group">
                    <input id="ctFirstName" type="text" class="form-control hs_span_view" required maxlength="100">
                    <label class="input-label">First Name <span class="text-danger">*</span></label>
                  </div>
                  <div class="col-md-4 view-group">
                    <input id="ctLastName" type="text" class="form-control hs_span_view" maxlength="100">
                    <label class="input-label">Last Name</label>
                  </div>
                  <div class="col-md-4 view-group">
                    <input id="ctDesignation" type="text" class="form-control hs_span_view" maxlength="100">
                    <label class="input-label">Designation</label>
                  </div>
                  <div class="col-md-4 view-group">
                    <input id="ctDepartment" type="text" class="form-control hs_span_view" maxlength="100">
                    <label class="input-label">Department</label>
                  </div>
                  <div class="col-md-4 view-group">
                    <input id="ctEmail" type="email" class="form-control hs_span_view" maxlength="100">
                    <label class="input-label">Email</label>
                  </div>
                  <div class="col-md-4 view-group">
                    <input id="ctPhone" type="text" class="form-control hs_span_view" maxlength="20">
                    <label class="input-label">Phone</label>
                  </div>
                  <div class="col-md-4 view-group">
                    <input id="ctMobile" type="text" class="form-control hs_span_view" maxlength="20">
                    <label class="input-label">Mobile</label>
                  </div>
                  <div class="col-md-4 view-group">
                    <input id="ctWhatsapp" type="text" class="form-control hs_span_view" maxlength="20">
                    <label class="input-label">WhatsApp</label>
                  </div>
                  <div class="col-md-4 d-flex gap-3 align-items-center mt-2">
                    <div class="form-check form-switch">
                      <input class="form-check-input" type="checkbox" id="ctPrimary">
                      <label class="form-check-label" for="ctPrimary">Primary Contact</label>
                    </div>
                    <div class="form-check form-switch">
                      <input class="form-check-input" type="checkbox" id="ctActive" checked>
                      <label class="form-check-label" for="ctActive">Active</label>
                    </div>
                  </div>
                  <div class="col-12 view-group">
                    <textarea id="ctNotes" class="form-control hs_span_view" rows="2" placeholder="Notes…"></textarea>
                    <label class="input-label">Notes</label>
                  </div>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-success" type="submit" id="ctSubmitBtn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="ctSpinner"></span>
                <span id="ctBtnText">Save</span>
              </button>
              <button type="button" class="btn btn-white" data-bs-dismiss="modal">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- VIEW MODAL -->
    <div tabindex="-1" id="ctViewModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header"><h5 class="modal-title"><i class="fa fa-address-book me-1 text-primary"></i> Contact Details</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
          <div class="modal-body" id="ctViewBody"></div>
          <div class="modal-footer"><button type="button" class="btn btn-white" data-bs-dismiss="modal">Close</button></div>
        </div>
      </div>
    </div>
  </div>

  <script th:inline="none">
  (function () {
    'use strict';
    const BASE = '/crm/contacts';
    const SUB_URL = '/accounts/sub-accounts/search';
    var dt;

    document.addEventListener('DOMContentLoaded', function () {
      // Customer filter S2 (outside modal)
      $('#ctCustomerFilter').select2({
        width: '100%', placeholder: '— Filter by Customer —', allowClear: true, minimumInputLength: 0,
        ajax: {
          url: SUB_URL, dataType: 'json', delay: 250,
          data: function(p){ return { search: p.term||'', subAccountType:'CUSTOMER', page: p.page||1 }; },
          processResults: function(data,p){ p.page=p.page||1; return { results:(data.items||[]).map(function(i){return{id:i.id,text:i.text};}), pagination:{more:data.hasMore||false} }; },
          cache: false
        }
      }).on('select2:select select2:clear', function(){ dt.ajax.reload(); });

      dt = $('#ctTable').DataTable({
        processing: true, serverSide: false, responsive: true, pageLength: 25,
        ajax: { url: BASE + '/list', type: 'GET', data: function(d){ var cid=$('#ctCustomerFilter').val(); if(cid) d.customerId=cid; } },
        columns: [
          { data: 'sl', orderable: false, width: '40px' },
          { data: 'full_name' }, { data: 'customer_name', defaultContent: '—' },
          { data: 'designation', defaultContent: '—' }, { data: 'department', defaultContent: '—' },
          { data: 'email', defaultContent: '—' }, { data: 'phone', defaultContent: '—' },
          { data: 'whatsapp', defaultContent: '—' },
          { data: 'primary_badge', orderable: false, className: 'text-center' },
          { data: 'status_badge',  orderable: false, className: 'text-center' },
          { data: 'actions',       orderable: false, className: 'text-center' }
        ],
        language: { emptyTable: 'No contacts.', processing: '<span class="spinner-border spinner-border-sm me-2"></span> Loading…' }
      });
      document.getElementById('ctForm').addEventListener('submit', _onSubmit);
      _initCustomerS2(null, null);
    });

    function _initCustomerS2(preId, preText) {
      var $el = $('#ctCustomerId');
      if ($el.hasClass('select2-hidden-accessible')) $el.select2('destroy');
      $el.select2({
        dropdownParent: $('#ctModal'), width: '100%',
        placeholder: '— Customer —', allowClear: true, minimumInputLength: 0,
        ajax: { url: SUB_URL, dataType: 'json', delay: 250,
          data: function(p){ return { search: p.term||'', subAccountType:'CUSTOMER', page: p.page||1 }; },
          processResults: function(data,p){ p.page=p.page||1; return { results:(data.items||[]).map(function(i){return{id:i.id,text:i.text};}), pagination:{more:data.hasMore||false} }; },
          cache: false },
        templateResult: function(r){ return r.text; }, templateSelection: function(r){ return r.text||r.id; }
      });
      if (preId) $el.append(new Option(preText||'', preId, true, true)).trigger('change');
    }

    window.ctOpenCreate = function() {
      _resetForm();
      document.getElementById('ctModalTitle').innerHTML = '<i class="fa fa-plus me-1 text-success"></i> New Contact';
      document.getElementById('ctBtnText').textContent  = 'Save';
      bootstrap.Modal.getOrCreateInstance(document.getElementById('ctModal')).show();
    };

    window.ctShow = function(id) {
      secureFetch(BASE + '/show/' + id).then(function(res) {
        if (!res.success) { Swal.fire('Error',res.message,'error'); return; }
        var o = res.obj.defaultData;
        var html = '<div class="hs-box"><div class="row g-2">'
          + _vf('Name', (o.firstName||'') + ' ' + (o.lastName||''))
          + _vf('Customer', o.customerDisplay||'—')
          + _vf('Designation', o.designation||'—') + _vf('Department', o.department||'—')
          + _vf('Email', o.email||'—') + _vf('Phone', o.phone||'—')
          + _vf('Mobile', o.mobile||'—') + _vf('WhatsApp', o.whatsapp||'—')
          + _vf('Primary', o.primary ? '<span class="badge bg-primary">Primary</span>' : 'No')
          + _vf('Active',  o.active  ? '<span class="badge bg-success">Active</span>'  : '<span class="badge bg-secondary">Inactive</span>')
          + _vf('Notes', o.notes||'—')
          + '</div></div>';
        document.getElementById('ctViewBody').innerHTML = html;
        bootstrap.Modal.getOrCreateInstance(document.getElementById('ctViewModal')).show();
      });
    };

    window.ctEdit = function(id) {
      secureFetch(BASE + '/show/' + id).then(function(res) {
        if (!res.success) { Swal.fire('Error',res.message,'error'); return; }
        var o = res.obj.defaultData; _resetForm();
        document.getElementById('ctId').value          = o.id;
        document.getElementById('ctFirstName').value   = o.firstName||'';
        document.getElementById('ctLastName').value    = o.lastName||'';
        document.getElementById('ctDesignation').value = o.designation||'';
        document.getElementById('ctDepartment').value  = o.department||'';
        document.getElementById('ctEmail').value       = o.email||'';
        document.getElementById('ctPhone').value       = o.phone||'';
        document.getElementById('ctMobile').value      = o.mobile||'';
        document.getElementById('ctWhatsapp').value    = o.whatsapp||'';
        document.getElementById('ctPrimary').checked   = o.primary === true;
        document.getElementById('ctActive').checked    = o.active !== false;
        document.getElementById('ctNotes').value       = o.notes||'';
        _initCustomerS2(o.customerId, o.customerDisplay);
        document.getElementById('ctModalTitle').innerHTML = '<i class="fa fa-pencil me-1 text-warning"></i> Edit Contact';
        document.getElementById('ctBtnText').textContent  = 'Update';
        bootstrap.Modal.getOrCreateInstance(document.getElementById('ctModal')).show();
      });
    };

    window.ctToggle = function(id) { hsChangeStatus(BASE + '/toggle/' + id, dt, 'Contact'); };
    window.ctDelete = function(id) { hsConfirmDelete(BASE + '/delete/' + id, dt); };

    function _onSubmit(e) {
      e.preventDefault();
      var sb=document.getElementById('ctSubmitBtn'),sp=document.getElementById('ctSpinner'),bt=document.getElementById('ctBtnText');
      hsDisableButton(sb,sp,bt);
      secureFetch(BASE + '/save', { method:'POST', body: JSON.stringify({
        id          : document.getElementById('ctId').value||null,
        customerId  : $('#ctCustomerId').val()||null,
        firstName   : document.getElementById('ctFirstName').value,
        lastName    : document.getElementById('ctLastName').value||null,
        designation : document.getElementById('ctDesignation').value||null,
        department  : document.getElementById('ctDepartment').value||null,
        email       : document.getElementById('ctEmail').value||null,
        phone       : document.getElementById('ctPhone').value||null,
        mobile      : document.getElementById('ctMobile').value||null,
        whatsapp    : document.getElementById('ctWhatsapp').value||null,
        primary     : document.getElementById('ctPrimary').checked,
        active      : document.getElementById('ctActive').checked,
        notes       : document.getElementById('ctNotes').value||null
      })}).then(function(d){
        if (d.success) { hsAfterSaveMessages(d,dt); bootstrap.Modal.getOrCreateInstance(document.getElementById('ctModal')).hide(); }
        else { Swal.fire('Error',d.message,'error'); }
      }).catch(function(err){ Swal.fire('Error',err.message||'Request failed.','error'); })
        .finally(function(){ hsEnableButton(sb,sp,bt); });
    }

    function _resetForm() {
      if ($('#ctCustomerId').hasClass('select2-hidden-accessible')) $('#ctCustomerId').select2('destroy');
      document.getElementById('ctForm').reset();
      document.getElementById('ctId').value = '';
      document.getElementById('ctActive').checked = true;
      _initCustomerS2(null,null);
    }

    function _vf(label,value){ return '<div class="col-md-4 view-group"><label class="view-label">'+label+'</label><span class="form-control hs_span_show">'+(value!=null?value:'—')+'</span></div>'; }
  })();
  </script>
</section>
</html>
