<!DOCTYPE html>
<!--
  crm/crm-leads.html    GET /crm/leads
  JS prefix: lead*
  Status filter dropdown, Convert → Opportunity cascade
-->
<html th:replace="~{layout/base :: layout('CRM Leads', ~{::section})}" xmlns:th="http://www.thymeleaf.org">
<section>

  <ol class="breadcrumb float-xl-end">
    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Home</a></li>
    <li class="breadcrumb-item">CRM</li>
    <li class="breadcrumb-item active">Leads</li>
  </ol>
  <h1 class="page-header">Leads <small>track prospective customers</small></h1>

  <div class="d-flex gap-2 mb-3 flex-wrap">
    <a th:href="@{/crm/leads}"         class="btn btn-sm btn-primary"><i class="fa fa-user-plus me-1"></i> Leads</a>
    <a th:href="@{/crm/opportunities}" class="btn btn-sm btn-outline-primary"><i class="fa fa-funnel-dollar me-1"></i> Opportunities</a>
    <a th:href="@{/crm/contacts}"      class="btn btn-sm btn-outline-primary"><i class="fa fa-address-book me-1"></i> Contacts</a>
    <a th:href="@{/crm/activities}"    class="btn btn-sm btn-outline-primary"><i class="fa fa-calendar-check me-1"></i> Activities</a>
    <a th:href="@{/crm/feedback}"      class="btn btn-sm btn-outline-warning"><i class="fa fa-star-half-alt me-1"></i> Feedback</a>
  </div>

  <div class="panel panel-inverse">
    <div class="panel-heading">
      <div class="panel-title d-flex gap-2 align-items-center flex-wrap">
        <a href="javascript:;" onclick="leadOpenCreate()">
          <span class="badge btn btn-outline-success"><i class="fa fa-plus me-1"></i> New Lead</span>
        </a>
        <select id="leadStatusFilter" class="form-select form-select-sm" style="width:160px" onchange="_leadReload()">
          <option value="">All Status</option>
          <option value="NEW">New</option>
          <option value="CONTACTED">Contacted</option>
          <option value="QUALIFIED">Qualified</option>
          <option value="UNQUALIFIED">Unqualified</option>
          <option value="CONVERTED">Converted</option>
          <option value="LOST">Lost</option>
          <option value="DORMANT">Dormant</option>
        </select>
      </div>
      <div class="panel-heading-btn">
        <a href="javascript:;" class="btn btn-sm btn-icon btn-default" data-toggle="panel-expand"><i class="fa fa-expand"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-success" data-toggle="panel-reload"><i class="fa fa-redo"></i></a>
      </div>
    </div>
    <div class="panel-body">
      <table id="leadTable" width="100%" class="table table-striped table-bordered align-middle">
        <thead><tr>
          <th width="1%">SL</th><th>Lead No</th><th>Company</th>
          <th>Contact</th><th>Phone</th><th>Source</th>
          <th>Country</th><th>Product Interest</th>
          <th>Assigned To</th><th class="text-center">Status</th>
          <th class="text-center" width="16%">Actions</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- CREATE / EDIT MODAL -->
    <div tabindex="-1" id="leadModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="leadModalTitle"><i class="fa fa-user-plus me-1 text-success"></i> New Lead</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="leadForm" novalidate>
            <div class="modal-body">
              <div class="hs-box">
                <input type="hidden" id="leadId">
                <div class="row g-2 mb-2">
                  <div class="col-md-3 view-group">
                    <input id="leadNo" type="text" class="form-control hs_span_view bg-light" readonly placeholder="Auto">
                    <label class="input-label">Lead No</label>
                  </div>
                  <div class="col-md-3 view-group">
                    <input id="leadContactName" type="text" class="form-control hs_span_view" required maxlength="200">
                    <label class="input-label">Contact Name <span class="text-danger">*</span></label>
                  </div>
                  <div class="col-md-3 view-group">
                    <input id="leadCompany" type="text" class="form-control hs_span_view" maxlength="200">
                    <label class="input-label">Company</label>
                  </div>
                  <div class="col-md-3 view-group">
                    <input id="leadDesignation" type="text" class="form-control hs_span_view" maxlength="100">
                    <label class="input-label">Designation</label>
                  </div>
                  <div class="col-md-3 view-group">
                    <input id="leadEmail" type="email" class="form-control hs_span_view" maxlength="100">
                    <label class="input-label">Email</label>
                  </div>
                  <div class="col-md-3 view-group">
                    <input id="leadPhone" type="text" class="form-control hs_span_view" maxlength="20">
                    <label class="input-label">Phone</label>
                  </div>
                  <div class="col-md-3 view-group">
                    <input id="leadCountry" type="text" class="form-control hs_span_view" maxlength="100">
                    <label class="input-label">Country</label>
                  </div>
                  <div class="col-md-3 view-group">
                    <input id="leadCity" type="text" class="form-control hs_span_view" maxlength="100">
                    <label class="input-label">City</label>
                  </div>
                  <div class="col-md-3 view-group">
                    <select id="leadSource" class="form-select hs_span_view">
                      <option value="">— Select Source —</option>
                      <option value="WEBSITE">Website</option>
                      <option value="REFERRAL">Referral</option>
                      <option value="EXHIBITION">Exhibition / Fair</option>
                      <option value="COLD_CALL">Cold Call</option>
                      <option value="EMAIL_CAMPAIGN">Email Campaign</option>
                      <option value="SOCIAL_MEDIA">Social Media</option>
                      <option value="AGENT">Agent</option>
                      <option value="WALK_IN">Walk-in</option>
                      <option value="OTHER">Other</option>
                    </select>
                    <label class="input-label">Source</label>
                  </div>
                  <div class="col-md-3 view-group">
                    <select id="leadType" class="form-select hs_span_view">
                      <option value="B2B">B2B</option>
                      <option value="B2C">B2C</option>
                      <option value="EXPORT">Export</option>
                      <option value="DOMESTIC">Domestic</option>
                    </select>
                    <label class="input-label">Lead Type</label>
                  </div>
                  <div class="col-md-3 view-group">
                    <select id="leadStatus" class="form-select hs_span_view">
                      <option value="NEW">New</option>
                      <option value="CONTACTED">Contacted</option>
                      <option value="QUALIFIED">Qualified</option>
                      <option value="UNQUALIFIED">Unqualified</option>
                      <option value="LOST">Lost</option>
                      <option value="DORMANT">Dormant</option>
                    </select>
                    <label class="input-label">Status</label>
                  </div>
                  <div class="col-md-3 view-group">
                    <input id="leadQtyKg" type="number" step="0.01" class="form-control hs_span_view text-end" placeholder="0.00">
                    <label class="input-label">Est. Qty (KG)</label>
                  </div>
                  <!-- Assigned To AJAX S2 -->
                  <div class="col-md-6 view-group">
                    <select id="leadAssignedTo" class="form-select hs_span_view"></select>
                    <label class="input-label">Assigned To</label>
                  </div>
                  <div class="col-12 view-group">
                    <textarea id="leadProductInterest" class="form-control hs_span_view" rows="2" placeholder="Product / yarn count / blend interest…"></textarea>
                    <label class="input-label">Product Interest</label>
                  </div>
                  <div class="col-12 view-group">
                    <textarea id="leadRemarks" class="form-control hs_span_view" rows="1" placeholder="Remarks…"></textarea>
                    <label class="input-label">Remarks</label>
                  </div>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-success" type="submit" id="leadSubmitBtn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="leadSpinner"></span>
                <span id="leadBtnText">Save</span>
              </button>
              <button type="button" class="btn btn-white" data-bs-dismiss="modal">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- VIEW MODAL -->
    <div tabindex="-1" id="leadViewModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header"><h5 class="modal-title"><i class="fa fa-user-plus me-1 text-primary"></i> Lead Details</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
          <div class="modal-body" id="leadViewBody"></div>
          <div class="modal-footer"><button type="button" class="btn btn-white" data-bs-dismiss="modal">Close</button></div>
        </div>
      </div>
    </div>

    <!-- QUICK ACTIVITY MODAL (from lead row) -->
    <div tabindex="-1" id="leadActModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header"><h5 class="modal-title"><i class="fa fa-calendar-plus me-1 text-primary"></i> Log Activity for Lead</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
          <form id="leadActForm" novalidate>
            <div class="modal-body">
              <input type="hidden" id="actLeadId">
              <div class="row g-2">
                <div class="col-md-4 view-group">
                  <select id="actTypeFromLead" class="form-select hs_span_view" required>
                    <option value="">— Type —</option>
                    <option value="CALL">Call</option><option value="EMAIL">Email</option>
                    <option value="MEETING">Meeting</option><option value="VISIT">Visit</option>
                    <option value="SAMPLE_SENT">Sample Sent</option><option value="FOLLOW_UP">Follow Up</option>
                    <option value="NOTE">Note</option><option value="OTHER">Other</option>
                  </select>
                  <label class="input-label">Type <span class="text-danger">*</span></label>
                </div>
                <div class="col-md-4 view-group">
                  <input id="actDateFromLead" type="date" class="form-control hs_span_view" required>
                  <label class="input-label">Date <span class="text-danger">*</span></label>
                </div>
                <div class="col-md-4 view-group">
                  <input id="actDurFromLead" type="number" class="form-control hs_span_view text-end" placeholder="Minutes">
                  <label class="input-label">Duration (min)</label>
                </div>
                <div class="col-12 view-group">
                  <input id="actSubjectFromLead" type="text" class="form-control hs_span_view" required maxlength="200" placeholder="Subject…">
                  <label class="input-label">Subject <span class="text-danger">*</span></label>
                </div>
                <div class="col-12 view-group">
                  <textarea id="actDescFromLead" class="form-control hs_span_view" rows="2" placeholder="Details…"></textarea>
                  <label class="input-label">Description</label>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-primary" type="submit" id="leadActSubmitBtn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="leadActSpinner"></span> Log Activity
              </button>
              <button type="button" class="btn btn-white" data-bs-dismiss="modal">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script th:inline="none">
  (function () {
    'use strict';
    const BASE = '/crm/leads', ACT_BASE = '/crm/activities';
    const SUB_URL = '/accounts/sub-accounts/search';
    var dt;

    document.addEventListener('DOMContentLoaded', function () {
      dt = $('#leadTable').DataTable({
        processing: true, serverSide: false, responsive: true, pageLength: 25,
        ajax: { url: BASE + '/list', type: 'GET', data: function(d){ d.status = document.getElementById('leadStatusFilter').value||''; } },
        columns: [
          { data: 'sl', orderable: false, width: '40px' },
          { data: 'lead_no' }, { data: 'company_name', defaultContent: '—' },
          { data: 'contact_name' }, { data: 'contact_phone', defaultContent: '—' },
          { data: 'source', defaultContent: '—' }, { data: 'country', defaultContent: '—' },
          { data: 'product_interest', defaultContent: '—' },
          { data: 'assigned_to', defaultContent: '—' },
          { data: 'status_badge', orderable: false, className: 'text-center' },
          { data: 'actions', orderable: false, className: 'text-center' }
        ],
        language: { emptyTable: 'No leads.', processing: '<span class="spinner-border spinner-border-sm me-2"></span> Loading…' }
      });
      document.getElementById('leadForm').addEventListener('submit', _onSubmit);
      document.getElementById('leadActForm').addEventListener('submit', _onActSubmit);
      document.getElementById('actDateFromLead').value = new Date().toISOString().substring(0,10);
      _initAssignedS2(null, null);
    });

    window._leadReload = function() { dt.ajax.reload(); };

    function _initAssignedS2(preId, preText) {
      var $el = $('#leadAssignedTo');
      if ($el.hasClass('select2-hidden-accessible')) $el.select2('destroy');
      $el.select2({
        dropdownParent: $('#leadModal'), width: '100%',
        placeholder: '— Assign User —', allowClear: true, minimumInputLength: 0,
        ajax: {
          url: '/users/search', dataType: 'json', delay: 250,
          data: function(p){ return { search: p.term||'', page: p.page||1 }; },
          processResults: function(data,p){ p.page=p.page||1; return { results:(data.items||[]).map(function(i){return{id:i.id,text:i.text};}), pagination:{more:data.hasMore||false} }; },
          cache: true
        },
        templateResult: function(r){ return r.text; }, templateSelection: function(r){ return r.text||r.id; }
      });
      if (preId) $el.append(new Option(preText||'', preId, true, true)).trigger('change');
    }

    window.leadOpenCreate = function() {
      _resetForm();
      document.getElementById('leadModalTitle').innerHTML = '<i class="fa fa-plus me-1 text-success"></i> New Lead';
      document.getElementById('leadBtnText').textContent  = 'Save';
      bootstrap.Modal.getOrCreateInstance(document.getElementById('leadModal')).show();
    };

    window.leadShow = function(id) {
      secureFetch(BASE + '/show/' + id).then(function(res) {
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var o = res.obj.defaultData;
        var html = '<div class="hs-box"><div class="row g-2">'
          + _vf('Lead No', o.leadNo) + _vf('Company', o.companyName||'—')
          + _vf('Contact', o.contactName) + _vf('Designation', o.designation||'—')
          + _vf('Email', o.contactEmail||'—') + _vf('Phone', o.contactPhone||'—')
          + _vf('Country', o.country||'—') + _vf('City', o.city||'—')
          + _vf('Source', o.source||'—') + _vf('Type', o.leadType||'—')
          + _vf('Status', o.status) + _vf('Est. Qty (KG)', o.estimatedQtyKg||'—')
          + _vf('Assigned', o.assignedToDisplay||'—')
          + _vf('Product Interest', o.productInterest||'—')
          + _vf('Remarks', o.remarks||'—')
          + '</div></div>';
        document.getElementById('leadViewBody').innerHTML = html;
        bootstrap.Modal.getOrCreateInstance(document.getElementById('leadViewModal')).show();
      });
    };

    window.leadEdit = function(id) {
      secureFetch(BASE + '/show/' + id).then(function(res) {
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var o = res.obj.defaultData;
        _resetForm();
        document.getElementById('leadId').value             = o.id;
        document.getElementById('leadNo').value             = o.leadNo||'';
        document.getElementById('leadContactName').value   = o.contactName||'';
        document.getElementById('leadCompany').value        = o.companyName||'';
        document.getElementById('leadDesignation').value   = o.designation||'';
        document.getElementById('leadEmail').value          = o.contactEmail||'';
        document.getElementById('leadPhone').value          = o.contactPhone||'';
        document.getElementById('leadCountry').value        = o.country||'';
        document.getElementById('leadCity').value           = o.city||'';
        document.getElementById('leadSource').value         = o.source||'';
        document.getElementById('leadType').value           = o.leadType||'B2B';
        document.getElementById('leadStatus').value         = o.status||'NEW';
        document.getElementById('leadQtyKg').value          = o.estimatedQtyKg||'';
        document.getElementById('leadProductInterest').value= o.productInterest||'';
        document.getElementById('leadRemarks').value        = o.remarks||'';
        _initAssignedS2(o.assignedToId, o.assignedToDisplay);
        document.getElementById('leadModalTitle').innerHTML = '<i class="fa fa-pencil me-1 text-warning"></i> Edit Lead';
        document.getElementById('leadBtnText').textContent  = 'Update';
        bootstrap.Modal.getOrCreateInstance(document.getElementById('leadModal')).show();
      });
    };

    window.leadActivity = function(id) {
      document.getElementById('actLeadId').value = id;
      document.getElementById('leadActForm').reset();
      document.getElementById('actDateFromLead').value = new Date().toISOString().substring(0,10);
      bootstrap.Modal.getOrCreateInstance(document.getElementById('leadActModal')).show();
    };

    window.leadConvert = function(id) {
      Swal.fire({ title:'Convert to Opportunity?', text:'A new Opportunity will be created linked to this lead.',
        icon:'question', showCancelButton:true, confirmButtonText:'Convert' })
        .then(function(r){ if (!r.isConfirmed) return;
          secureFetch(BASE + '/status/' + id + '?status=CONVERTED', { method:'POST' }).then(function(d){
            if (d.success) {
              Swal.fire({ icon:'success', title:'Converted!', text:'Update status to CONVERTED. Create an Opportunity to continue.', timer:2000, showConfirmButton:false });
              dt.ajax.reload(null,false);
            } else { Swal.fire('Error',d.message,'error'); }
          });
        });
    };

    window.leadDelete = function(id) { hsConfirmDelete(BASE + '/delete/' + id, dt); };

    function _onSubmit(e) {
      e.preventDefault();
      var sb=document.getElementById('leadSubmitBtn'),sp=document.getElementById('leadSpinner'),bt=document.getElementById('leadBtnText');
      hsDisableButton(sb,sp,bt);
      secureFetch(BASE + '/save', { method:'POST', body: JSON.stringify({
        id              : document.getElementById('leadId').value||null,
        contactName     : document.getElementById('leadContactName').value,
        companyName     : document.getElementById('leadCompany').value||null,
        designation     : document.getElementById('leadDesignation').value||null,
        contactEmail    : document.getElementById('leadEmail').value||null,
        contactPhone    : document.getElementById('leadPhone').value||null,
        country         : document.getElementById('leadCountry').value||null,
        city            : document.getElementById('leadCity').value||null,
        source          : document.getElementById('leadSource').value||null,
        leadType        : document.getElementById('leadType').value||'B2B',
        status          : document.getElementById('leadStatus').value||'NEW',
        estimatedQtyKg  : parseFloat(document.getElementById('leadQtyKg').value)||null,
        assignedToId    : $('#leadAssignedTo').val()||null,
        productInterest : document.getElementById('leadProductInterest').value||null,
        remarks         : document.getElementById('leadRemarks').value||null
      })}).then(function(d){
        if (d.success) { hsAfterSaveMessages(d,dt); bootstrap.Modal.getOrCreateInstance(document.getElementById('leadModal')).hide(); }
        else { Swal.fire('Error',d.message,'error'); }
      }).catch(function(err){ Swal.fire('Error',err.message||'Request failed.','error'); })
        .finally(function(){ hsEnableButton(sb,sp,bt); });
    }

    function _onActSubmit(e) {
      e.preventDefault();
      var sb=document.getElementById('leadActSubmitBtn'),sp=document.getElementById('leadActSpinner');
      hsDisableButton(sb,sp,null);
      secureFetch(ACT_BASE + '/save', { method:'POST', body: JSON.stringify({
        leadId          : document.getElementById('actLeadId').value||null,
        activityType    : document.getElementById('actTypeFromLead').value,
        activityDate    : document.getElementById('actDateFromLead').value,
        durationMinutes : parseInt(document.getElementById('actDurFromLead').value)||null,
        subject         : document.getElementById('actSubjectFromLead').value,
        description     : document.getElementById('actDescFromLead').value||null,
        status          : 'PLANNED'
      })}).then(function(d){
        if (d.success) { Swal.fire({ icon:'success', title:'Activity Logged!', text:d.message, timer:1600, showConfirmButton:false }); bootstrap.Modal.getOrCreateInstance(document.getElementById('leadActModal')).hide(); }
        else { Swal.fire('Error',d.message,'error'); }
      }).catch(function(err){ Swal.fire('Error',err.message||'Request failed.','error'); })
        .finally(function(){ hsEnableButton(sb,sp,null); });
    }

    function _resetForm() {
      if ($('#leadAssignedTo').hasClass('select2-hidden-accessible')) $('#leadAssignedTo').select2('destroy');
      document.getElementById('leadForm').reset();
      document.getElementById('leadId').value = '';
      _initAssignedS2(null,null);
    }

    function _vf(label,value){ return '<div class="col-md-4 view-group"><label class="view-label">'+label+'</label><span class="form-control hs_span_show">'+(value!=null?value:'—')+'</span></div>'; }
  })();
  </script>
</section>
</html>
