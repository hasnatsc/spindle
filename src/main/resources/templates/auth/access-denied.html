<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 Access Denied — Spindle ERP</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap"
        rel="stylesheet">
  <style>
    :root {
      --accent: #00c8ff; --accent2: #7c3aed;
      --red: #f43f5e; --transition: 0.22s ease;
    }
    [data-theme="dark"]  { --bg: #0b0f1c; --surface: #111827; --surface2: #182033; --border: rgba(255,255,255,.07); --text: #e2e8f0; --text2: #94a3b8; }
    [data-theme="light"] { --bg: #f0f4f9; --surface: #fff;     --surface2: #f1f5fb; --border: rgba(0,0,0,.08);         --text: #0f172a; --text2: #4e5a6b; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
    .wrap {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 24px;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 48px 40px;
      text-align: center; max-width: 440px; width: 100%;
    }
    .big-num {
      font-size: 72px; font-weight: 800;
      background: linear-gradient(135deg, var(--red), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1; margin-bottom: 12px;
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    p  { font-size: 12px; color: var(--text2); line-height: 1.7; margin-bottom: 28px; }
    .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 20px; border-radius: 8px;
      font-size: 12px; font-weight: 600; font-family: 'DM Sans', sans-serif;
      cursor: pointer; border: 1px solid var(--border);
      text-decoration: none; transition: opacity .18s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent; color: #fff;
    }
    .btn-secondary { background: var(--surface2); color: var(--text2); }
    .btn:hover { opacity: .8; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="big-num">403</div>
    <h1>Access Denied</h1>
    <p>
      You don't have permission to access this page.<br>
      Contact your administrator if you think this is a mistake.
    </p>
    <div class="btn-group">
      <a th:href="@{/dashboard}" class="btn btn-primary">🏠 Dashboard</a>
      <a href="javascript:history.back()" class="btn btn-secondary">← Go Back</a>
    </div>
  </div>
</div>
<script>
  const saved = localStorage.getItem('spindleTheme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
</script>
</body>
</html>
