<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════════╗
  ║  fragments/breadcrumb.html                                            ║
  ║  Path: src/main/resources/templates/fragments/breadcrumb.html       ║
  ║                                                                       ║
  ║  Three breadcrumb / page-header variants                             ║
  ║                                                                       ║
  ║  ── Variant 1 ── pageHeader(module, page, description)              ║
  ║    Three strings → Color Admin .page-header block                   ║
  ║    Usage:                                                             ║
  ║      <div th:replace="~{fragments/breadcrumb                         ║
  ║           :: pageHeader('Security','Users','Manage users')}">        ║
  ║      </div>                                                           ║
  ║                                                                       ║
  ║  ── Variant 2 ── breadcrumb(items)                                  ║
  ║    List<BreadcrumbItem> — each has label + url (nullable)           ║
  ║    Usage:                                                             ║
  ║      <div th:replace="~{fragments/breadcrumb                         ║
  ║           :: breadcrumb(${breadcrumbItems})}">                       ║
  ║      </div>                                                           ║
  ║                                                                       ║
  ║  ── Variant 3 ── breadcrumbWithIcons(items)                         ║
  ║    Same as variant 2 but BreadcrumbItem also has icon (nullable)    ║
  ║                                                                       ║
  ║  FIXES:                                                               ║
  ║  1. th:with inside pageHeader introduced local vars mod/pg/desc      ║
  ║     that shadowed the fragment params in Thymeleaf 3.x, causing     ║
  ║     TemplateProcessingException. Fixed: use params directly.        ║
  ║  2. th:classappend="${stat.last} ? 'active'" — the ternary must     ║
  ║     have an else branch or Thymeleaf appends null literally.        ║
  ║     Fixed: added : '' (empty string else).                          ║
  ║  3. th:attrappend for aria-current had same null-value issue.       ║
  ║     Fixed: use th:attr with conditional expression.                 ║
  ╚══════════════════════════════════════════════════════════════════════╝
-->
<!-- ══════════════════════════════════════════════════════════════════
     VARIANT 1  —  pageHeader(module, page, description)
     Most common. Three plain strings, no list in the controller needed.
══════════════════════════════════════════════════════════════════ -->
<div th:fragment="pageHeader(module, page, description)">
  <div class="page-header">
    <div class="page-header-content d-flex align-items-center
                justify-content-between flex-wrap gap-2">

      <!-- Left: title + lead -->
      <div>
        <h1 class="page-header-title mb-0" th:text="${page}">Page</h1>
        <!-- ✅ FIX #1: use param directly, not th:with shadow var -->
        <p class="page-header-lead mb-0 text-muted fs-13px"
           th:if="${description != null and !#strings.isEmpty(description)}"
           th:text="${description}">Description</p>
      </div>

      <!-- Right: breadcrumb -->
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item">
            <a th:href="@{/dashboard}">
              <i class="fa fa-home me-1"></i>Home
            </a>
          </li>
          <li class="breadcrumb-item"
              th:if="${module != null and !#strings.isEmpty(module)}"
              th:text="${module}">Module</li>
          <li class="breadcrumb-item active" aria-current="page"
              th:text="${page}">Page</li>
        </ol>
      </nav>

    </div>
  </div>
</div>


<!-- ══════════════════════════════════════════════════════════════════
     VARIANT 2  —  breadcrumb(items)
     items = List<BreadcrumbItem>
     BreadcrumbItem fields: label (String), url (String, nullable)
     Last item is always plain text (active).
══════════════════════════════════════════════════════════════════ -->
<div th:fragment="breadcrumb(items)">
  <div class="page-header">
    <div class="page-header-content d-flex align-items-center justify-content-end">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0">
          <!-- Home always first -->
          <li class="breadcrumb-item">
            <a th:href="@{/dashboard}">
              <i class="fa fa-home me-1"></i>Home
            </a>
          </li>
          <!-- Dynamic items -->
          <th:block th:each="item, stat : ${items}">
            <!--
              ✅ FIX #2: th:classappend must have : '' else branch
              ✅ FIX #3: aria-current via th:attr (avoids null literal)
            -->
            <li class="breadcrumb-item"
                th:classappend="${stat.last} ? 'active' : ''"
                th:attr="aria-current=${stat.last} ? 'page' : null">
              <!-- Linked: not last AND has URL -->
              <a th:if="${!stat.last and item.url != null}"
                 th:href="${item.url}"
                 th:text="${item.label}">Label</a>
              <!-- Plain text: last OR no URL -->
              <span th:if="${stat.last or item.url == null}"
                    th:text="${item.label}">Label</span>
            </li>
          </th:block>
        </ol>
      </nav>
    </div>
  </div>
</div>


<!-- ══════════════════════════════════════════════════════════════════
     VARIANT 3  —  breadcrumbWithIcons(items)
     items = List<BreadcrumbItem>
     BreadcrumbItem fields: label, url (nullable), icon (nullable FA class)
══════════════════════════════════════════════════════════════════ -->
<div th:fragment="breadcrumbWithIcons(items)">
  <div class="page-header">
    <div class="page-header-content d-flex align-items-center justify-content-end">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item">
            <a th:href="@{/dashboard}">
              <i class="fa fa-home me-1"></i>Home
            </a>
          </li>
          <th:block th:each="item, stat : ${items}">
            <li class="breadcrumb-item"
                th:classappend="${stat.last} ? 'active' : ''"
                th:attr="aria-current=${stat.last} ? 'page' : null">
              <!-- Linked item -->
              <a th:if="${!stat.last and item.url != null}"
                 th:href="${item.url}">
                <i th:if="${item.icon != null}"
                   th:class="${'fa ' + item.icon + ' me-1'}"></i>
                <span th:text="${item.label}">Label</span>
              </a>
              <!-- Plain text item -->
              <span th:if="${stat.last or item.url == null}">
                <i th:if="${item.icon != null}"
                   th:class="${'fa ' + item.icon + ' me-1'}"></i>
                <span th:text="${item.label}">Label</span>
              </span>
            </li>
          </th:block>
        </ol>
      </nav>
    </div>
  </div>
</div>
