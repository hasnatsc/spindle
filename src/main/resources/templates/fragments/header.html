<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════════╗
  ║  fragments/header.html                                                ║
  ║  Path: src/main/resources/templates/fragments/header.html           ║
  ║                                                                       ║
  ║  NOTE: This is the LEGACY sidebar-layout header (app-header).       ║
  ║  For the top-menu layout used by layout/base.html, use             ║
  ║  fragments/topMenuHeader.html instead.                              ║
  ║                                                                       ║
  ║  Fragment : header                                                    ║
  ║  Usage    : <div th:replace="~{fragments/header :: header}"></div>  ║
  ║                                                                       ║
  ║  FIXES over uploaded version:                                         ║
  ║  1. Brand link changed from /templates/static to /dashboard         ║
  ║  2. Brand name updated to "Optimum ERP"                             ║
  ║  3. Logout form uses th:action="@{/logout}" (not hardcoded path)    ║
  ║  4. CSRF uses th:name="${_csrf.parameterName}" (not th:name="_csrf")║
  ║     — matches Spring Security's actual parameter name               ║
  ║  5. User avatar/name made dynamic via Thymeleaf Security dialect    ║
  ║  6. Notification badge hardcode (5) left in — replace with         ║
  ║     server-side ${notifCount} when notification module is ready.    ║
  ╚══════════════════════════════════════════════════════════════════════╝
-->
<header th:fragment="header" id="header" class="app-header">

  <!-- ── Brand ──────────────────────────────────────────────────────── -->
  <div class="navbar-header">
    <!-- ✅ FIX #1 #2: correct URL + correct brand name -->
    <a th:href="@{/dashboard}" class="navbar-brand">
      <span class="navbar-logo"></span>
      <b class="me-3px">Optimum</b> ERP
    </a>
    <!-- Mobile toggler for sidebar -->
    <button type="button" class="navbar-mobile-toggler"
            data-toggle="app-sidebar-mobile">
      <span class="icon-bar"></span>
      <span class="icon-bar"></span>
      <span class="icon-bar"></span>
    </button>
  </div>

  <!-- ── Nav items ──────────────────────────────────────────────────── -->
  <div class="navbar-nav">

    <!-- Search -->
    <div class="navbar-item navbar-form">
      <form action="" method="GET" name="search" role="search">
        <div class="form-group mb-0">
          <input type="text" class="form-control"
                 placeholder="Search…" aria-label="Search">
          <button type="submit" class="btn btn-search">
            <i class="fa fa-search"></i>
          </button>
        </div>
      </form>
    </div>

    <!-- Notifications -->
    <div class="navbar-item dropdown">
      <a href="#" data-bs-toggle="dropdown"
         class="navbar-link dropdown-toggle icon" aria-label="Notifications">
        <i class="fa fa-bell"></i>
        <span class="badge">5</span>
      </a>
      <div class="dropdown-menu media-list dropdown-menu-end">
        <div class="dropdown-header">NOTIFICATIONS (5)</div>

        <a href="javascript:;" class="dropdown-item media">
          <div class="media-left">
            <i class="fa fa-bug media-object bg-gray-500"></i>
          </div>
          <div class="media-body">
            <h6 class="media-heading">
              Server Error Reports
              <i class="fa fa-exclamation-circle text-danger"></i>
            </h6>
            <div class="text-muted fs-10px">3 minutes ago</div>
          </div>
        </a>

        <a href="javascript:;" class="dropdown-item media">
          <div class="media-left">
            <img th:src="@{/img/user/user-1.jpg}" alt="user" class="logo-sm">
            <i class="fab fa-facebook-messenger text-blue media-object-icon"></i>
          </div>
          <div class="media-body">
            <h6 class="media-heading">John Smith</h6>
            <p>Quisque pulvinar tellus sit amet sem scelerisque tincidunt.</p>
            <div class="text-muted fs-10px">25 minutes ago</div>
          </div>
        </a>

        <a href="javascript:;" class="dropdown-item media">
          <div class="media-left">
            <i class="fa fa-plus media-object bg-gray-500"></i>
          </div>
          <div class="media-body">
            <h6 class="media-heading">New User Registered</h6>
            <div class="text-muted fs-10px">1 hour ago</div>
          </div>
        </a>

        <a href="javascript:;" class="dropdown-item media">
          <div class="media-left">
            <i class="fa fa-envelope media-object bg-gray-500"></i>
            <i class="fab fa-google text-warning media-object-icon fs-14px"></i>
          </div>
          <div class="media-body">
            <h6 class="media-heading">New Email From John</h6>
            <div class="text-muted fs-10px">2 hours ago</div>
          </div>
        </a>

        <div class="dropdown-footer text-center">
          <a href="javascript:;" class="text-decoration-none">View more</a>
        </div>
      </div>
    </div>

    <!-- User profile dropdown -->
    <div class="navbar-item navbar-user dropdown"
         sec:authorize="isAuthenticated()">
      <a href="#"
         class="navbar-link dropdown-toggle d-flex align-items-center"
         data-bs-toggle="dropdown" aria-label="User menu">
        <img th:src="@{/img/user/user-13.jpg}" alt="User" class="logo-sm">
        <span>
          <!-- ✅ FIX #5: dynamic username -->
          <span class="d-none d-md-inline"
                th:text="${#authentication.name}">Admin User</span>
          <b class="caret"></b>
        </span>
      </a>

      <div class="dropdown-menu dropdown-menu-end me-1">
        <a th:href="@{/profile}" class="dropdown-item">Edit Profile</a>
        <a th:href="@{/inbox}"   class="dropdown-item d-flex align-items-center">
          Inbox
          <span class="badge bg-danger rounded-pill ms-auto pb-4px">2</span>
        </a>
        <a th:href="@{/calendar}" class="dropdown-item">Calendar</a>
        <a th:href="@{/settings}" class="dropdown-item">Settings</a>
        <div class="dropdown-divider"></div>
        <!-- ✅ FIX #3 #4: th:action + correct CSRF param -->
        <form th:action="@{/logout}" method="post" style="display:inline;">
          <input type="hidden"
                 th:name="${_csrf.parameterName}"
                 th:value="${_csrf.token}">
          <button type="submit" class="dropdown-item">Log Out</button>
        </form>
      </div>
    </div>

  </div><!-- /navbar-nav -->

</header>
