<!DOCTYPE html>
<!--
  topMenuHeader.html — fragment: topMenuHeader
  Path: src/main/resources/templates/fragments/topMenuHeader.html
  Include: <div th:replace="~{fragments/topMenuHeader :: topMenuHeader}">

  Context switcher:
  • DOMContentLoaded → GET /user-context/allowed/context
    All data comes from the session-cached UserContextDTO — zero extra DB.
  • BU dropdown is filtered client-side by parentId === currentOrgId.
  • CC and WH are filtered by parentId === currentBuId.
  • POST /user-context/switch/{type}/{id} on each click.
  • Server re-runs UserContextService.loadContext() and returns success.
  • Client calls loadContext() again to re-render with fresh data.
-->
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"><title>Header</title></head>
<body>

<div th:fragment="topMenuHeader" id="topMenuHeader" class="app-header">

  <!-- Brand -->
  <div class="navbar-header">
    <a href="/dashboard" class="navbar-brand">
      <span class="navbar-logo"></span> <b class="me-3px">Spindle</b> ERP
    </a>
    <button type="button" class="navbar-mobile-toggler" data-toggle="app-top-menu-mobile">
      <span class="icon-bar"></span><span class="icon-bar"></span><span class="icon-bar"></span>
    </button>
  </div>

  <!-- Nav -->
  <div class="navbar-nav">

    <!-- ═══ Context Switchers ══════════════════════════════════════════════ -->
    <div class="navbar-item d-flex align-items-center gap-2 me-2" id="contextSwitchers">

      <!-- Organization -->
      <div class="dropdown">
        <button class="btn btn-sm btn-outline-theme dropdown-toggle px-2"
                id="orgDropdown" data-bs-toggle="dropdown" type="button">
          <i class="fa fa-building me-1"></i><span id="currentOrgName">Loading…</span>
        </button>
        <ul class="dropdown-menu shadow" id="orgList" aria-labelledby="orgDropdown"></ul>
      </div>

      <!-- Business Unit (filtered by active org) -->
      <div class="dropdown">
        <button class="btn btn-sm btn-outline-theme dropdown-toggle px-2"
                id="buDropdown" data-bs-toggle="dropdown" type="button">
          <i class="fa fa-briefcase me-1"></i><span id="currentBuName">—</span>
        </button>
        <ul class="dropdown-menu shadow" id="buList" aria-labelledby="buDropdown"></ul>
      </div>

      <!-- Cost Center (filtered by active BU) -->
      <div class="dropdown">
        <button class="btn btn-sm btn-outline-theme dropdown-toggle px-2"
                id="ccDropdown" data-bs-toggle="dropdown" type="button">
          <i class="fa fa-chart-pie me-1"></i><span id="currentCcName">—</span>
        </button>
        <ul class="dropdown-menu shadow" id="ccList" aria-labelledby="ccDropdown"></ul>
      </div>

      <!-- Warehouse (filtered by active BU) -->
      <div class="dropdown">
        <button class="btn btn-sm btn-outline-theme dropdown-toggle px-2"
                id="whDropdown" data-bs-toggle="dropdown" type="button">
          <i class="fa fa-warehouse me-1"></i><span id="currentWhName">—</span>
        </button>
        <ul class="dropdown-menu shadow" id="whList" aria-labelledby="whDropdown"></ul>
      </div>

    </div>
    <!-- ═══ END Context Switchers ═══════════════════════════════════════════ -->

    <!-- Notifications badge -->
    <div class="navbar-item dropdown">
      <a href="#" data-bs-toggle="dropdown" class="navbar-link dropdown-toggle icon">
        <i class="fa fa-bell"></i>
        <span class="badge" id="notifBadge" style="display:none">0</span>
      </a>
      <div class="dropdown-menu media-list dropdown-menu-end">
        <div class="dropdown-header">NOTIFICATIONS</div>
        <div class="dropdown-footer text-center">
          <a href="/notifications" class="text-decoration-none">View all</a>
        </div>
      </div>
    </div>

    <!-- User menu -->
    <div class="navbar-item navbar-user dropdown" sec:authorize="isAuthenticated()">
      <a href="#" class="navbar-link dropdown-toggle d-flex align-items-center"
         data-bs-toggle="dropdown">
        <img th:src="@{/img/user/user-13.jpg}" alt="User">
        <span>
          <span class="d-none d-md-inline" sec:authentication="name">User</span>
          <b class="caret"></b>
        </span>
      </a>
      <div class="dropdown-menu dropdown-menu-end me-1">
        <a href="/profile"  class="dropdown-item"><i class="fa fa-user me-2"></i>Edit Profile</a>
        <a href="javascript:;" class="dropdown-item" id="changePasswordBtn">
          <i class="fa fa-key me-2"></i>Change Password
        </a>
        <div class="dropdown-divider"></div>
        <form action="/logout" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button type="submit" class="dropdown-item">
            <i class="fa fa-sign-out-alt me-2"></i>Log Out
          </button>
        </form>
      </div>
    </div>

  </div>

  <script th:inline="javascript">
  (function () {
    'use strict';

    // In-memory copies of allowed scopes (from session via server)
    var _all = { orgs: [], bus: [], ccs: [], whs: [] };
    var _cur = { orgId: null, buId: null, ccId: null, whId: null };

    document.addEventListener('DOMContentLoaded', function () {
      loadContext();
      document.getElementById('changePasswordBtn')
              .addEventListener('click', showChangePasswordModal);
    });

    // ── Load context from server (reads from HTTP session — zero extra DB) ──

    function loadContext() {
      secureFetch('/user-context/allowed/context')
        .then(function (data) {
          var c = data.current || {};
          _cur.orgId = c.organizationId || null;
          _cur.buId  = c.businessUnitId || null;
          _cur.ccId  = c.costCenterId   || null;
          _cur.whId  = c.warehouseId    || null;
          _all.orgs  = data.organizations  || [];
          _all.bus   = data.businessUnits  || [];
          _all.ccs   = data.costCenters    || [];
          _all.whs   = data.warehouses     || [];
          renderAll();
          updateBadge(data.pendingCount, data.unreadNotifications, data.showBadge);
        })
        .catch(function (e) { console.warn('Context load error:', e); });
    }

    // ── Render labels + filtered dropdown lists ───────────────────────────

    function renderAll() {
      setText('currentOrgName', name(_all.orgs, _cur.orgId) || 'Select Org');
      setText('currentBuName',  name(_all.bus,  _cur.buId)  || '—');
      setText('currentCcName',  name(_all.ccs,  _cur.ccId)  || '—');
      setText('currentWhName',  name(_all.whs,  _cur.whId)  || '—');

      renderList('orgList', _all.orgs, _cur.orgId, switchOrg);

      renderList('buList',
        _all.bus.filter(function (b) { return !_cur.orgId || b.parentId === _cur.orgId; }),
        _cur.buId, switchBU);

      renderList('ccList',
        _all.ccs.filter(function (c) { return !_cur.buId  || c.parentId === _cur.buId; }),
        _cur.ccId, switchCC);

      renderList('whList',
        _all.whs.filter(function (w) { return !_cur.buId  || w.parentId === _cur.buId; }),
        _cur.whId, switchWH);
    }

    function renderList(listId, items, selectedId, handler) {
      var ul = document.getElementById(listId);
      ul.innerHTML = '';
      if (!items || !items.length) {
        ul.innerHTML = '<li><a class="dropdown-item text-muted disabled">None available</a></li>';
        return;
      }
      items.forEach(function (item) {
        var a  = document.createElement('a');
        a.className = 'dropdown-item d-flex justify-content-between align-items-center';
        a.href = '#';
        a.textContent = (item.code ? item.code + ' — ' : '') + item.name;
        if (item.id === selectedId) {
          var ic = document.createElement('i');
          ic.className = 'fa fa-check text-success ms-2 flex-shrink-0';
          a.appendChild(ic);
          a.classList.add('fw-semibold');
        }
        a.addEventListener('click', function (e) { e.preventDefault(); handler(item.id); });
        var li = document.createElement('li');
        li.appendChild(a);
        ul.appendChild(li);
      });
    }

    // ── Switch handlers ───────────────────────────────────────────────────

    function switchOrg(id) { doSwitch('/user-context/switch/organization/' + id); }
    function switchBU(id)  { doSwitch('/user-context/switch/business-unit/' + id); }
    function switchCC(id)  { doSwitch('/user-context/switch/cost-center/' + id); }
    function switchWH(id)  { doSwitch('/user-context/switch/warehouse/' + id); }

    function doSwitch(url) {
      secureFetch(url, { method: 'POST' })
        .then(function (r) {
          if (r.success) { toast(r.message, '', 'success'); loadContext(); }
          else             toast(r.message, '', 'error');
        })
        .catch(function (e) { toast('Switch failed', e.message || '', 'error'); });
    }

    // ── Notification badge ────────────────────────────────────────────────

    function updateBadge(pending, unread, show) {
      var el = document.getElementById('notifBadge');
      if (!el) return;
      var total = (pending || 0) + (unread || 0);
      if (show && total > 0) { el.textContent = total > 99 ? '99+' : total; el.style.display = ''; }
      else el.style.display = 'none';
    }

    // ── Helpers ───────────────────────────────────────────────────────────

    function name(list, id) {
      if (!id || !list) return null;
      var f = list.find(function (i) { return i.id === id; });
      return f ? f.name : null;
    }

    function setText(id, t) { var e = document.getElementById(id); if (e) e.textContent = t; }

    function toast(title, msg, type) {
      if (window.Swal) Swal.fire({ icon: type, title: title, text: msg,
          toast: true, position: 'top-end', timer: 2500,
          showConfirmButton: false, timerProgressBar: true });
    }

    // ── Change Password modal ─────────────────────────────────────────────

    function showChangePasswordModal() {
      Swal.fire({
        title: 'Change Password',
        html: '<div style="display:flex;flex-direction:column;gap:12px;margin-top:10px;">'
            + '<div style="position:relative;"><input type="password" id="newPwd" placeholder="New Password" class="swal2-input" style="width:92%"><i class="fa fa-eye" id="tog1" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#666;"></i></div>'
            + '<div style="position:relative;"><input type="password" id="cnfPwd" placeholder="Confirm Password" class="swal2-input" style="width:92%"><i class="fa fa-eye" id="tog2" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#666;"></i></div>'
            + '</div>',
        showCancelButton: true, confirmButtonText: 'Update', focusConfirm: false,
        didOpen: function () {
          ['tog1','tog2'].forEach(function (tid, i) {
            document.getElementById(tid).addEventListener('click', function () {
              var inp = document.getElementById(i === 0 ? 'newPwd' : 'cnfPwd');
              inp.type = inp.type === 'password' ? 'text' : 'password';
            });
          });
        },
        preConfirm: function () {
          var p1 = document.getElementById('newPwd').value;
          var p2 = document.getElementById('cnfPwd').value;
          if (!p1 || !p2)   { Swal.showValidationMessage('Both fields required');   return false; }
          if (p1.length < 6){ Swal.showValidationMessage('Minimum 6 characters');   return false; }
          if (p1 !== p2)    { Swal.showValidationMessage('Passwords do not match'); return false; }
          return p1;
        }
      }).then(function (r) {
        if (!r.isConfirmed) return;
        secureFetch('/openApi/menus/change-password', {
          method: 'POST', body: JSON.stringify({ password: r.value })
        })
        .then(function () { Swal.fire('Success', 'Password updated', 'success'); })
        .catch(function () { Swal.fire('Error', 'Update failed', 'error'); });
      });
    }

  })();
  </script>

</div>
</body>
</html>
