<!DOCTYPE html>
<!--
  FRAGMENT: fragments/commercial/fpc-footer :: fpcFooter()
-->
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="fpcFooter()">

      <!-- ── Flag Legend + Last Refreshed ── -->
      <div class="row g-2 mt-2">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
          <div class="card-dash">
            <div class="sec-title">📖 Flag &amp; Abbreviation Legend</div>
            <div style="display:flex;gap:var(--sp-4);font-size:var(--fs-xs);margin-bottom:var(--sp-3)">
              <div><span class="dot dot-g" style="margin-right:5px"></span><span class="c-green fw7">GREEN</span> — On Track, no action</div>
              <div><span class="dot dot-y" style="margin-right:5px"></span><span class="c-yellow fw7">AMBER</span> — Watch closely</div>
              <div><span class="dot dot-r" style="margin-right:5px"></span><span class="c-red fw7">RED</span> — Act now</div>
            </div>
            <div style="background:var(--surface2);border-radius:6px;padding:9px 12px;font-size:var(--fs-xs);color:var(--text2);line-height:2">
              <strong style="color:var(--text)">LM</strong> = Last Month
              &nbsp;·&nbsp; <strong style="color:var(--text)">LY</strong> = Last Year
              &nbsp;·&nbsp; <strong style="color:var(--text)">pp</strong> = Percentage Points
              &nbsp;·&nbsp; <strong style="color:var(--text)">Mgn%</strong> = Margin %
              &nbsp;·&nbsp; <strong style="color:var(--text)">Ach%</strong> = Achievement %
            </div>
          </div>
        </div>
        <div class="col-12 col-sm-4 col-md-6 col-lg-8 d-flex align-items-end">
          <div class="last-refreshed w-100" id="lastRefreshed">
            🕐 Last Refreshed: <span th:text="${#temporals.format(#temporals.createNow(), 'dd MMMM yyyy HH:mm')}">15 June 2026 10:30</span>
            &nbsp;·&nbsp; Data source: Optimum ERP Live Feed
          </div>
        </div>
      </div>
</th:block>
</body>
</html>
