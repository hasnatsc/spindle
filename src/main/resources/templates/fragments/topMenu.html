<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════════╗
  ║  fragments/topMenu.html                                               ║
  ║  Color Admin dynamic top-menu populated via secureFetch             ║
  ║                                                                       ║
  ║  Fragment : topMenu                                                   ║
  ║  Usage    : <div th:replace="~{fragments/topMenu :: topMenu}"></div> ║
  ║                                                                       ║
  ║  API      : GET /openApi/menus/user-menu                             ║
  ║  Response : { success, menus: { items: [ FlatMenuItem… ] } }        ║
  ║                                                                       ║
  ║  Color Admin fix:                                                     ║
  ║    App.initTopMenu() fires on DOMContentLoaded before our fetch     ║
  ║    resolves → null-pointer crash. We monkey-patch it to a no-op     ║
  ║    in the capture phase, then call the real implementation after     ║
  ║    rendering is complete.                                             ║
  ╚══════════════════════════════════════════════════════════════════════╝
-->
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="topMenu" id="top-menu"
     class="app-top-menu" data-bs-theme="dark">

  <div class="menu" id="dynamicTopMenu">

    <!-- Spinner shown while loading -->
    <div id="menuLoader" class="d-flex align-items-center gap-2 px-3 py-2">
      <div class="spinner-border spinner-border-sm text-white" role="status">
        <span class="visually-hidden">Loading…</span>
      </div>
      <span class="text-white fs-12px">Loading menu…</span>
    </div>

    <!-- Color Admin scroll controls (must be last children) -->
    <div class="menu-item menu-control menu-control-start">
      <a href="javascript:;" class="menu-link"
         data-toggle="app-top-menu-prev">
        <i class="fa fa-angle-left"></i>
      </a>
    </div>
    <div class="menu-item menu-control menu-control-end">
      <a href="javascript:;" class="menu-link"
         data-toggle="app-top-menu-next">
        <i class="fa fa-angle-right"></i>
      </a>
    </div>

  </div>

  <script th:inline="javascript">
  /*<![CDATA[*/
  (function () {
    'use strict';

    /* ═══════════════════════════════════════════════════════════════
       PATCH Color Admin's App.initTopMenu()
       Runs in the CAPTURE phase so it executes before Color Admin's
       own DOMContentLoaded listener (which would crash on empty menu).
    ═══════════════════════════════════════════════════════════════ */
    var _realInit = null;

    function patchApp() {
      if (typeof App !== 'undefined' && typeof App.initTopMenu === 'function') {
        _realInit      = App.initTopMenu.bind(App);
        App.initTopMenu = function () { /* suppressed — called after dynamic render */ };
        return true;
      }
      return false;
    }

    // Try immediately (script is inline, App may already be defined)
    if (!patchApp()) {
      // Capture phase (true) fires before all bubble-phase listeners
      document.addEventListener('DOMContentLoaded', patchApp, true);
    }

    /* ═══════════════════════════════════════════════════════════════
       LOAD MENU FROM API
    ═══════════════════════════════════════════════════════════════ */
    function loadMenu() {
      secureFetch('/openApi/menus/user-menu')
        .then(function (data) {
          if (data.success && data.menus && data.menus.items) {
            var tree = buildTree(data.menus.items);
            sortTree(tree);
            renderMenu(tree);
            highlightActive();
          } else {
            showError(data.message || 'Menu data unavailable.');
          }
        })
        .catch(function (err) {
          console.error('[TopMenu] load failed:', err);
          showError('Unable to load navigation menu.');
        });
    }

    /* ═══════════════════════════════════════════════════════════════
       BUILD TREE (flat → nested)
    ═══════════════════════════════════════════════════════════════ */
    function buildTree(flat) {
      var map = {}, roots = [];
      flat.forEach(function (m) { m._children = []; map[m.id] = m; });
      flat.forEach(function (m) {
        if (m.parentMenuId && map[m.parentMenuId]) {
          map[m.parentMenuId]._children.push(m);
        } else {
          roots.push(m);
        }
      });
      return roots;
    }

    /* ═══════════════════════════════════════════════════════════════
       SORT BY displayOrder
    ═══════════════════════════════════════════════════════════════ */
    function sortTree(nodes) {
      nodes.sort(function (a, b) {
        return (a.displayOrder || 0) - (b.displayOrder || 0);
      });
      nodes.forEach(function (n) {
        if (n._children.length) sortTree(n._children);
      });
    }

    /* ═══════════════════════════════════════════════════════════════
       RENDER INTO DOM
    ═══════════════════════════════════════════════════════════════ */
    function renderMenu(modules) {
      var container = document.getElementById('dynamicTopMenu');
      if (!container) return;

      // Remove loader
      var loader = document.getElementById('menuLoader');
      if (loader) loader.remove();

      // Remove old menu items (keep scroll controls)
      Array.from(container.querySelectorAll(
        '.menu-item:not(.menu-control)'
      )).forEach(function (el) { el.remove(); });

      // Insert anchor = first scroll control
      var anchor = container.querySelector('.menu-control-start');

      modules.forEach(function (mod) {
        var el = createModuleItem(mod);
        anchor
          ? container.insertBefore(el, anchor)
          : container.appendChild(el);
      });
    }

    /* ── MODULE (top-bar level — has submenu) ── */
    function createModuleItem(mod) {
      var div = document.createElement('div');
      div.className = 'menu-item has-sub';

      var a = document.createElement('a');
      a.href      = 'javascript:;';
      a.className = 'menu-link';
      a.innerHTML =
        '<div class="menu-icon"><i class="' +
          esc(mod.icon || 'fa fa-th-large') +
        '"></i></div>' +
        '<div class="menu-text">' + esc(mod.menuName) + '</div>' +
        '<div class="menu-caret"></div>';
      div.appendChild(a);

      if (mod._children.length) {
        var sub = document.createElement('div');
        sub.className = 'menu-submenu';
        mod._children.forEach(function (child) {
          sub.appendChild(
            child._children.length
              ? createGroupItem(child)
              : createLeafItem(child)
          );
        });
        div.appendChild(sub);
      }

      return div;
    }

    /* ── GROUP (submenu header — has further children) ── */
    function createGroupItem(group) {
      var div = document.createElement('div');
      div.className = 'menu-item has-sub';

      var a = document.createElement('a');
      a.href      = 'javascript:;';
      a.className = 'menu-link';
      a.innerHTML =
        '<div class="menu-icon"><i class="' +
          esc(group.icon || 'fa fa-folder') +
        '"></i></div>' +
        '<div class="menu-text">' + esc(group.menuName) + '</div>' +
        '<div class="menu-caret"></div>';
      div.appendChild(a);

      var sub = document.createElement('div');
      sub.className = 'menu-submenu';
      group._children.forEach(function (leaf) {
        sub.appendChild(createLeafItem(leaf));
      });
      div.appendChild(sub);

      return div;
    }

    /* ── LEAF (clickable link) ── */
    function createLeafItem(menu) {
      var path    = window.location.pathname;
      var isActive = menu.menuUrl && (path === menu.menuUrl
                     || path.startsWith(menu.menuUrl + '/'));

      var div = document.createElement('div');
      div.className = 'menu-item' + (isActive ? ' active' : '');

      var a = document.createElement('a');
      a.href      = esc(menu.menuUrl || '#');
      a.className = 'menu-link';
      a.target    = menu.target || '_self';
      a.innerHTML = '<div class="menu-text">' + esc(menu.menuName) + '</div>';
      div.appendChild(a);

      return div;
    }

    /* ═══════════════════════════════════════════════════════════════
       AUTO-EXPAND path to active leaf
    ═══════════════════════════════════════════════════════════════ */
    function highlightActive() {
      var active = document.querySelector('#dynamicTopMenu .menu-item.active');
      if (!active) return;
      var p = active.parentElement;
      while (p && p.id !== 'dynamicTopMenu') {
        if (p.classList && p.classList.contains('menu-item')) {
          p.classList.add('active', 'open');
        }
        p = p.parentElement;
      }

      // Hand off to Color Admin for hover / scroll / overflow handling
      var init = _realInit ||
        (typeof App !== 'undefined' && App.initTopMenu);
      if (typeof init === 'function') {
        try { init(); } catch (e) { /* ignore */ }
      }
    }

    /* ═══════════════════════════════════════════════════════════════
       ERROR STATE
    ═══════════════════════════════════════════════════════════════ */
    function showError(msg) {
      var loader = document.getElementById('menuLoader');
      if (loader) {
        loader.innerHTML =
          '<span class="text-danger">' +
          '<i class="fa fa-exclamation-triangle me-1"></i>' +
          esc(msg) + '</span>';
      }
    }

    /* ═══════════════════════════════════════════════════════════════
       HTML ESCAPE
    ═══════════════════════════════════════════════════════════════ */
    function esc(s) {
      if (!s) return '';
      return String(s).replace(/[&<>"']/g, function (c) {
        return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[c];
      });
    }

    /* ═══════════════════════════════════════════════════════════════
       INIT — run after DOM is ready
    ═══════════════════════════════════════════════════════════════ */
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadMenu);
    } else {
      loadMenu();
    }

  })();
  /*]]>*/
  </script>

</div>

</body>
</html>
