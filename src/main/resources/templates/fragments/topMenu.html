<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════════╗
  ║  fragments/topMenu.html                                               ║
  ║  Path: src/main/resources/templates/fragments/topMenu.html          ║
  ║                                                                       ║
  ║  Fragment : topMenu                                                   ║
  ║  Usage    : <div th:replace="~{fragments/topMenu :: topMenu}">       ║
  ║             </div>                                                    ║
  ║                                                                       ║
  ║  API      : GET /openApi/menus/user-menu                             ║
  ║  Response : { success:true, menus:{ items:[FlatMenuItem…] } }       ║
  ║                                                                       ║
  ║  FIXES over uploaded version:                                         ║
  ║  1. patchApp() is called synchronously as soon as the inline         ║
  ║     script runs (before any DOMContentLoaded). If App is not yet     ║
  ║     defined at that moment we register a capture-phase listener      ║
  ║     which fires before Color Admin's own bubble-phase listener.     ║
  ║     This prevents the null-pointer crash in App.initTopMenu.        ║
  ║  2. loadMenu() is guarded with typeof secureFetch check so it        ║
  ║     retries if application.js hasn't finished executing yet.         ║
  ║  3. highlightActive() calls initTopMenu only after the DOM is ready  ║
  ║     (guarded with a try/catch so Color Admin errors don't surface).  ║
  ║  4. createLeafItem: path.startsWith guard made safer (adds '/' so    ║
  ║     /users doesn't match /users-settings).                           ║
  ╚══════════════════════════════════════════════════════════════════════╝
-->
<div th:fragment="topMenu" id="top-menu"
     class="app-top-menu" data-bs-theme="dark">

  <div class="menu" id="dynamicTopMenu">

    <!-- Shown while menu loads -->
    <div id="menuLoader" class="d-flex align-items-center gap-2 px-3 py-2">
      <div class="spinner-border spinner-border-sm text-white" role="status">
        <span class="visually-hidden">Loading…</span>
      </div>
      <span class="text-white fs-12px">Loading menu…</span>
    </div>

    <!-- Color Admin scroll controls — MUST be last children in .menu -->
    <div class="menu-item menu-control menu-control-start">
      <a href="javascript:;" class="menu-link" data-toggle="app-top-menu-prev">
        <i class="fa fa-angle-left"></i>
      </a>
    </div>
    <div class="menu-item menu-control menu-control-end">
      <a href="javascript:;" class="menu-link" data-toggle="app-top-menu-next">
        <i class="fa fa-angle-right"></i>
      </a>
    </div>

  </div><!-- /dynamicTopMenu -->

  <script th:inline="javascript">
  /*<![CDATA[*/
  (function () {
    'use strict';

    /* ═══════════════════════════════════════════════════════════════
       STEP 1 — Patch App.initTopMenu() SYNCHRONOUSLY
       This inline script executes as the HTML is parsed, BEFORE
       DOMContentLoaded fires. We neutralize App.initTopMenu so
       Color Admin's own DOMContentLoaded handler cannot crash on
       an empty menu. We call the real impl after our render is done.
    ═══════════════════════════════════════════════════════════════ */
    var _realInitTopMenu = null;

    function patchApp() {
      if (typeof App !== 'undefined' && typeof App.initTopMenu === 'function') {
        _realInitTopMenu  = App.initTopMenu.bind(App);
        App.initTopMenu   = function () { /* suppressed — reinvoked after render */ };
        return true;
      }
      return false;
    }

    // Attempt synchronously first (App may already be defined by vendor.min.js)
    if (!patchApp()) {
      // Register in CAPTURE PHASE (true) — fires before Color Admin's
      // bubble-phase DOMContentLoaded listener
      document.addEventListener('DOMContentLoaded', patchApp, true);
    }

    /* ═══════════════════════════════════════════════════════════════
       STEP 2 — Load menu after DOM is ready
    ═══════════════════════════════════════════════════════════════ */
    function init() {
      // Guard: application.js may not have executed yet on very slow connections
      if (typeof secureFetch !== 'function') {
        setTimeout(init, 50);
        return;
      }
      loadMenu();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

    /* ═══════════════════════════════════════════════════════════════
       LOAD MENU FROM API
    ═══════════════════════════════════════════════════════════════ */
    function loadMenu() {
      secureFetch('/openApi/menus/user-menu')
        .then(function (data) {
          if (data && data.success && data.menus && data.menus.items) {
            var tree = buildTree(data.menus.items);
            sortTree(tree);
            renderMenu(tree);
            highlightActive();
          } else {
            showError((data && data.message) || 'Menu data unavailable.');
          }
        })
        .catch(function (err) {
          console.error('[TopMenu] load failed:', err);
          showError('Navigation menu could not be loaded.');
        });
    }

    /* ═══════════════════════════════════════════════════════════════
       BUILD TREE  flat → nested using parentMenuId
    ═══════════════════════════════════════════════════════════════ */
    function buildTree(flat) {
      var map   = {};
      var roots = [];
      flat.forEach(function (m) { m._children = []; map[m.id] = m; });
      flat.forEach(function (m) {
        if (m.parentMenuId && map[m.parentMenuId]) {
          map[m.parentMenuId]._children.push(m);
        } else {
          roots.push(m);
        }
      });
      return roots;
    }

    /* ═══════════════════════════════════════════════════════════════
       SORT by displayOrder (ascending)
    ═══════════════════════════════════════════════════════════════ */
    function sortTree(nodes) {
      nodes.sort(function (a, b) {
        return (a.displayOrder || 0) - (b.displayOrder || 0);
      });
      nodes.forEach(function (n) {
        if (n._children && n._children.length) sortTree(n._children);
      });
    }

    /* ═══════════════════════════════════════════════════════════════
       RENDER into #dynamicTopMenu
    ═══════════════════════════════════════════════════════════════ */
    function renderMenu(modules) {
      var container = document.getElementById('dynamicTopMenu');
      if (!container) return;

      // Remove loader
      var loader = document.getElementById('menuLoader');
      if (loader) loader.remove();

      // Remove any previously-rendered menu items (keep scroll controls)
      Array.from(container.querySelectorAll('.menu-item:not(.menu-control)'))
        .forEach(function (el) { el.remove(); });

      // Insert before the first scroll control so controls stay last
      var anchor = container.querySelector('.menu-control-start');

      modules.forEach(function (mod) {
        var el = createModuleItem(mod);
        if (anchor) {
          container.insertBefore(el, anchor);
        } else {
          container.appendChild(el);
        }
      });
    }

    /* ── MODULE (top-bar root item with submenu) ── */
    function createModuleItem(mod) {
      var div = document.createElement('div');
      div.className = 'menu-item has-sub';

      var a = document.createElement('a');
      a.href      = 'javascript:;';
      a.className = 'menu-link';
      a.innerHTML =
        '<div class="menu-icon"><i class="' + esc(mod.icon || 'fa fa-th-large') + '"></i></div>' +
        '<div class="menu-text">' + esc(mod.menuName) + '</div>' +
        '<div class="menu-caret"></div>';
      div.appendChild(a);

      if (mod._children && mod._children.length) {
        var sub = document.createElement('div');
        sub.className = 'menu-submenu';
        mod._children.forEach(function (child) {
          sub.appendChild(
            (child._children && child._children.length)
              ? createGroupItem(child)
              : createLeafItem(child)
          );
        });
        div.appendChild(sub);
      }

      return div;
    }

    /* ── GROUP (non-clickable header with further children) ── */
    function createGroupItem(group) {
      var div = document.createElement('div');
      div.className = 'menu-item has-sub';

      var a = document.createElement('a');
      a.href      = 'javascript:;';
      a.className = 'menu-link';
      a.innerHTML =
        '<div class="menu-icon"><i class="' + esc(group.icon || 'fa fa-folder') + '"></i></div>' +
        '<div class="menu-text">' + esc(group.menuName) + '</div>' +
        '<div class="menu-caret"></div>';
      div.appendChild(a);

      var sub = document.createElement('div');
      sub.className = 'menu-submenu';
      group._children.forEach(function (leaf) {
        sub.appendChild(createLeafItem(leaf));
      });
      div.appendChild(sub);

      return div;
    }

    /* ── LEAF (clickable page link) ── */
    function createLeafItem(menu) {
      var path    = window.location.pathname;
      var url     = menu.menuUrl || '';
      // ✅ FIX #4: exact match OR starts-with + '/' so /users ≠ /users-settings
      var isActive = url && (path === url || path.startsWith(url + '/'));

      var div = document.createElement('div');
      div.className = 'menu-item' + (isActive ? ' active' : '');

      var a = document.createElement('a');
      a.href      = url ? esc(url) : '#';
      a.className = 'menu-link';
      a.target    = menu.target || '_self';
      a.innerHTML = '<div class="menu-text">' + esc(menu.menuName) + '</div>';
      div.appendChild(a);

      return div;
    }

    /* ═══════════════════════════════════════════════════════════════
       AUTO-EXPAND the path to the active leaf
       Then hand control back to Color Admin for hover / scroll.
    ═══════════════════════════════════════════════════════════════ */
    function highlightActive() {
      var active = document.querySelector('#dynamicTopMenu .menu-item.active');
      if (active) {
        var p = active.parentElement;
        while (p && p.id !== 'dynamicTopMenu') {
          if (p.classList && p.classList.contains('menu-item')) {
            p.classList.add('active', 'open');
          }
          p = p.parentElement;
        }
      }

      // Reinstate Color Admin's menu init for hover / scroll / keyboard nav
      var init = _realInitTopMenu
                 || (typeof App !== 'undefined' ? App.initTopMenu : null);
      if (typeof init === 'function') {
        try { init(); } catch (e) { /* ignore Color Admin internal errors */ }
      }
    }

    /* ═══════════════════════════════════════════════════════════════
       ERROR STATE
    ═══════════════════════════════════════════════════════════════ */
    function showError(msg) {
      var loader = document.getElementById('menuLoader');
      if (loader) {
        loader.innerHTML =
          '<span class="text-danger">' +
          '<i class="fa fa-exclamation-triangle me-1"></i>' +
          esc(msg) + '</span>';
      }
    }

    /* ═══════════════════════════════════════════════════════════════
       HTML ESCAPE
    ═══════════════════════════════════════════════════════════════ */
    function esc(s) {
      if (!s) return '';
      return String(s).replace(/[&<>"']/g, function (c) {
        return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[c];
      });
    }

  })();
  /*]]>*/
  </script>

</div>
