<!DOCTYPE html>
<!--
  hrm/hrm-attendance.html    GET /hrm/attendance
  JS prefix: att*
  Date range + status filter, upsert (create or update existing), monthly summary modal
-->
<html th:replace="~{layout/base :: layout('Attendance', ~{::section})}" xmlns:th="http://www.thymeleaf.org">
<section>
  <ol class="breadcrumb float-xl-end">
    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Home</a></li>
    <li class="breadcrumb-item">HRM</li>
    <li class="breadcrumb-item active">Attendance</li>
  </ol>
  <h1 class="page-header">Attendance <small>daily attendance tracking</small></h1>

  <div class="d-flex gap-2 mb-3 flex-wrap">
    <a th:href="@{/hrm/dashboard}"    class="btn btn-sm btn-outline-primary"><i class="fa fa-tachometer-alt me-1"></i> Dashboard</a>
    <a th:href="@{/hrm/designations}" class="btn btn-sm btn-outline-primary"><i class="fa fa-id-badge me-1"></i> Designations</a>
    <a th:href="@{/hrm/employees}"    class="btn btn-sm btn-outline-primary"><i class="fa fa-users me-1"></i> Employees</a>
    <a th:href="@{/hrm/attendance}"   class="btn btn-sm btn-primary"><i class="fa fa-calendar-check me-1"></i> Attendance</a>
    <a th:href="@{/hrm/leaves}"       class="btn btn-sm btn-outline-primary"><i class="fa fa-calendar-minus me-1"></i> Leaves</a>
    <a th:href="@{/hrm/payroll}"      class="btn btn-sm btn-outline-primary"><i class="fa fa-money-bill-wave me-1"></i> Payroll</a>
  </div>

  <div class="panel panel-inverse">
    <div class="panel-heading">
      <div class="panel-title d-flex gap-2 align-items-center flex-wrap">
        <a href="javascript:;" onclick="attOpenCreate()">
          <span class="badge btn btn-outline-success"><i class="fa fa-plus me-1"></i> Log Attendance</span>
        </a>
        <input id="attDateFrom" type="date" class="form-control form-control-sm" style="width:155px" onchange="_attReload()">
        <input id="attDateTo"   type="date" class="form-control form-control-sm" style="width:155px" onchange="_attReload()">
        <select id="attStatusFilter" class="form-select form-select-sm" style="width:145px" onchange="_attReload()">
          <option value="">All Status</option>
          <option value="PRESENT">Present</option>
          <option value="ABSENT">Absent</option>
          <option value="LATE">Late</option>
          <option value="HALF_DAY">Half Day</option>
          <option value="LEAVE">Leave</option>
          <option value="HOLIDAY">Holiday</option>
          <option value="WEEKEND">Weekend</option>
        </select>
        <button type="button" class="btn btn-sm btn-outline-info" onclick="attMonthlySummary()"><i class="fa fa-chart-bar me-1"></i> Monthly Summary</button>
      </div>
      <div class="panel-heading-btn">
        <a href="javascript:;" class="btn btn-sm btn-icon btn-default" data-toggle="panel-expand"><i class="fa fa-expand"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-success" data-toggle="panel-reload"><i class="fa fa-redo"></i></a>
      </div>
    </div>
    <div class="panel-body">
      <table id="attTable" width="100%" class="table table-striped table-bordered align-middle">
        <thead><tr>
          <th width="1%">SL</th><th>Emp Code</th><th>Name</th>
          <th>Date</th><th>Check In</th><th>Check Out</th>
          <th>Hours</th><th>Source</th>
          <th>Remarks</th>
          <th class="text-center">Status</th>
          <th class="text-center" width="10%">Actions</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- LOG / EDIT MODAL -->
    <div tabindex="-1" id="attModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="attModalTitle"><i class="fa fa-calendar-check me-1 text-success"></i> Log Attendance</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="attForm" novalidate>
            <div class="modal-body">
              <div class="hs-box">
                <input type="hidden" id="attId">
                <div class="row g-2">
                  <div class="col-md-12 view-group">
                    <select id="attEmpId" class="form-select hs_span_view"></select>
                    <label class="input-label">Employee <span class="text-danger">*</span></label>
                  </div>
                  <div class="col-md-3 view-group">
                    <input id="attDate" type="date" class="form-control hs_span_view" required>
                    <label class="input-label">Date <span class="text-danger">*</span></label>
                  </div>
                  <div class="col-md-3 view-group">
                    <select id="attStatus" class="form-select hs_span_view">
                      <option value="PRESENT">Present</option>
                      <option value="ABSENT">Absent</option>
                      <option value="LATE">Late</option>
                      <option value="HALF_DAY">Half Day</option>
                      <option value="HOLIDAY">Holiday</option>
                      <option value="LEAVE">Leave</option>
                      <option value="WEEKEND">Weekend</option>
                    </select>
                    <label class="input-label">Status</label>
                  </div>
                  <div class="col-md-2 view-group">
                    <input id="attCheckIn" type="time" class="form-control hs_span_view">
                    <label class="input-label">Check In</label>
                  </div>
                  <div class="col-md-2 view-group">
                    <input id="attCheckOut" type="time" class="form-control hs_span_view">
                    <label class="input-label">Check Out</label>
                  </div>
                  <div class="col-md-2 view-group">
                    <input id="attHours" type="number" step="0.01" class="form-control hs_span_view text-end">
                    <label class="input-label">Working Hours</label>
                  </div>
                  <div class="col-md-4 view-group">
                    <select id="attSource" class="form-select hs_span_view">
                      <option value="MANUAL">Manual</option>
                      <option value="DEVICE">Device</option>
                      <option value="IMPORT">Import</option>
                      <option value="SYSTEM">System</option>
                    </select>
                    <label class="input-label">Source</label>
                  </div>
                  <div class="col-md-8 view-group">
                    <input id="attRemarks" type="text" class="form-control hs_span_view" maxlength="500" placeholder="Remarks…">
                    <label class="input-label">Remarks</label>
                  </div>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-success" type="submit" id="attSubmitBtn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="attSpinner"></span>
                <span id="attBtnText">Save</span>
              </button>
              <button type="button" class="btn btn-white" data-bs-dismiss="modal">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- MONTHLY SUMMARY MODAL -->
    <div tabindex="-1" id="attSummaryModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title"><i class="fa fa-chart-bar me-1 text-primary"></i> Monthly Attendance Summary</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="row mb-3 align-items-end g-2">
              <div class="col-md-6 view-group">
                <select id="summEmpId" class="form-select hs_span_view"></select>
                <label class="input-label">Employee</label>
              </div>
              <div class="col-md-3 view-group">
                <input id="summMonth" type="month" class="form-control hs_span_view">
                <label class="input-label">Month</label>
              </div>
              <div class="col-md-3">
                <button type="button" class="btn btn-primary w-100" onclick="_loadSummary()"><i class="fa fa-search me-1"></i> Load</button>
              </div>
            </div>
            <div id="summaryKpi" class="row g-2 mb-3"></div>
            <div class="table-responsive">
              <table class="table table-sm table-bordered" id="summTable">
                <thead class="table-light"><tr><th>Date</th><th>Status</th><th>Check In</th><th>Check Out</th><th>Hours</th></tr></thead>
                <tbody id="summBody"></tbody>
              </table>
            </div>
          </div>
          <div class="modal-footer"><button type="button" class="btn btn-white" data-bs-dismiss="modal">Close</button></div>
        </div>
      </div>
    </div>
  </div>

  <script th:inline="none">
  (function () {
    'use strict';
    const BASE='/hrm/attendance', EMP_URL='/hrm/employees/search';
    var dt;

    document.addEventListener('DOMContentLoaded', function () {
      // Default date range = today
      var today = new Date().toISOString().substring(0,10);
      var firstDay = today.substring(0,8)+'01';
      document.getElementById('attDateFrom').value = firstDay;
      document.getElementById('attDateTo').value   = today;

      dt = $('#attTable').DataTable({
        processing:true,serverSide:false,responsive:true,pageLength:25,
        ajax:{url:BASE+'/list',type:'GET',data:function(d){
          d.status   = document.getElementById('attStatusFilter').value||'';
          d.dateFrom = document.getElementById('attDateFrom').value||'';
          d.dateTo   = document.getElementById('attDateTo').value||'';
        }},
        columns:[
          {data:'sl',orderable:false,width:'40px'},{data:'employee_code'},{data:'full_name'},
          {data:'att_date'},{data:'check_in'},{data:'check_out'},
          {data:'working_hours',className:'text-center'},{data:'source'},
          {data:'remarks',defaultContent:'—'},
          {data:'status_badge',orderable:false,className:'text-center'},
          {data:'actions',orderable:false,className:'text-center'}
        ],
        language:{emptyTable:'No attendance records.',processing:'<span class="spinner-border spinner-border-sm me-2"></span> Loading…'}
      });
      document.getElementById('attForm').addEventListener('submit',_onSubmit);
      document.getElementById('attDate').value = today;
      _initEmpS2('#attEmpId','#attModal',null,null);
      // Summary month = current
      var nowYM = today.substring(0,7);
      document.getElementById('summMonth').value = nowYM;
    });

    window._attReload = function() { dt.ajax.reload(); };

    function _initEmpS2(selector, parent, preId, preText) {
      var $el=$(selector);
      if ($el.hasClass('select2-hidden-accessible')) $el.select2('destroy');
      $el.select2({dropdownParent:$(parent),width:'100%',placeholder:'— Search Employee —',allowClear:true,minimumInputLength:0,
        ajax:{url:EMP_URL,dataType:'json',delay:250,data:function(p){return{search:p.term||'',page:p.page||1};},
          processResults:function(d,p){p.page=p.page||1;return{results:(d.items||[]).map(function(i){return{id:i.id,text:i.text};}),pagination:{more:d.hasMore||false}};},cache:false}
      });
      if (preId) $el.append(new Option(preText||'',preId,true,true)).trigger('change');
    }

    window.attOpenCreate = function() {
      if ($('#attEmpId').hasClass('select2-hidden-accessible')) $('#attEmpId').select2('destroy');
      document.getElementById('attForm').reset();
      document.getElementById('attId').value='';
      document.getElementById('attDate').value=new Date().toISOString().substring(0,10);
      document.getElementById('attStatus').value='PRESENT';
      document.getElementById('attSource').value='MANUAL';
      document.getElementById('attModalTitle').innerHTML='<i class="fa fa-plus me-1 text-success"></i> Log Attendance';
      document.getElementById('attBtnText').textContent='Save';
      _initEmpS2('#attEmpId','#attModal',null,null);
      bootstrap.Modal.getOrCreateInstance(document.getElementById('attModal')).show();
    };

    window.attEdit = function(id) {
      secureFetch(BASE+'/show/'+id).then(function(res){
        if (!res.success) { Swal.fire('Error',res.message,'error'); return; }
        var o=res.obj.defaultData;
        if ($('#attEmpId').hasClass('select2-hidden-accessible')) $('#attEmpId').select2('destroy');
        document.getElementById('attForm').reset();
        document.getElementById('attId').value         = o.id;
        document.getElementById('attDate').value       = o.attDate||'';
        document.getElementById('attStatus').value     = o.status||'PRESENT';
        document.getElementById('attCheckIn').value    = o.checkIn||'';
        document.getElementById('attCheckOut').value   = o.checkOut||'';
        document.getElementById('attHours').value      = o.workingHours||'';
        document.getElementById('attSource').value     = o.source||'MANUAL';
        document.getElementById('attRemarks').value    = o.remarks||'';
        _initEmpS2('#attEmpId','#attModal',o.employeeId,o.employeeDisplay);
        document.getElementById('attModalTitle').innerHTML='<i class="fa fa-pencil me-1 text-warning"></i> Edit Attendance';
        document.getElementById('attBtnText').textContent='Update';
        bootstrap.Modal.getOrCreateInstance(document.getElementById('attModal')).show();
      });
    };

    window.attDelete = function(id) { hsConfirmDelete(BASE+'/delete/'+id,dt); };

    window.attMonthlySummary = function() {
      _initEmpS2('#summEmpId','#attSummaryModal',null,null);
      document.getElementById('summBody').innerHTML='';
      document.getElementById('summaryKpi').innerHTML='';
      bootstrap.Modal.getOrCreateInstance(document.getElementById('attSummaryModal')).show();
    };

    window._loadSummary = function() {
      var empId=$('#summEmpId').val(), month=document.getElementById('summMonth').value;
      if (!empId||!month) { Swal.fire('Warning','Please select an employee and month.','warning'); return; }
      secureFetch(BASE+'/monthly-summary?employeeId='+empId+'&yearMonth='+month).then(function(data){
        var counts={PRESENT:0,ABSENT:0,LATE:0,HALF_DAY:0,LEAVE:0,HOLIDAY:0,WEEKEND:0};
        var body=document.getElementById('summBody'); body.innerHTML='';
        (data||[]).forEach(function(r){
          if (counts[r.status]!==undefined) counts[r.status]++;
          var badge={PRESENT:'bg-success',ABSENT:'bg-danger',LATE:'bg-warning text-dark',HALF_DAY:'bg-info text-dark',LEAVE:'bg-primary',HOLIDAY:'bg-teal',WEEKEND:'bg-secondary'}[r.status]||'bg-light text-dark';
          body.insertAdjacentHTML('beforeend','<tr><td>'+r.att_date+'</td>'
            +'<td><span class="badge '+badge+'">'+r.status+'</span></td>'
            +'<td>'+(r.check_in||'—')+'</td><td>'+(r.check_out||'—')+'</td>'
            +'<td class="text-end">'+(r.working_hours||'—')+'</td></tr>');
        });
        var kpi='';
        kpi+='<div class="col-4 col-md-2"><div class="widget widget-stats bg-green p-2"><div class="stats-info"><h4>PRESENT</h4><p>'+counts.PRESENT+'</p></div></div></div>';
        kpi+='<div class="col-4 col-md-2"><div class="widget widget-stats bg-danger p-2"><div class="stats-info"><h4>ABSENT</h4><p>'+counts.ABSENT+'</p></div></div></div>';
        kpi+='<div class="col-4 col-md-2"><div class="widget widget-stats bg-warning p-2"><div class="stats-info"><h4>LATE</h4><p>'+counts.LATE+'</p></div></div></div>';
        kpi+='<div class="col-4 col-md-2"><div class="widget widget-stats bg-primary p-2"><div class="stats-info"><h4>LEAVE</h4><p>'+counts.LEAVE+'</p></div></div></div>';
        kpi+='<div class="col-4 col-md-2"><div class="widget widget-stats bg-teal p-2"><div class="stats-info"><h4>HOLIDAY</h4><p>'+counts.HOLIDAY+'</p></div></div></div>';
        kpi+='<div class="col-4 col-md-2"><div class="widget widget-stats bg-secondary p-2"><div class="stats-info"><h4>WEEKEND</h4><p>'+counts.WEEKEND+'</p></div></div></div>';
        document.getElementById('summaryKpi').innerHTML=kpi;
      });
    };

    function _onSubmit(e) {
      e.preventDefault();
      var sb=document.getElementById('attSubmitBtn'),sp=document.getElementById('attSpinner'),bt=document.getElementById('attBtnText');
      hsDisableButton(sb,sp,bt);
      secureFetch(BASE+'/save',{method:'POST',body:JSON.stringify({
        id           : document.getElementById('attId').value||null,
        employeeId   : $('#attEmpId').val()||null,
        attDate      : document.getElementById('attDate').value,
        status       : document.getElementById('attStatus').value,
        checkIn      : document.getElementById('attCheckIn').value||null,
        checkOut     : document.getElementById('attCheckOut').value||null,
        workingHours : parseFloat(document.getElementById('attHours').value)||null,
        source       : document.getElementById('attSource').value,
        remarks      : document.getElementById('attRemarks').value||null
      })}).then(function(d){
        if (d.success) { hsAfterSaveMessages(d,dt); bootstrap.Modal.getOrCreateInstance(document.getElementById('attModal')).hide(); }
        else Swal.fire('Error',d.message,'error');
      }).catch(function(err){ Swal.fire('Error',err.message||'Request failed.','error'); })
        .finally(function(){ hsEnableButton(sb,sp,bt); });
    }
  })();
  </script>
</section>
</html>
