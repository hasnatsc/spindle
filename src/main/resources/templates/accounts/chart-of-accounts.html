<!DOCTYPE html>
<!--
  accounts/chart-of-accounts.html    GET /accounts/chart
  JS fns: coaShow / coaEdit / coaToggle / coaDelete
  Parent account → AJAX Select2 via /accounts/chart/search
-->
<html th:replace="~{layout/base :: layout('Chart of Accounts', ~{::section})}" xmlns:th="http://www.thymeleaf.org">
<section>

  <ol class="breadcrumb float-xl-end">
    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Home</a></li>
    <li class="breadcrumb-item">Accounts</li>
    <li class="breadcrumb-item active">Chart of Accounts</li>
  </ol>
  <h1 class="page-header">Chart of Accounts <small>account hierarchy for general ledger</small></h1>

  <div class="panel panel-inverse">
    <div class="panel-heading">
      <div class="panel-title">
        <a href="javascript:;" onclick="coaOpenCreate()">
          <span class="badge btn btn-outline-success"><i class="fa fa-plus me-1"></i> New Account</span>
        </a>
      </div>
      <div class="panel-heading-btn">
        <a href="javascript:;" class="btn btn-sm btn-icon btn-default" data-toggle="panel-expand"><i class="fa fa-expand"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-success" data-toggle="panel-reload"><i class="fa fa-redo"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-warning" data-toggle="panel-collapse"><i class="fa fa-minus"></i></a>
      </div>
    </div>
    <div class="panel-body">
      <table id="coaTable" width="100%" class="table table-striped table-bordered align-middle">
        <thead><tr>
          <th width="1%">SL</th>
          <th>Code</th><th>Name</th><th>Type</th><th>Nature</th>
          <th>Level</th><th>Parent Account</th>
          <th class="text-end">Balance</th>
          <th>Created</th><th>Status</th>
          <th class="text-center" width="13%">Actions</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- CREATE / EDIT MODAL -->
    <div tabindex="-1" id="coaModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="coaModalTitle"><i class="fa fa-sitemap me-1 text-success"></i> New Account</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="coaForm" novalidate>
            <div class="modal-body">
              <div class="hs-box">
                <input type="hidden" id="coaId">
                <div class="row g-2">

                  <!-- Parent account — AJAX Select2 -->
                  <div class="col-12 view-group">
                    <select id="coaParentId" class="form-select hs_span_view"></select>
                    <label for="coaParentId" class="input-label">Parent Account <small class="text-muted">(leave blank for top-level)</small></label>
                  </div>

                  <div class="col-md-4 view-group">
                    <input id="coaCode" type="text" class="form-control hs_span_view text-uppercase" maxlength="50" required placeholder="e.g. 1100">
                    <label for="coaCode" class="input-label">Account Code <span class="text-danger">*</span></label>
                  </div>
                  <div class="col-md-8 view-group">
                    <input id="coaName" type="text" class="form-control hs_span_view" maxlength="200" required placeholder="e.g. Cash & Bank">
                    <label for="coaName" class="input-label">Account Name <span class="text-danger">*</span></label>
                  </div>

                  <div class="col-md-4 view-group">
                    <select id="coaType" class="form-select hs_span_view" required>
                      <option value="">— Account Type —</option>
                      <option value="ASSET">ASSET</option>
                      <option value="LIABILITY">LIABILITY</option>
                      <option value="EQUITY">EQUITY</option>
                      <option value="REVENUE">REVENUE</option>
                      <option value="EXPENSE">EXPENSE</option>
                    </select>
                    <label for="coaType" class="input-label">Account Type <span class="text-danger">*</span></label>
                  </div>
                  <div class="col-md-4 view-group">
                    <select id="coaNature" class="form-select hs_span_view" required>
                      <option value="">— Nature —</option>
                      <option value="DEBIT">DEBIT</option>
                      <option value="CREDIT">CREDIT</option>
                    </select>
                    <label for="coaNature" class="input-label">Account Nature <span class="text-danger">*</span></label>
                  </div>
                  <div class="col-md-4 view-group">
                    <input id="coaCurrency" type="text" class="form-control hs_span_view" maxlength="10" placeholder="BDT">
                    <label for="coaCurrency" class="input-label">Currency</label>
                  </div>

                  <div class="col-md-6 view-group">
                    <input id="coaOpeningBal" type="number" step="0.01" class="form-control hs_span_view text-end" placeholder="0.00">
                    <label for="coaOpeningBal" class="input-label">Opening Balance</label>
                  </div>
                  <div class="col-md-6 view-group">
                    <input id="coaTaxId" type="text" class="form-control hs_span_view" maxlength="50" placeholder="Tax / TIN">
                    <label for="coaTaxId" class="input-label">Tax ID</label>
                  </div>

                  <div class="col-12 view-group">
                    <textarea id="coaDesc" class="form-control hs_span_view" rows="2" placeholder="Description…"></textarea>
                    <label for="coaDesc" class="input-label">Description</label>
                  </div>

                  <!-- Flags -->
                  <div class="col-12">
                    <div class="d-flex gap-4 flex-wrap mt-1">
                      <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="coaAllowManual" checked>
                        <label class="form-check-label" for="coaAllowManual">Allow Manual Entry</label>
                      </div>
                      <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="coaIsControl">
                        <label class="form-check-label" for="coaIsControl">Control Account</label>
                      </div>
                      <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="coaActive" checked>
                        <label class="form-check-label" for="coaActive">Active</label>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-success" type="submit" id="coaSubmitBtn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="coaSpinner"></span>
                <span id="coaBtnText">Save</span>
              </button>
              <button type="button" class="btn btn-white" data-bs-dismiss="modal">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- VIEW MODAL -->
    <div tabindex="-1" id="coaViewModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title"><i class="fa fa-sitemap me-1 text-primary"></i> Account Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body" id="coaViewBody"></div>
          <div class="modal-footer"><button type="button" class="btn btn-white" data-bs-dismiss="modal">Close</button></div>
        </div>
      </div>
    </div>

  </div><!-- /panel -->

  <script th:inline="none">
  (function () {
    'use strict';
    const BASE      = '/accounts/chart';
    const COA_URL   = BASE + '/search';
    var dt;

    // ── DataTable ─────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function () {
      dt = $('#coaTable').DataTable({
        processing: true, serverSide: false, responsive: true, pageLength: 25,
        ajax: { url: BASE + '/list', type: 'GET' },
        columns: [
          { data: 'sl', orderable: false, width: '40px' },
          { data: 'account_code' }, { data: 'account_name' },
          { data: 'account_type', render: function (d) {
            var cls = {ASSET:'info',LIABILITY:'warning',EQUITY:'secondary',REVENUE:'success',EXPENSE:'danger'};
            return '<span class="badge bg-' + (cls[d] || 'dark') + '">' + (d||'') + '</span>';
          }},
          { data: 'account_nature' },
          { data: 'level', className: 'text-center' },
          { data: 'parent_account', defaultContent: '—' },
          { data: 'current_balance', className: 'text-end', defaultContent: '—' },
          { data: 'created_at', defaultContent: '—' },
          { data: 'status', orderable: false, className: 'text-center' },
          { data: 'actions', orderable: false, className: 'text-center' }
        ],
        language: { emptyTable: 'No accounts found.', processing: '<span class="spinner-border spinner-border-sm me-2"></span> Loading…' }
      });

      document.getElementById('coaForm').addEventListener('submit', _onSubmit);
      _initParentS2(null, null);
    });

    // ── Parent Account AJAX Select2 ────────────────────────────────────────

    function _initParentS2(preId, preText) {
      var $el = $('#coaParentId');
      if ($el.hasClass('select2-hidden-accessible')) $el.select2('destroy');
      $el.select2({
        dropdownParent:     $('#coaModal'),
        width:              '100%',
        placeholder:        '— None (top-level account) —',
        allowClear:         true,
        minimumInputLength: 0,
        ajax: {
          url: COA_URL, dataType: 'json', delay: 250,
          data: function (params) { return { search: params.term || '', page: params.page || 1 }; },
          processResults: function (data, params) {
            params.page = params.page || 1;
            return {
              results:    (data.items || []).map(function (i) { return { id: i.id, text: i.text, code: i.code, name: i.name, accountType: i.accountType }; }),
              pagination: { more: data.hasMore || false }
            };
          },
          cache: true
        },
        templateResult: function (r) {
          if (r.loading) return r.text;
          var typeClasses = { ASSET:'info', LIABILITY:'warning', EQUITY:'secondary', REVENUE:'success', EXPENSE:'danger' };
          return $('<div><strong>' + nullCheck(r.code) + '</strong> — ' + nullCheck(r.name)
                 + (r.accountType ? ' <span class="badge bg-' + (typeClasses[r.accountType]||'dark') + ' ms-1">' + r.accountType + '</span>' : '')
                 + '</div>');
        },
        templateSelection: function (r) { return r.text || r.id; }
      });
      if (preId) { $el.append(new Option(preText || '', preId, true, true)).trigger('change'); }
    }

    // ── Open create ────────────────────────────────────────────────────────

    window.coaOpenCreate = function () {
      _resetForm();
      document.getElementById('coaModalTitle').innerHTML = '<i class="fa fa-plus me-1 text-success"></i> New Account';
      document.getElementById('coaBtnText').textContent  = 'Save';
      bootstrap.Modal.getOrCreateInstance(document.getElementById('coaModal')).show();
    };

    // ── Show (view modal) ─────────────────────────────────────────────────

    window.coaShow = function (id) {
      secureFetch(BASE + '/show/' + id).then(function (res) {
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var o   = res.obj.defaultData;
        var html = '<div class="hs-box"><div class="row g-2">'
          + _vf('Code',        o.accountCode)     + _vf('Name', o.accountName)
          + _vf('Type',        o.accountType)     + _vf('Nature', o.accountNature)
          + _vf('Level',       o.level)           + _vf('Parent', o.parentAccountDisplay || '—')
          + _vf('Currency',    o.currency || '—') + _vf('Balance', o.currentBalance || '—')
          + _vf('Tax ID',      o.taxId || '—')    + _vf('Status', o.active ? 'Active' : 'Inactive')
          + _vf('Control Acct', o.isControlAccount ? 'Yes' : 'No')
          + _vf('Manual Entry', o.allowManualEntry ? 'Yes' : 'No')
          + '<div class="col-12 view-group"><label class="view-label">Description</label>'
          + '<span class="form-control hs_span_show">' + (o.description || '—') + '</span></div>'
          + '</div></div>';
        document.getElementById('coaViewBody').innerHTML = html;
        bootstrap.Modal.getOrCreateInstance(document.getElementById('coaViewModal')).show();
      });
    };

    // ── Edit ──────────────────────────────────────────────────────────────

    window.coaEdit = function (id) {
      secureFetch(BASE + '/show/' + id).then(function (res) {
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var o = res.obj.defaultData;
        _resetForm();
        document.getElementById('coaId').value           = o.id;
        document.getElementById('coaCode').value         = o.accountCode || '';
        document.getElementById('coaName').value         = o.accountName || '';
        document.getElementById('coaType').value         = o.accountType || '';
        document.getElementById('coaNature').value       = o.accountNature || '';
        document.getElementById('coaCurrency').value     = o.currency || '';
        document.getElementById('coaOpeningBal').value   = o.openingBalance || '';
        document.getElementById('coaTaxId').value        = o.taxId || '';
        document.getElementById('coaDesc').value         = o.description || '';
        document.getElementById('coaAllowManual').checked = o.allowManualEntry !== false;
        document.getElementById('coaIsControl').checked  = !!o.isControlAccount;
        document.getElementById('coaActive').checked     = o.active !== false;
        _initParentS2(o.parentAccountId, o.parentAccountDisplay);
        document.getElementById('coaModalTitle').innerHTML = '<i class="fa fa-pencil me-1 text-warning"></i> Edit Account';
        document.getElementById('coaBtnText').textContent  = 'Update';
        bootstrap.Modal.getOrCreateInstance(document.getElementById('coaModal')).show();
      });
    };

    // ── Toggle / Delete ───────────────────────────────────────────────────

    window.coaToggle = function (id) { hsChangeStatus(BASE + '/toggle/' + id, dt); };
    window.coaDelete = function (id) { hsConfirmDelete(BASE + '/delete/' + id, dt); };

    // ── Submit ────────────────────────────────────────────────────────────

    function _onSubmit(e) {
      e.preventDefault();
      var sb = document.getElementById('coaSubmitBtn'), sp = document.getElementById('coaSpinner'), bt = document.getElementById('coaBtnText'), fm = document.getElementById('coaForm');
      hsDisableButton(sb, sp, bt);
      secureFetch(BASE + '/save', { method: 'POST', body: JSON.stringify({
        id              : document.getElementById('coaId').value || null,
        parentAccountId : $('#coaParentId').val() || null,
        accountCode     : document.getElementById('coaCode').value,
        accountName     : document.getElementById('coaName').value,
        accountType     : document.getElementById('coaType').value,
        accountNature   : document.getElementById('coaNature').value,
        currency        : document.getElementById('coaCurrency').value || null,
        openingBalance  : parseFloat(document.getElementById('coaOpeningBal').value) || null,
        taxId           : document.getElementById('coaTaxId').value || null,
        description     : document.getElementById('coaDesc').value || null,
        allowManualEntry: document.getElementById('coaAllowManual').checked,
        isControlAccount: document.getElementById('coaIsControl').checked,
        active          : document.getElementById('coaActive').checked
      })}).then(function (d) {
        hsAfterSaveMessages(d.success, d.message, fm, dt);
        if (d.success) bootstrap.Modal.getOrCreateInstance(document.getElementById('coaModal')).hide();
      }).catch(function (err) { Swal.fire('Error', err.message || 'Request failed.', 'error'); })
        .finally(function () { hsEnableButton(sb, sp, bt); });
    }

    // ── Helpers ───────────────────────────────────────────────────────────

    function _resetForm() {
      if ($('#coaParentId').hasClass('select2-hidden-accessible')) $('#coaParentId').select2('destroy');
      document.getElementById('coaForm').reset();
      document.getElementById('coaId').value = '';
      document.getElementById('coaAllowManual').checked = true;
      document.getElementById('coaActive').checked      = true;
      document.getElementById('coaIsControl').checked   = false;
      _initParentS2(null, null);
    }

    function _vf(label, value) {
      return '<div class="col-md-4 view-group"><label class="view-label">' + label + '</label>'
           + '<span class="form-control hs_span_show">' + (value !== null && value !== undefined ? value : '—') + '</span></div>';
    }
  })();
  </script>
</section>
</html>
