<!DOCTYPE html>
<!--
  accounts/accounts-policy.html    GET /accounts/policy
  JS fns: policyShow / policyEdit / policyToggle / policyDelete
  AccountsMapping  → AJAX Select2  /accounts/mapping/search
  Default Debit/Credit → AJAX Select2 /accounts/chart/search
-->
<html th:replace="~{layout/base :: layout('Voucher Policy', ~{::section})}" xmlns:th="http://www.thymeleaf.org">
<section>

  <ol class="breadcrumb float-xl-end">
    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Home</a></li>
    <li class="breadcrumb-item">Accounts</li>
    <li class="breadcrumb-item active">Voucher Policy</li>
  </ol>
  <h1 class="page-header">Voucher Policy <small>numbering, posting &amp; approval rules per voucher type</small></h1>

  <div class="panel panel-inverse">
    <div class="panel-heading">
      <div class="panel-title">
        <a href="javascript:;" onclick="policyOpenCreate()">
          <span class="badge btn btn-outline-success"><i class="fa fa-plus me-1"></i> New Policy</span>
        </a>
      </div>
      <div class="panel-heading-btn">
        <a href="javascript:;" class="btn btn-sm btn-icon btn-default" data-toggle="panel-expand"><i class="fa fa-expand"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-success" data-toggle="panel-reload"><i class="fa fa-redo"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-warning" data-toggle="panel-collapse"><i class="fa fa-minus"></i></a>
      </div>
    </div>
    <div class="panel-body">
      <table id="policyTable" width="100%" class="table table-striped table-bordered align-middle">
        <thead><tr>
          <th width="1%">SL</th><th>Code</th><th>Name</th>
          <th>Type</th><th>Module</th><th>Prefix</th>
          <th class="text-center">Default?</th><th class="text-center">System?</th>
          <th>Created</th><th>Status</th>
          <th class="text-center" width="12%">Actions</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- CREATE / EDIT MODAL -->
    <div tabindex="-1" id="policyModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="policyModalTitle"><i class="fa fa-shield-check me-1 text-success"></i> New Policy</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="policyForm" novalidate>
            <div class="modal-body">
              <div class="hs-box">
                <input type="hidden" id="policyId">

                <!-- IDENTITY -->
                <h6 class="text-muted border-bottom pb-1 mb-2">Identity</h6>
                <div class="row g-2 mb-3">
                  <div class="col-md-3 view-group">
                    <input id="policyCode" type="text" class="form-control hs_span_view text-uppercase" maxlength="30" required>
                    <label for="policyCode" class="input-label">Policy Code <span class="text-danger">*</span></label>
                  </div>
                  <div class="col-md-5 view-group">
                    <input id="policyName" type="text" class="form-control hs_span_view" maxlength="200" required>
                    <label for="policyName" class="input-label">Policy Name <span class="text-danger">*</span></label>
                  </div>
                  <div class="col-md-4 view-group">
                    <select id="policyType" class="form-select hs_span_view" required>
                      <option value="">— Policy Type —</option>
                      <option>JOURNAL_VOUCHER</option><option>PURCHASE_VOUCHER</option>
                      <option>SALES_VOUCHER</option><option>PAYMENT_VOUCHER</option>
                      <option>RECEIPT_VOUCHER</option><option>CONTRA_VOUCHER</option>
                      <option>EXPENSE_VOUCHER</option><option>DEBIT_NOTE</option><option>CREDIT_NOTE</option>
                    </select>
                    <label for="policyType" class="input-label">Policy Type <span class="text-danger">*</span></label>
                  </div>
                  <div class="col-md-4 view-group">
                    <select id="policyModule" class="form-select hs_span_view">
                      <option value="">— Module (optional) —</option>
                      <option>GENERAL_LEDGER</option><option>ACCOUNTS_PAYABLE</option><option>ACCOUNTS_RECEIVABLE</option>
                      <option>CASH_MANAGEMENT</option><option>PROCUREMENT</option><option>PURCHASE</option>
                      <option>SALES</option><option>INVENTORY</option><option>PRODUCTION</option>
                      <option>PAYROLL</option><option>FIXED_ASSETS</option><option>LC_MANAGEMENT</option>
                    </select>
                    <label for="policyModule" class="input-label">Module Type</label>
                  </div>
                  <div class="col-md-4 view-group">
                    <textarea id="policyDesc" class="form-control hs_span_view" rows="1"></textarea>
                    <label for="policyDesc" class="input-label">Description</label>
                  </div>
                  <!-- Mapping AJAX S2 -->
                  <div class="col-md-4 view-group">
                    <select id="policyMappingId" class="form-select hs_span_view"></select>
                    <label for="policyMappingId" class="input-label">Accounts Mapping (AJAX)</label>
                  </div>
                  <!-- Default COA S2 -->
                  <div class="col-md-6 view-group">
                    <select id="policyDebitId" class="form-select hs_span_view"></select>
                    <label for="policyDebitId" class="input-label">Default Debit Account (AJAX)</label>
                  </div>
                  <div class="col-md-6 view-group">
                    <select id="policyCreditId" class="form-select hs_span_view"></select>
                    <label for="policyCreditId" class="input-label">Default Credit Account (AJAX)</label>
                  </div>
                  <div class="col-12 view-group">
                    <input id="policyNarration" type="text" class="form-control hs_span_view" maxlength="500" placeholder="{document_no} — {party_name}">
                    <label for="policyNarration" class="input-label">Default Narration Template</label>
                  </div>
                </div>

                <!-- NUMBERING -->
                <h6 class="text-muted border-bottom pb-1 mb-2">Numbering</h6>
                <div class="row g-2 mb-3">
                  <div class="col-md-3 view-group">
                    <input id="policyPrefix" type="text" class="form-control hs_span_view" maxlength="20">
                    <label for="policyPrefix" class="input-label">Voucher Prefix</label>
                  </div>
                  <div class="col-md-3 view-group">
                    <input id="policyNextNum" type="number" class="form-control hs_span_view" min="1">
                    <label for="policyNextNum" class="input-label">Next Number</label>
                  </div>
                  <div class="col-md-3 view-group">
                    <input id="policyPadding" type="number" class="form-control hs_span_view" min="1" max="10" value="6">
                    <label for="policyPadding" class="input-label">Number Padding</label>
                  </div>
                </div>

                <!-- THRESHOLDS -->
                <h6 class="text-muted border-bottom pb-1 mb-2">Thresholds</h6>
                <div class="row g-2 mb-3">
                  <div class="col-md-4 view-group">
                    <input id="policyMinAmt" type="number" step="0.01" class="form-control hs_span_view text-end">
                    <label for="policyMinAmt" class="input-label">Minimum Amount</label>
                  </div>
                  <div class="col-md-4 view-group">
                    <input id="policyMaxAmt" type="number" step="0.01" class="form-control hs_span_view text-end">
                    <label for="policyMaxAmt" class="input-label">Maximum Amount</label>
                  </div>
                  <div class="col-md-4 view-group">
                    <input id="policyApprThreshold" type="number" step="0.01" class="form-control hs_span_view text-end">
                    <label for="policyApprThreshold" class="input-label">Approval Threshold</label>
                  </div>
                  <div class="col-md-4 view-group">
                    <input id="policyBackDays" type="number" class="form-control hs_span_view" min="0">
                    <label for="policyBackDays" class="input-label">Back-dating Days</label>
                  </div>
                </div>

                <!-- FLAGS -->
                <h6 class="text-muted border-bottom pb-1 mb-2">Controls</h6>
                <div class="row g-2 mb-2">
                  <div class="col-12">
                    <div class="d-flex gap-4 flex-wrap">
                      <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="policyAutoNum" checked><label class="form-check-label" for="policyAutoNum">Auto Numbering</label></div>
                      <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="policyAutoPost"><label class="form-check-label" for="policyAutoPost">Auto Post</label></div>
                      <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="policyReqAppr"><label class="form-check-label" for="policyReqAppr">Require Approval</label></div>
                      <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="policyBackDate"><label class="form-check-label" for="policyBackDate">Allow Backdating</label></div>
                      <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="policyFuture"><label class="form-check-label" for="policyFuture">Allow Future Dating</label></div>
                      <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="policyEditPost"><label class="form-check-label" for="policyEditPost">Edit After Post</label></div>
                      <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="policyReversal" checked><label class="form-check-label" for="policyReversal">Allow Reversal</label></div>
                      <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="policyNegAmt"><label class="form-check-label" for="policyNegAmt">Allow Negative Amount</label></div>
                      <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="policyZeroAmt"><label class="form-check-label" for="policyZeroAmt">Allow Zero Amount</label></div>
                      <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="policyIsDefault"><label class="form-check-label" for="policyIsDefault">Is Default</label></div>
                      <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="policyActive" checked><label class="form-check-label" for="policyActive">Active</label></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-success" type="submit" id="policySubmitBtn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="policySpinner"></span>
                <span id="policyBtnText">Save</span>
              </button>
              <button type="button" class="btn btn-white" data-bs-dismiss="modal">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- VIEW MODAL -->
    <div tabindex="-1" id="policyViewModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title"><i class="fa fa-shield-check me-1 text-primary"></i> Policy Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body" id="policyViewBody"></div>
          <div class="modal-footer"><button type="button" class="btn btn-white" data-bs-dismiss="modal">Close</button></div>
        </div>
      </div>
    </div>

  </div>

  <script th:inline="none">
  (function () {
    'use strict';
    const BASE        = '/accounts/policy';
    const COA_URL     = '/accounts/chart/search';
    const MAPPING_URL = '/accounts/mapping/search';
    var dt;

    // ── DataTable ─────────────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', function () {
      dt = $('#policyTable').DataTable({
        processing: true, serverSide: false, responsive: true, pageLength: 25,
        ajax: { url: BASE + '/list', type: 'GET' },
        columns: [
          { data: 'sl', orderable: false, width: '40px' },
          { data: 'policy_code' }, { data: 'policy_name' },
          { data: 'policy_type' }, { data: 'module_type', defaultContent: '—' },
          { data: 'voucher_prefix', defaultContent: '—' },
          { data: 'is_default_badge', orderable: false, className: 'text-center' },
          { data: 'is_system_badge',  orderable: false, className: 'text-center' },
          { data: 'created_at', defaultContent: '—' },
          { data: 'status', orderable: false, className: 'text-center' },
          { data: 'actions', orderable: false, className: 'text-center' }
        ],
        language: { emptyTable: 'No policies found.', processing: '<span class="spinner-border spinner-border-sm me-2"></span> Loading…' }
      });

      document.getElementById('policyForm').addEventListener('submit', _onSubmit);
      _initAllS2(null, null, null, null, null, null);
    });

    // ── S2 Helpers ────────────────────────────────────────────────────────

    function _initMappingS2(preId, preText) {
      var $el = $('#policyMappingId');
      if ($el.hasClass('select2-hidden-accessible')) $el.select2('destroy');
      $el.select2({
        dropdownParent: $('#policyModal'), width: '100%',
        placeholder: '— None —', allowClear: true, minimumInputLength: 0,
        ajax: {
          url: MAPPING_URL, dataType: 'json', delay: 250,
          data: function (params) { return { search: params.term || '', page: params.page || 1 }; },
          processResults: function (data, params) {
            params.page = params.page || 1;
            return { results: (data.items || []).map(function (i) { return { id: i.id, text: i.text }; }), pagination: { more: data.hasMore || false } };
          }, cache: true
        },
        templateResult: function (r) { return r.loading ? r.text : r.text; },
        templateSelection: function (r) { return r.text || r.id; }
      });
      if (preId) $el.append(new Option(preText || '', preId, true, true)).trigger('change');
    }

    function _initCoaS2(selector, preId, preText) {
      var $el = $(selector);
      if ($el.hasClass('select2-hidden-accessible')) $el.select2('destroy');
      $el.select2({
        dropdownParent: $('#policyModal'), width: '100%',
        placeholder: '— None —', allowClear: true, minimumInputLength: 0,
        ajax: {
          url: COA_URL, dataType: 'json', delay: 250,
          data: function (params) { return { search: params.term || '', page: params.page || 1 }; },
          processResults: function (data, params) {
            params.page = params.page || 1;
            return { results: (data.items || []).map(function (i) { return { id: i.id, text: i.text }; }), pagination: { more: data.hasMore || false } };
          }, cache: true
        },
        templateResult: function (r) { return r.loading ? r.text : r.text; },
        templateSelection: function (r) { return r.text || r.id; }
      });
      if (preId) $el.append(new Option(preText || '', preId, true, true)).trigger('change');
    }

    function _initAllS2(mId, mText, dId, dText, cId, cText) {
      _initMappingS2(mId, mText);
      _initCoaS2('#policyDebitId',  dId, dText);
      _initCoaS2('#policyCreditId', cId, cText);
    }

    // ── Open create ────────────────────────────────────────────────────────

    window.policyOpenCreate = function () {
      _resetForm();
      document.getElementById('policyModalTitle').innerHTML = '<i class="fa fa-plus me-1 text-success"></i> New Policy';
      document.getElementById('policyBtnText').textContent  = 'Save';
      bootstrap.Modal.getOrCreateInstance(document.getElementById('policyModal')).show();
    };

    // ── Show ──────────────────────────────────────────────────────────────

    window.policyShow = function (id) {
      secureFetch(BASE + '/show/' + id).then(function (res) {
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var o = res.obj.defaultData;
        var html = '<div class="hs-box"><div class="row g-2">'
          + _vf('Code',    o.policyCode)   + _vf('Name', o.policyName)
          + _vf('Type',    o.policyType)   + _vf('Module', o.moduleType || '—')
          + _vf('Prefix',  o.voucherPrefix || '—') + _vf('Mapping', o.accountsMappingDisplay || '—')
          + _vf('Default Debit',  o.defaultDebitAccountDisplay  || '—')
          + _vf('Default Credit', o.defaultCreditAccountDisplay || '—')
          + _vf('Auto Numbering', o.autoNumbering ? 'Yes' : 'No')
          + _vf('Auto Post',      o.autoPost      ? 'Yes' : 'No')
          + _vf('Req. Approval',  o.requireApproval ? 'Yes' : 'No')
          + _vf('Allow Reversal', o.allowReversal ? 'Yes' : 'No')
          + _vf('Min Amount',  o.minimumAmount  || '—')
          + _vf('Max Amount',  o.maximumAmount  || '—')
          + _vf('Approval Threshold', o.approvalThreshold || '—')
          + _vf('Status', o.active ? 'Active' : 'Inactive')
          + '</div></div>';
        document.getElementById('policyViewBody').innerHTML = html;
        bootstrap.Modal.getOrCreateInstance(document.getElementById('policyViewModal')).show();
      });
    };

    // ── Edit ──────────────────────────────────────────────────────────────

    window.policyEdit = function (id) {
      secureFetch(BASE + '/show/' + id).then(function (res) {
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var o = res.obj.defaultData;
        if (o.isSystem) { Swal.fire('System Policy', 'System policies cannot be edited.', 'warning'); return; }
        _resetForm();
        document.getElementById('policyId').value          = o.id;
        document.getElementById('policyCode').value        = o.policyCode    || '';
        document.getElementById('policyName').value        = o.policyName    || '';
        document.getElementById('policyType').value        = o.policyType    || '';
        document.getElementById('policyModule').value      = o.moduleType    || '';
        document.getElementById('policyDesc').value        = o.description   || '';
        document.getElementById('policyPrefix').value      = o.voucherPrefix || '';
        document.getElementById('policyNextNum').value     = o.nextVoucherNumber || '';
        document.getElementById('policyPadding').value     = o.numberPadding || 6;
        document.getElementById('policyMinAmt').value      = o.minimumAmount || '';
        document.getElementById('policyMaxAmt').value      = o.maximumAmount || '';
        document.getElementById('policyApprThreshold').value = o.approvalThreshold || '';
        document.getElementById('policyBackDays').value    = o.backdatingDays || '';
        document.getElementById('policyNarration').value   = o.defaultNarrationTemplate || '';
        document.getElementById('policyAutoNum').checked   = o.autoNumbering !== false;
        document.getElementById('policyAutoPost').checked  = !!o.autoPost;
        document.getElementById('policyReqAppr').checked   = !!o.requireApproval;
        document.getElementById('policyBackDate').checked  = !!o.allowBackdating;
        document.getElementById('policyFuture').checked    = !!o.allowFutureDating;
        document.getElementById('policyEditPost').checked  = !!o.allowEditAfterPost;
        document.getElementById('policyReversal').checked  = o.allowReversal !== false;
        document.getElementById('policyNegAmt').checked    = !!o.allowNegativeAmount;
        document.getElementById('policyZeroAmt').checked   = !!o.allowZeroAmount;
        document.getElementById('policyIsDefault').checked = !!o.isDefault;
        document.getElementById('policyActive').checked    = o.active !== false;
        _initAllS2(o.accountsMappingId, o.accountsMappingDisplay,
                   o.defaultDebitAccountId,  o.defaultDebitAccountDisplay,
                   o.defaultCreditAccountId, o.defaultCreditAccountDisplay);
        document.getElementById('policyModalTitle').innerHTML = '<i class="fa fa-pencil me-1 text-warning"></i> Edit Policy';
        document.getElementById('policyBtnText').textContent  = 'Update';
        bootstrap.Modal.getOrCreateInstance(document.getElementById('policyModal')).show();
      });
    };

    // ── Toggle / Delete ───────────────────────────────────────────────────

    window.policyToggle = function (id) { hsChangeStatus(BASE + '/toggle/' + id, dt); };
    window.policyDelete = function (id) { hsConfirmDelete(BASE + '/delete/' + id, dt); };

    // ── Submit ────────────────────────────────────────────────────────────

    function _onSubmit(e) {
      e.preventDefault();
      var sb = document.getElementById('policySubmitBtn'), sp = document.getElementById('policySpinner'), bt = document.getElementById('policyBtnText'), fm = document.getElementById('policyForm');
      hsDisableButton(sb, sp, bt);
      secureFetch(BASE + '/save', { method: 'POST', body: JSON.stringify({
        id                     : document.getElementById('policyId').value || null,
        policyCode             : document.getElementById('policyCode').value,
        policyName             : document.getElementById('policyName').value,
        policyType             : document.getElementById('policyType').value,
        moduleType             : document.getElementById('policyModule').value || null,
        description            : document.getElementById('policyDesc').value   || null,
        accountsMappingId      : $('#policyMappingId').val()  || null,
        defaultDebitAccountId  : $('#policyDebitId').val()    || null,
        defaultCreditAccountId : $('#policyCreditId').val()   || null,
        voucherPrefix          : document.getElementById('policyPrefix').value   || null,
        nextVoucherNumber      : parseInt(document.getElementById('policyNextNum').value)     || null,
        numberPadding          : parseInt(document.getElementById('policyPadding').value)     || 6,
        minimumAmount          : parseFloat(document.getElementById('policyMinAmt').value)     || null,
        maximumAmount          : parseFloat(document.getElementById('policyMaxAmt').value)     || null,
        approvalThreshold      : parseFloat(document.getElementById('policyApprThreshold').value) || null,
        backdatingDays         : parseInt(document.getElementById('policyBackDays').value)    || null,
        defaultNarrationTemplate: document.getElementById('policyNarration').value || null,
        autoNumbering          : document.getElementById('policyAutoNum').checked,
        autoPost               : document.getElementById('policyAutoPost').checked,
        requireApproval        : document.getElementById('policyReqAppr').checked,
        allowBackdating        : document.getElementById('policyBackDate').checked,
        allowFutureDating      : document.getElementById('policyFuture').checked,
        allowEditAfterPost     : document.getElementById('policyEditPost').checked,
        allowReversal          : document.getElementById('policyReversal').checked,
        allowNegativeAmount    : document.getElementById('policyNegAmt').checked,
        allowZeroAmount        : document.getElementById('policyZeroAmt').checked,
        isDefault              : document.getElementById('policyIsDefault').checked,
        active                 : document.getElementById('policyActive').checked
      })}).then(function (d) {
        hsAfterSaveMessages(d.success, d.message, fm, dt);
        if (d.success) bootstrap.Modal.getOrCreateInstance(document.getElementById('policyModal')).hide();
      }).catch(function (err) { Swal.fire('Error', err.message || 'Request failed.', 'error'); })
        .finally(function () { hsEnableButton(sb, sp, bt); });
    }

    // ── Helpers ───────────────────────────────────────────────────────────

    function _resetForm() {
      ['#policyMappingId','#policyDebitId','#policyCreditId'].forEach(function (s) {
        if ($(s).hasClass('select2-hidden-accessible')) $(s).select2('destroy');
      });
      document.getElementById('policyForm').reset();
      document.getElementById('policyId').value  = '';
      document.getElementById('policyAutoNum').checked  = true;
      document.getElementById('policyReversal').checked = true;
      document.getElementById('policyActive').checked   = true;
      document.getElementById('policyPadding').value    = '6';
      _initAllS2(null, null, null, null, null, null);
    }

    function _vf(label, value) {
      return '<div class="col-md-4 view-group"><label class="view-label">' + label + '</label>'
           + '<span class="form-control hs_span_show">' + (value !== null && value !== undefined ? value : '—') + '</span></div>';
    }
  })();
  </script>
</section>
</html>
