<!DOCTYPE html>
<!--
  accounts/contra-voucher.html    GET /accounts/contra-vouchers
  voucherType = CONTRA_VOUCHER
  FROM account (DEBIT) → cash/bank being reduced
  TO   account (CREDIT) → cash/bank receiving funds
  No party. No invoice allocation. Simple 2-line entry.
-->
<html th:replace="~{layout/base :: layout('Contra Voucher', ~{::section})}" xmlns:th="http://www.thymeleaf.org">
<section>

  <ol class="breadcrumb float-xl-end">
    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Home</a></li>
    <li class="breadcrumb-item">Accounts</li>
    <li class="breadcrumb-item active">Contra Voucher</li>
  </ol>
  <h1 class="page-header">Contra Voucher <small>fund transfer between bank &amp; cash accounts</small></h1>

  <div class="panel panel-inverse">
    <div class="panel-heading">
      <div class="panel-title">
        <a href="javascript:;" onclick="cvOpenCreate()">
          <span class="badge btn btn-outline-success"><i class="fa fa-plus me-1"></i> New Contra</span>
        </a>
      </div>
      <div class="panel-heading-btn">
        <a href="javascript:;" class="btn btn-sm btn-icon btn-default" data-toggle="panel-expand"><i class="fa fa-expand"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-success" data-toggle="panel-reload"><i class="fa fa-redo"></i></a>
      </div>
    </div>
    <div class="panel-body">
      <table id="cvTable" width="100%" class="table table-striped table-bordered align-middle">
        <thead><tr>
          <th width="1%">SL</th><th>Voucher No</th><th>Date</th>
          <th>From Account</th><th>To Account</th>
          <th class="text-end">Amount</th>
          <th>Mode</th><th>Cheque No</th>
          <th>Status</th>
          <th class="text-center" width="15%">Actions</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- MODAL -->
    <div tabindex="-1" id="cvModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="cvModalTitle"><i class="fa fa-right-left me-1 text-success"></i> New Contra Voucher</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="cvForm" novalidate>
            <div class="modal-body">
              <div class="hs-box">
                <input type="hidden" id="cvId">

                <!-- TRANSFER VISUAL -->
                <div class="row g-2 align-items-center mb-3">
                  <div class="col-md-3 view-group">
                    <input id="cvNo" type="text" class="form-control hs_span_view bg-light" readonly placeholder="Auto">
                    <label class="input-label">Voucher No</label>
                  </div>
                  <div class="col-md-3 view-group">
                    <input id="cvDate" type="date" class="form-control hs_span_view" required>
                    <label class="input-label">Date <span class="text-danger">*</span></label>
                  </div>
                  <div class="col-md-3 view-group">
                    <input id="cvRef" type="text" class="form-control hs_span_view" maxlength="100">
                    <label class="input-label">Reference No</label>
                  </div>
                  <div class="col-md-3 view-group">
                    <input id="cvAmount" type="number" step="0.01" min="0" class="form-control hs_span_view text-end fw-bold" required>
                    <label class="input-label">Transfer Amount <span class="text-danger">*</span></label>
                  </div>
                </div>

                <!-- FROM → TO -->
                <div class="row g-3 align-items-center mb-3">
                  <div class="col-md-5 view-group">
                    <select id="cvFromId" class="form-select hs_span_view"></select>
                    <label class="input-label">From Account (DR) <span class="text-danger">*</span></label>
                  </div>
                  <div class="col-md-2 text-center pt-3">
                    <span class="badge bg-primary fs-5"><i class="fas fa-arrow-right"></i></span>
                  </div>
                  <div class="col-md-5 view-group">
                    <select id="cvToId" class="form-select hs_span_view"></select>
                    <label class="input-label">To Account (CR) <span class="text-danger">*</span></label>
                  </div>
                </div>

                <!-- PAYMENT DETAILS -->
                <div class="row g-2 mb-3">
                  <div class="col-md-4 view-group">
                    <select id="cvPayMode" class="form-select hs_span_view">
                      <option value="">— Mode —</option>
                      <option>BANK_TRANSFER</option><option>CHEQUE</option>
                      <option>CASH</option><option>ONLINE</option>
                    </select>
                    <label class="input-label">Transfer Mode</label>
                  </div>
                  <div class="col-md-4 view-group">
                    <input id="cvChequeNo" type="text" class="form-control hs_span_view" maxlength="50">
                    <label class="input-label">Cheque / RTGS Ref</label>
                  </div>
                  <div class="col-md-4 view-group">
                    <input id="cvChequeDate" type="date" class="form-control hs_span_view">
                    <label class="input-label">Cheque / Transfer Date</label>
                  </div>
                  <div class="col-12 view-group">
                    <textarea id="cvNarration" class="form-control hs_span_view" rows="1" placeholder="Narration…"></textarea>
                    <label class="input-label">Narration</label>
                  </div>
                </div>

                <!-- PREVIEW -->
                <div class="alert alert-info py-2 mt-2" id="cvPreview">
                  <i class="fas fa-info-circle me-1"></i>
                  <strong>GL Preview:</strong>
                  DR: <span id="cvFromName" class="fw-bold">—</span> &nbsp;&nbsp;
                  CR: <span id="cvToName"   class="fw-bold">—</span> &nbsp;&nbsp;
                  Amount: <span id="cvAmtPreview">0.00</span>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-warning" type="button" onclick="cvPostCurrent()">
                <i class="fas fa-check-circle me-1"></i> Save &amp; Post
              </button>
              <button class="btn btn-success" type="submit" id="cvSubmitBtn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="cvSpinner"></span>
                <span id="cvBtnText">Save Draft</span>
              </button>
              <button type="button" class="btn btn-white" data-bs-dismiss="modal">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- VIEW MODAL -->
    <div tabindex="-1" id="cvViewModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title"><i class="fa fa-right-left me-1 text-primary"></i> Contra Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body" id="cvViewBody"></div>
          <div class="modal-footer"><button type="button" class="btn btn-white" data-bs-dismiss="modal">Close</button></div>
        </div>
      </div>
    </div>
  </div>

  <script th:inline="none">
  (function () {
    'use strict';
    const BASE    = '/accounts/vouchers';
    const SUB_URL = '/accounts/sub-accounts/search';
    var dt;

    document.addEventListener('DOMContentLoaded', function () {
      dt = $('#cvTable').DataTable({
        processing: true, serverSide: false, responsive: true, pageLength: 25,
        ajax: { url: BASE + '/list?voucherType=CONTRA_VOUCHER', type: 'GET' },
        columns: [
          { data: 'sl', orderable: false, width: '40px' },
          { data: 'voucher_no', defaultContent: '—' },
          { data: 'voucher_date' },
          { data: 'party_name', defaultContent: '—' }, // bank account display
          { data: 'party_name', defaultContent: '—' },
          { data: 'total_amount', className: 'text-end fw-bold', render: function(d){ return parseFloat(d||0).toFixed(2); }},
          { data: 'payment_mode', defaultContent: '—' },
          { data: 'reference_no', defaultContent: '—' },
          { data: 'status_badge', orderable: false, className: 'text-center' },
          { data: 'actions',     orderable: false, className: 'text-center' }
        ],
        language: { emptyTable: 'No contra vouchers.', processing: '<span class="spinner-border spinner-border-sm me-2"></span> Loading…' }
      });
      document.getElementById('cvDate').value = new Date().toISOString().substring(0,10);
      document.getElementById('cvForm').addEventListener('submit', _onSubmit);
      _initAccountS2('#cvFromId', null, null, 'From (DR)');
      _initAccountS2('#cvToId',   null, null, 'To (CR)');
      $('#cvFromId').on('select2:select', function(){ document.getElementById('cvFromName').textContent = $('#cvFromId').select2('data')[0]?.text||'—'; });
      $('#cvToId').on('select2:select',   function(){ document.getElementById('cvToName').textContent   = $('#cvToId').select2('data')[0]?.text||'—'; });
      document.getElementById('cvAmount').addEventListener('input', function(){ document.getElementById('cvAmtPreview').textContent = parseFloat(this.value||0).toFixed(2); });
    });

    function _initAccountS2(selector, preId, preText, placeholder) {
      var $el = $(selector);
      if ($el.hasClass('select2-hidden-accessible')) $el.select2('destroy');
      $el.select2({
        dropdownParent: $('#cvModal'), width: '100%',
        placeholder: '— ' + (placeholder||'Account') + ' —', allowClear: true, minimumInputLength: 0,
        ajax: {
          url: SUB_URL, dataType: 'json', delay: 250,
          data: function(p){ return { search: p.term||'', page: p.page||1 }; },
          processResults: function(data, p){ p.page=p.page||1; return { results:(data.items||[]).map(function(i){return{id:i.id,text:i.text};}), pagination:{more:data.hasMore||false} }; },
          cache: true
        },
        templateResult: function(r){ return r.loading ? r.text : r.text; },
        templateSelection: function(r){ return r.text||r.id; }
      });
      if (preId) $el.append(new Option(preText||'', preId, true, true)).trigger('change');
    }

    window.cvOpenCreate = function() {
      _resetForm();
      document.getElementById('cvModalTitle').innerHTML = '<i class="fa fa-plus me-1 text-success"></i> New Contra Voucher';
      document.getElementById('cvBtnText').textContent  = 'Save Draft';
      bootstrap.Modal.getOrCreateInstance(document.getElementById('cvModal')).show();
    };

    window.cvShow = function(id) {
      secureFetch(BASE + '/show/' + id).then(function(res) {
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var o = res.obj.defaultData;
        var html = '<div class="hs-box"><div class="row g-2">'
          + _vf('Voucher No', o.voucherNo||'—') + _vf('Date', o.voucherDate) + _vf('Status', o.voucherStatus)
          + _vf('From Account (DR)', o.bankAccountDisplay||'—')
          + _vf('To Account (CR)', o.cashAccountDisplay||'—')
          + _vf('Amount', parseFloat(o.totalAmount||0).toFixed(2))
          + _vf('Mode', o.paymentMode||'—') + _vf('Cheque No', o.chequeNumber||'—')
          + _vf('Reference', o.referenceNo||'—')
          + '<div class="col-12 view-group"><label class="view-label">Narration</label><span class="form-control hs_span_show">'+(o.narration||'—')+'</span></div>'
          + '</div></div>';
        document.getElementById('cvViewBody').innerHTML = html;
        bootstrap.Modal.getOrCreateInstance(document.getElementById('cvViewModal')).show();
      });
    };

    window.cvEdit = function(id) {
      secureFetch(BASE + '/show/' + id).then(function(res) {
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var o = res.obj.defaultData;
        _resetForm();
        document.getElementById('cvId').value        = o.id;
        document.getElementById('cvNo').value         = o.voucherNo||'';
        document.getElementById('cvDate').value       = o.voucherDate||'';
        document.getElementById('cvRef').value        = o.referenceNo||'';
        document.getElementById('cvAmount').value     = o.totalAmount||'';
        document.getElementById('cvPayMode').value    = o.paymentMode||'';
        document.getElementById('cvChequeNo').value   = o.chequeNumber||'';
        document.getElementById('cvChequeDate').value = o.chequeDate||'';
        document.getElementById('cvNarration').value  = o.narration||'';
        _initAccountS2('#cvFromId', o.bankAccountId,  o.bankAccountDisplay,  'From (DR)');
        _initAccountS2('#cvToId',   o.cashAccountId,  o.cashAccountDisplay,  'To (CR)');
        document.getElementById('cvFromName').textContent = o.bankAccountDisplay||'—';
        document.getElementById('cvToName').textContent   = o.cashAccountDisplay||'—';
        document.getElementById('cvAmtPreview').textContent = parseFloat(o.totalAmount||0).toFixed(2);
        document.getElementById('cvModalTitle').innerHTML = '<i class="fa fa-pencil me-1 text-warning"></i> Edit Contra Voucher';
        document.getElementById('cvBtnText').textContent  = 'Update Draft';
        bootstrap.Modal.getOrCreateInstance(document.getElementById('cvModal')).show();
      });
    };

    window.cvPostCurrent = function() {
      var form = document.getElementById('cvForm');
      if (!form.checkValidity()) { form.reportValidity(); return; }
      var vId = document.getElementById('cvId').value;
      if (!vId) {
        _save(function(id){ _doPost(id); });
      } else { _doPost(vId); }
    };

    function _doPost(id) {
      secureFetch(BASE + '/post/' + id, { method:'POST', body:'{}' }).then(function(d){
        if (d.success) {
          Swal.fire({ icon:'success', title:'Posted!', text:d.message, timer:1800, showConfirmButton:false });
          bootstrap.Modal.getOrCreateInstance(document.getElementById('cvModal')).hide();
          dt.ajax.reload(null, false);
        } else { Swal.fire('Error', d.message, 'error'); }
      });
    }

    window.cvReverse = function(id) {
      Swal.fire({ title:'Reverse Contra?', icon:'warning', showCancelButton:true,
        confirmButtonText:'Yes, Reverse!', confirmButtonColor:'#dc3545',
        input:'text', inputPlaceholder:'Reason (optional)' })
        .then(function(r){
          if (!r.isConfirmed) return;
          secureFetch(BASE + '/reverse/' + id + '?narration=' + encodeURIComponent(r.value||''), { method:'POST' })
            .then(function(d){
              if (d.success) { Swal.fire({ icon:'success', title:'Reversed!', text:d.message, timer:1800, showConfirmButton:false }); dt.ajax.reload(null,false); }
              else { Swal.fire('Error', d.message, 'error'); }
            });
        });
    };

    window.cvDelete = function(id) { hsConfirmDelete(BASE + '/delete/' + id, dt); };

    function _onSubmit(e) {
      e.preventDefault();
      var sb = document.getElementById('cvSubmitBtn'), sp = document.getElementById('cvSpinner'), bt = document.getElementById('cvBtnText');
      hsDisableButton(sb, sp, bt);
      _save(function(){ dt.ajax.reload(null,false); })
        .finally(function(){ hsEnableButton(sb, sp, bt); });
    }

    function _save(cb) {
      return secureFetch(BASE + '/save', { method:'POST', body: JSON.stringify({
        id            : document.getElementById('cvId').value || null,
        voucherType   : 'CONTRA_VOUCHER',
        voucherDate   : document.getElementById('cvDate').value,
        referenceNo   : document.getElementById('cvRef').value || null,
        fromAccountId : $('#cvFromId').val() || null,
        toAccountId   : $('#cvToId').val()   || null,
        totalAmount   : parseFloat(document.getElementById('cvAmount').value)||null,
        paymentMode   : document.getElementById('cvPayMode').value || null,
        chequeNumber  : document.getElementById('cvChequeNo').value || null,
        chequeDate    : document.getElementById('cvChequeDate').value || null,
        narration     : document.getElementById('cvNarration').value || null
      })}).then(function(d){
        if (d.success) {
          document.getElementById('cvId').value = d.id;
          Swal.fire({ icon:'success', title:'Saved!', text:d.message, timer:1200, showConfirmButton:false });
          if (cb) cb(d.id);
        } else { Swal.fire('Error', d.message, 'error'); }
      }).catch(function(err){ Swal.fire('Error', err.message||'Request failed.', 'error'); });
    }

    function _resetForm() {
      ['#cvFromId','#cvToId'].forEach(function(s){
        if($(s).hasClass('select2-hidden-accessible')) $(s).select2('destroy');
      });
      document.getElementById('cvForm').reset();
      document.getElementById('cvId').value = '';
      document.getElementById('cvFromName').textContent = '—';
      document.getElementById('cvToName').textContent   = '—';
      document.getElementById('cvAmtPreview').textContent = '0.00';
      document.getElementById('cvDate').value = new Date().toISOString().substring(0,10);
      _initAccountS2('#cvFromId', null, null, 'From (DR)');
      _initAccountS2('#cvToId',   null, null, 'To (CR)');
    }

    function _vf(label, value) {
      return '<div class="col-md-4 view-group"><label class="view-label">'+label+'</label>'
           + '<span class="form-control hs_span_show">'+(value!=null?value:'—')+'</span></div>';
    }
  })();
  </script>
</section>
</html>
