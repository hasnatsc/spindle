<!DOCTYPE html>

<html th:fragment="layout(title, content)"
      lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

  <head th:replace="~{fragments/head :: commonHead(${title})}"></head>

  <body class="pace-top app-top-nav">

    <!-- Page-load spinner (Color Admin Pace.js) -->
    <div id="loader" class="app-loader">
      <span class="spinner"></span>
    </div>

    <!--
      Color Admin app shell.
      Classes required for top-menu layout (no left sidebar):
        app-header-fixed     → header sticks to top
        app-without-sidebar  → no left sidebar column
        app-with-top-menu    → horizontal top navigation enabled
    -->
    <div id="app"
         class="app app-header-fixed app-without-sidebar app-with-top-menu">

      <!-- ① Top navigation bar: logo, context switchers, user menu -->
      <div th:replace="~{fragments/topMenuHeader :: topMenuHeader}"></div>

      <!-- ② Horizontal dynamic top-menu (populated via secureFetch) -->
      <div th:replace="~{fragments/topMenu :: topMenu}"></div>

      <!-- Mobile sidebar backdrop (required by Color Admin JS) -->
      <div class="app-sidebar-mobile-backdrop">
        <a href="#" data-dismiss="app-sidebar-mobile"
           class="stretched-link"></a>
      </div>

      <!-- ③ Page content — each page's <section> is injected here -->
      <div id="content" class="app-content">
        <th:block th:insert="${content}" />
      </div>

    </div><!-- /app -->

  </body>
</html>
