<!DOCTYPE html>
<!--
  inventory/model-index.html   GET /item-models
  JS fns: modelShow / modelEdit / modelToggle / modelDelete / modelOpenCreate
-->
<html th:replace="~{layout/base :: layout('Item Models', ~{::section})}" xmlns:th="http://www.thymeleaf.org">
<section>

  <ol class="breadcrumb float-xl-end">
    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Home</a></li>
    <li class="breadcrumb-item">Inventory</li>
    <li class="breadcrumb-item active">Item Models</li>
  </ol>
  <h1 class="page-header">Item Models <small>manage product models per brand</small></h1>

  <div class="panel panel-inverse">
    <div class="panel-heading">
      <div class="panel-title">
        <a href="javascript:;" onclick="modelOpenCreate()">
          <span class="badge btn btn-outline-success"><i class="fa fa-plus me-1"></i> Add Model</span>
        </a>
      </div>
      <div class="panel-heading-btn">
        <a href="javascript:;" class="btn btn-sm btn-icon btn-default" data-toggle="panel-expand"><i class="fa fa-expand"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-success" data-toggle="panel-reload"><i class="fa fa-redo"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-warning" data-toggle="panel-collapse"><i class="fa fa-minus"></i></a>
      </div>
    </div>
    <div class="panel-body">
      <table id="modelTable" width="100%" class="table table-striped table-bordered align-middle">
        <thead><tr>
          <th width="1%">SL</th><th>Code</th><th>Name</th><th>Brand</th>
          <th>Description</th><th class="text-center" width="7%">Status</th>
          <th>Created</th><th class="text-center" width="12%">Actions</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- CREATE / EDIT MODAL -->
    <div tabindex="-1" id="modelModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modelModalTitle"><i class="fa fa-cube me-1 text-success"></i> Add Model</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="modelForm" novalidate>
            <div class="modal-body">
              <div class="hs-box"><div class="row g-2">
                <input type="hidden" id="modelId">
                <div class="col-md-6 view-group">
                  <select id="modelBrandId" class="form-select hs_span_view hsSelectTwo">
                    <option value="">— No Brand —</option>
                  </select>
                  <label for="modelBrandId" class="input-label">Brand (optional)</label>
                </div>
                <div class="col-md-3 view-group">
                  <input id="modelCode" type="text" placeholder="e.g. AIR-MAX" class="form-control hs_span_view text-uppercase" required maxlength="30">
                  <label for="modelCode" class="input-label">Code <span class="text-danger">*</span></label>
                </div>
                <div class="col-md-9 view-group">
                  <input id="modelName" type="text" placeholder="Model Name" class="form-control hs_span_view" required maxlength="150">
                  <label for="modelName" class="input-label">Name <span class="text-danger">*</span></label>
                </div>
                <div class="col-12 view-group">
                  <textarea id="modelDesc" class="form-control hs_span_view" rows="2" placeholder="Optional description…"></textarea>
                  <label for="modelDesc" class="input-label">Description</label>
                </div>
                <div class="col-12 mt-1"><div class="form-check form-switch">
                  <input type="checkbox" id="modelActive" class="form-check-input" checked>
                  <label class="form-check-label" for="modelActive"><strong>Active</strong></label>
                </div></div>
              </div></div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-success" type="submit" id="modelSubmitBtn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="modelSpinner"></span>
                <span id="modelBtnText">Save</span>
              </button>
              <button type="button" class="btn btn-white" data-bs-dismiss="modal">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- VIEW MODAL -->
    <div tabindex="-1" id="modelViewModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-md">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title"><i class="fa fa-cube me-1 text-primary"></i> Model Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="hs-box"><div class="row g-2">
              <div class="col-md-4 view-group"><label class="view-label">Code</label><span id="mv_code" class="form-control hs_span_show"></span></div>
              <div class="col-md-8 view-group"><label class="view-label">Name</label><span id="mv_name" class="form-control hs_span_show"></span></div>
              <div class="col-12 view-group"><label class="view-label">Brand</label><span id="mv_brand" class="form-control hs_span_show"></span></div>
              <div class="col-12 view-group"><label class="view-label">Description</label><span id="mv_desc" class="form-control hs_span_show" style="min-height:38px"></span></div>
              <div class="col-md-4 view-group"><label class="view-label">Status</label><span id="mv_status" class="form-control hs_span_show"></span></div>
            </div></div>
          </div>
          <div class="modal-footer"><button type="button" class="btn btn-white" data-bs-dismiss="modal">Close</button></div>
        </div>
      </div>
    </div>
  </div>

  <script th:inline="none">
  (function () {
    'use strict';
    const BASE = '/item-models';
    var dt;
    document.addEventListener('DOMContentLoaded', function () {
      dt = $('#modelTable').DataTable({
        processing: true, serverSide: false, responsive: true, pageLength: 25,
        ajax: { url: BASE + '/list', type: 'GET' },
        columns: [
          { data: 'sl', orderable: false, width: '40px' },
          { data: 'model_code' }, { data: 'model_name' },
          { data: 'brand_name', defaultContent: '—' },
          { data: 'description', defaultContent: '—' },
          { data: 'status', orderable: false, className: 'text-center' },
          { data: 'created_at', defaultContent: '—' },
          { data: 'actions', orderable: false, className: 'text-center' }
        ],
        language: { emptyTable: 'No models found.', processing: '<span class="spinner-border spinner-border-sm me-2"></span> Loading…' }
      });
      _loadBrands();
      document.getElementById('modelForm').addEventListener('submit', _onSubmit);
    });

    function _loadBrands(selected) {
      secureFetch('/item-brands/active').then(function (data) {
        var sel = document.getElementById('modelBrandId');
        while (sel.options.length > 1) sel.remove(1);
        (data || []).forEach(function (b) {
          var opt = document.createElement('option'); opt.value = b.id;
          opt.textContent = b.name + ' (' + b.code + ')';
          if (selected && String(b.id) === String(selected)) opt.selected = true;
          sel.appendChild(opt);
        });
      });
    }

    window.modelOpenCreate = function () {
      _reset(); document.getElementById('modelModalTitle').innerHTML = '<i class="fa fa-plus me-1 text-success"></i> Add Model';
      document.getElementById('modelBtnText').textContent = 'Save';
      bootstrap.Modal.getOrCreateInstance(document.getElementById('modelModal')).show();
    };
    window.modelShow = function (id) {
      secureFetch(BASE + '/show/' + id).then(function (res) {
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var o = res.obj.defaultData;
        _st('mv_code', o.modelCode); _st('mv_name', o.modelName);
        _st('mv_brand', o.brandName); _st('mv_desc', o.description);
        document.getElementById('mv_status').innerHTML = o.active ? "<span class='badge bg-success'>Active</span>" : "<span class='badge bg-danger'>Inactive</span>";
        bootstrap.Modal.getOrCreateInstance(document.getElementById('modelViewModal')).show();
      });
    };
    window.modelEdit = function (id) {
      secureFetch(BASE + '/show/' + id).then(function (res) {
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var o = res.obj.defaultData; _reset();
        _loadBrands(o.brandId);
        _v('modelId', o.id); _v('modelCode', o.modelCode); _v('modelName', o.modelName); _v('modelDesc', o.description || '');
        document.getElementById('modelActive').checked = o.active;
        document.getElementById('modelModalTitle').innerHTML = '<i class="fa fa-pencil me-1 text-warning"></i> Edit Model';
        document.getElementById('modelBtnText').textContent = 'Update';
        bootstrap.Modal.getOrCreateInstance(document.getElementById('modelModal')).show();
      });
    };
    window.modelToggle = function (id) { hsChangeStatus(BASE + '/toggle/' + id, dt, 'Model'); };
    window.modelDelete = function (id) { hsConfirmDelete(BASE + '/delete/' + id, dt); };

    function _onSubmit(e) {
      e.preventDefault();
      var sb = document.getElementById('modelSubmitBtn'), sp = document.getElementById('modelSpinner'), bt = document.getElementById('modelBtnText');
      hsDisableButton(sb, sp, bt);
      secureFetch(BASE + '/save', { method: 'POST', body: JSON.stringify({
        id: document.getElementById('modelId').value || null,
        brandId: document.getElementById('modelBrandId').value || null,
        modelCode: document.getElementById('modelCode').value,
        modelName: document.getElementById('modelName').value,
        description: document.getElementById('modelDesc').value,
        active: document.getElementById('modelActive').checked
      })}).then(function (d) {
        if (d.success) { Swal.fire({ icon: 'success', title: 'Saved!', text: d.message, timer: 1600, showConfirmButton: false });
          bootstrap.Modal.getOrCreateInstance(document.getElementById('modelModal')).hide(); dt.ajax.reload(null, false);
        } else { Swal.fire('Error', d.message, 'error'); }
      }).catch(function (err) { Swal.fire('Error', err.message || 'Request failed.', 'error'); })
        .finally(function () { hsEnableButton(sb, sp, bt); });
    }
    function _reset() { document.getElementById('modelForm').reset(); document.getElementById('modelId').value = ''; document.getElementById('modelActive').checked = true; }
    function _v(id, v) { var e = document.getElementById(id); if (e) e.value = v || ''; }
    function _st(id, v) { var e = document.getElementById(id); if (e) e.textContent = v || '—'; }
  })();
  </script>
</section>
</html>
