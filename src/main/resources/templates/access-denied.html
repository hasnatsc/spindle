<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Access Denied — Spindle ERP</title>
</head>
<body>
<div layout:fragment="content" class="d-flex align-items-center justify-content-center"
     style="min-height:60vh;">
    <div class="text-center">
        <h1 class="display-1 fw-bold text-danger">403</h1>
        <h3 class="mb-3">Access Denied</h3>
        <p class="text-muted mb-4">
            You do not have permission to access this page.<br>
            Contact your administrator if you believe this is an error.
        </p>
        <a th:href="@{/dashboard}" class="btn btn-primary me-2">
            <i class="fas fa-gauge-high me-1"></i> Dashboard
        </a>
        <a href="javascript:history.back()" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i> Go Back
        </a>
    </div>
</div>
</body>
</html>
