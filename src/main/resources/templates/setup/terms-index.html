<!DOCTYPE html>
<!--
  setup/terms-index.html   GET /terms
  JS fns: termsShow / termsEdit / termsToggle / termsDelete / termsOpenCreate
-->
<html th:replace="~{layout/base :: layout('Terms Master', ~{::section})}" xmlns:th="http://www.thymeleaf.org">
<section>

  <ol class="breadcrumb float-xl-end">
    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Home</a></li>
    <li class="breadcrumb-item">Setup</li>
    <li class="breadcrumb-item active">Terms Master</li>
  </ol>
  <h1 class="page-header">Terms Master <small>standard terms &amp; conditions per document type</small></h1>

  <div class="panel panel-inverse">
    <div class="panel-heading">
      <div class="panel-title">
        <a href="javascript:;" onclick="termsOpenCreate()">
          <span class="badge btn btn-outline-success"><i class="fa fa-plus me-1"></i> Add Terms</span>
        </a>
      </div>
      <div class="panel-heading-btn">
        <a href="javascript:;" class="btn btn-sm btn-icon btn-default" data-toggle="panel-expand"><i class="fa fa-expand"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-success" data-toggle="panel-reload"><i class="fa fa-redo"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-warning" data-toggle="panel-collapse"><i class="fa fa-minus"></i></a>
      </div>
    </div>
    <div class="panel-body">
      <table id="termsTable" width="100%" class="table table-striped table-bordered align-middle">
        <thead><tr>
          <th width="1%">SL</th><th>Title</th><th>Document Type</th><th>Sort</th>
          <th>Default</th><th class="text-center" width="7%">Status</th>
          <th class="text-center" width="12%">Actions</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- CREATE / EDIT MODAL -->
    <div tabindex="-1" id="termsModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="termsModalTitle"><i class="fa fa-file-contract me-1 text-success"></i> Add Terms</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="termsForm" novalidate>
            <div class="modal-body">
              <div class="hs-box"><div class="row g-2">
                <input type="hidden" id="termsId">
                <div class="col-md-8 view-group">
                  <input id="termsTitle" type="text" placeholder="Terms Title" class="form-control hs_span_view" required maxlength="200">
                  <label for="termsTitle" class="input-label">Title <span class="text-danger">*</span></label>
                </div>
                <div class="col-md-4 view-group">
                  <select id="termsDocType" class="form-select hs_span_view" required>
                    <option value="">— Document Type —</option>
                    <option value="PURCHASE_ORDER">Purchase Order</option>
                    <option value="SALES_ORDER">Sales Order</option>
                    <option value="PURCHASE_INVOICE">Purchase Invoice</option>
                    <option value="SALES_INVOICE">Sales Invoice</option>
                    <option value="LETTER_OF_CREDIT">Letter of Credit</option>
                    <option value="EXPORT_PROFORMA_INVOICE">Export Proforma Invoice</option>
                    <option value="IMPORT_PROFORMA_INVOICE">Import Proforma Invoice</option>
                    <option value="DELIVERY_ORDER">Delivery Order</option>
                    <option value="GOODS_RECEIPT_NOTE">Goods Receipt Note</option>
                  </select>
                  <label for="termsDocType" class="input-label">Document Type <span class="text-danger">*</span></label>
                </div>
                <div class="col-12 view-group">
                  <textarea id="termsDesc" class="form-control hs_span_view" rows="4" placeholder="Terms and conditions text…"></textarea>
                  <label for="termsDesc" class="input-label">Description / Body</label>
                </div>
                <div class="col-md-4 view-group">
                  <input id="termsSortOrder" type="number" min="0" placeholder="e.g. 10" class="form-control hs_span_view">
                  <label for="termsSortOrder" class="input-label">Sort Order</label>
                </div>
                <div class="col-md-4 mt-1"><div class="form-check form-switch pt-3">
                  <input type="checkbox" id="termsActive" class="form-check-input" checked>
                  <label class="form-check-label" for="termsActive"><strong>Active</strong></label>
                </div></div>
                <div class="col-md-4 mt-1"><div class="form-check form-switch pt-3">
                  <input type="checkbox" id="termsDefault" class="form-check-input">
                  <label class="form-check-label" for="termsDefault"><strong>Default</strong></label>
                </div></div>
              </div></div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-success" type="submit" id="termsSubmitBtn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="termsSpinner"></span>
                <span id="termsBtnText">Save</span>
              </button>
              <button type="button" class="btn btn-white" data-bs-dismiss="modal">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- VIEW MODAL -->
    <div tabindex="-1" id="termsViewModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title"><i class="fa fa-file-contract me-1 text-primary"></i> Terms Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="hs-box"><div class="row g-2">
              <div class="col-md-8 view-group"><label class="view-label">Title</label><span id="tv_title" class="form-control hs_span_show"></span></div>
              <div class="col-md-4 view-group"><label class="view-label">Document Type</label><span id="tv_docType" class="form-control hs_span_show"></span></div>
              <div class="col-12 view-group"><label class="view-label">Description</label><span id="tv_desc" class="form-control hs_span_show" style="min-height:60px;white-space:pre-wrap"></span></div>
              <div class="col-md-3 view-group"><label class="view-label">Sort Order</label><span id="tv_sort" class="form-control hs_span_show"></span></div>
              <div class="col-md-3 view-group"><label class="view-label">Default</label><span id="tv_default" class="form-control hs_span_show"></span></div>
              <div class="col-md-3 view-group"><label class="view-label">Status</label><span id="tv_status" class="form-control hs_span_show"></span></div>
            </div></div>
          </div>
          <div class="modal-footer"><button type="button" class="btn btn-white" data-bs-dismiss="modal">Close</button></div>
        </div>
      </div>
    </div>
  </div>

  <script th:inline="none">
  (function () {
    'use strict';
    const BASE = '/terms';
    var dt;
    document.addEventListener('DOMContentLoaded', function () {
      dt = $('#termsTable').DataTable({
        processing: true, serverSide: false, responsive: true, pageLength: 25,
        ajax: { url: BASE + '/list', type: 'GET' },
        columns: [
          { data: 'sl', orderable: false, width: '40px' },
          { data: 'title' }, { data: 'document_type' },
          { data: 'sort_order', defaultContent: '—', className: 'text-center' },
          { data: 'default_flag', orderable: false, className: 'text-center' },
          { data: 'status', orderable: false, className: 'text-center' },
          { data: 'actions', orderable: false, className: 'text-center' }
        ],
        language: { emptyTable: 'No terms found.', processing: '<span class="spinner-border spinner-border-sm me-2"></span> Loading…' }
      });
      document.getElementById('termsForm').addEventListener('submit', _onSubmit);
    });

    window.termsOpenCreate = function () {
      _reset(); document.getElementById('termsModalTitle').innerHTML = '<i class="fa fa-plus me-1 text-success"></i> Add Terms';
      document.getElementById('termsBtnText').textContent = 'Save';
      bootstrap.Modal.getOrCreateInstance(document.getElementById('termsModal')).show();
    };
    window.termsShow = function (id) {
      secureFetch(BASE + '/show/' + id).then(function (res) {
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var o = res.obj.defaultData;
        _st('tv_title', o.title); _st('tv_docType', o.documentType); _st('tv_desc', o.description); _st('tv_sort', o.sortOrder);
        document.getElementById('tv_default').innerHTML = o.isDefault ? "<span class='badge bg-warning text-dark'>Yes</span>" : "<span class='badge bg-secondary'>No</span>";
        document.getElementById('tv_status').innerHTML  = o.active    ? "<span class='badge bg-success'>Active</span>" : "<span class='badge bg-danger'>Inactive</span>";
        bootstrap.Modal.getOrCreateInstance(document.getElementById('termsViewModal')).show();
      });
    };
    window.termsEdit = function (id) {
      secureFetch(BASE + '/show/' + id).then(function (res) {
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var o = res.obj.defaultData; _reset();
        _v('termsId', o.id); _v('termsTitle', o.title); _v('termsDesc', o.description || '');
        _v('termsSortOrder', o.sortOrder || '');
        document.getElementById('termsDocType').value   = o.documentType || '';
        document.getElementById('termsActive').checked  = o.active;
        document.getElementById('termsDefault').checked = o.isDefault;
        document.getElementById('termsModalTitle').innerHTML = '<i class="fa fa-pencil me-1 text-warning"></i> Edit Terms';
        document.getElementById('termsBtnText').textContent = 'Update';
        bootstrap.Modal.getOrCreateInstance(document.getElementById('termsModal')).show();
      });
    };
    window.termsToggle = function (id) { hsChangeStatus(BASE + '/toggle/' + id, dt, 'Terms'); };
    window.termsDelete = function (id) { hsConfirmDelete(BASE + '/delete/' + id, dt); };

    function _onSubmit(e) {
      e.preventDefault();
      var sb = document.getElementById('termsSubmitBtn'), sp = document.getElementById('termsSpinner'), bt = document.getElementById('termsBtnText');
      hsDisableButton(sb, sp, bt);
      secureFetch(BASE + '/save', { method: 'POST', body: JSON.stringify({
        id: document.getElementById('termsId').value || null,
        title: document.getElementById('termsTitle').value,
        description: document.getElementById('termsDesc').value,
        documentType: document.getElementById('termsDocType').value,
        sortOrder: document.getElementById('termsSortOrder').value || null,
        active: document.getElementById('termsActive').checked,
        isDefault: document.getElementById('termsDefault').checked
      })}).then(function (d) {
        if (d.success) { Swal.fire({ icon: 'success', title: 'Saved!', text: d.message, timer: 1600, showConfirmButton: false });
          bootstrap.Modal.getOrCreateInstance(document.getElementById('termsModal')).hide(); dt.ajax.reload(null, false);
        } else { Swal.fire('Error', d.message, 'error'); }
      }).catch(function (err) { Swal.fire('Error', err.message || 'Request failed.', 'error'); })
        .finally(function () { hsEnableButton(sb, sp, bt); });
    }
    function _reset() { document.getElementById('termsForm').reset(); document.getElementById('termsId').value = ''; document.getElementById('termsActive').checked = true; document.getElementById('termsDefault').checked = false; }
    function _v(id, v) { var e = document.getElementById(id); if (e) e.value = v || ''; }
    function _st(id, v) { var e = document.getElementById(id); if (e) e.textContent = (v !== null && v !== undefined) ? v : '—'; }
  })();
  </script>
</section>
</html>
