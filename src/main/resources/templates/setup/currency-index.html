<!DOCTYPE html>
<!--
  setup/currency-index.html   GET /currencies
  JS fns: currShow / currEdit / currToggle / currDelete / currOpenCreate
-->
<html th:replace="~{layout/base :: layout('Currencies', ~{::section})}" xmlns:th="http://www.thymeleaf.org">
<section>

  <ol class="breadcrumb float-xl-end">
    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Home</a></li>
    <li class="breadcrumb-item">Setup</li>
    <li class="breadcrumb-item active">Currencies</li>
  </ol>
  <h1 class="page-header">Currencies <small>manage base currencies</small></h1>

  <div class="panel panel-inverse">
    <div class="panel-heading">
      <div class="panel-title">
        <a href="javascript:;" onclick="currOpenCreate()">
          <span class="badge btn btn-outline-success"><i class="fa fa-plus me-1"></i> Add Currency</span>
        </a>
      </div>
      <div class="panel-heading-btn">
        <a href="javascript:;" class="btn btn-sm btn-icon btn-default" data-toggle="panel-expand"><i class="fa fa-expand"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-success" data-toggle="panel-reload"><i class="fa fa-redo"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-warning" data-toggle="panel-collapse"><i class="fa fa-minus"></i></a>
      </div>
    </div>
    <div class="panel-body">
      <table id="currTable" width="100%" class="table table-striped table-bordered align-middle">
        <thead><tr>
          <th width="1%">SL</th><th>Code</th><th>Name</th><th>Symbol</th>
          <th>Decimals</th><th class="text-center" width="7%">Status</th>
          <th class="text-center" width="12%">Actions</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- CREATE / EDIT MODAL -->
    <div tabindex="-1" id="currModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-md">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="currModalTitle"><i class="fa fa-coins me-1 text-success"></i> Add Currency</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="currForm" novalidate>
            <div class="modal-body">
              <div class="hs-box">
                <div class="row g-2">
                  <input type="hidden" id="currId">
                  <div class="col-md-4 view-group">
                    <input id="currCode" type="text" placeholder="e.g. BDT" class="form-control hs_span_view text-uppercase" required maxlength="3">
                    <label for="currCode" class="input-label">Code <span class="text-danger">*</span></label>
                  </div>
                  <div class="col-md-8 view-group">
                    <input id="currName" type="text" placeholder="Currency Name" class="form-control hs_span_view" required maxlength="100">
                    <label for="currName" class="input-label">Name <span class="text-danger">*</span></label>
                  </div>
                  <div class="col-md-6 view-group">
                    <input id="currSymbol" type="text" placeholder="e.g. ৳" class="form-control hs_span_view" maxlength="10">
                    <label for="currSymbol" class="input-label">Symbol</label>
                  </div>
                  <div class="col-md-6 view-group">
                    <input id="currDecimals" type="number" min="0" max="6" value="2" class="form-control hs_span_view">
                    <label for="currDecimals" class="input-label">Decimal Places</label>
                  </div>
                  <div class="col-12 mt-1">
                    <div class="form-check form-switch">
                      <input type="checkbox" id="currActive" class="form-check-input" checked>
                      <label class="form-check-label" for="currActive"><strong>Active</strong></label>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-success" type="submit" id="currSubmitBtn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="currSpinner"></span>
                <span id="currBtnText">Save</span>
              </button>
              <button type="button" class="btn btn-white" data-bs-dismiss="modal">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- VIEW MODAL -->
    <div tabindex="-1" id="currViewModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-md">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title"><i class="fa fa-coins me-1 text-primary"></i> Currency Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="hs-box"><div class="row g-2">
              <div class="col-md-4 view-group"><label class="view-label">Code</label><span id="cv_code" class="form-control hs_span_show"></span></div>
              <div class="col-md-8 view-group"><label class="view-label">Name</label><span id="cv_name" class="form-control hs_span_show"></span></div>
              <div class="col-md-6 view-group"><label class="view-label">Symbol</label><span id="cv_symbol" class="form-control hs_span_show"></span></div>
              <div class="col-md-3 view-group"><label class="view-label">Decimals</label><span id="cv_decimals" class="form-control hs_span_show"></span></div>
              <div class="col-md-3 view-group"><label class="view-label">Status</label><span id="cv_status" class="form-control hs_span_show"></span></div>
            </div></div>
          </div>
          <div class="modal-footer"><button type="button" class="btn btn-white" data-bs-dismiss="modal">Close</button></div>
        </div>
      </div>
    </div>
  </div>

  <script th:inline="none">
  (function () {
    'use strict';
    const BASE = '/currencies';
    var dt;
    document.addEventListener('DOMContentLoaded', function () {
      dt = $('#currTable').DataTable({
        processing: true, serverSide: false, responsive: true, pageLength: 25,
        ajax: { url: BASE + '/list', type: 'GET' },
        columns: [
          { data: 'sl', orderable: false, width: '40px' },
          { data: 'code' }, { data: 'name' },
          { data: 'symbol', defaultContent: '—' },
          { data: 'decimal_places', className: 'text-center' },
          { data: 'status', orderable: false, className: 'text-center' },
          { data: 'actions', orderable: false, className: 'text-center' }
        ],
        language: { emptyTable: 'No currencies found.', processing: '<span class="spinner-border spinner-border-sm me-2"></span> Loading…' }
      });
      document.getElementById('currForm').addEventListener('submit', _onSubmit);
    });

    window.currOpenCreate = function () {
      _reset(); document.getElementById('currModalTitle').innerHTML = '<i class="fa fa-plus me-1 text-success"></i> Add Currency';
      document.getElementById('currBtnText').textContent = 'Save';
      bootstrap.Modal.getOrCreateInstance(document.getElementById('currModal')).show();
    };
    window.currShow = function (id) {
      secureFetch(BASE + '/show/' + id).then(function (res) {
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var o = res.obj.defaultData;
        _st('cv_code', o.code); _st('cv_name', o.name); _st('cv_symbol', o.symbol);
        _st('cv_decimals', o.decimalPlaces);
        document.getElementById('cv_status').innerHTML = o.active ? "<span class='badge bg-success'>Active</span>" : "<span class='badge bg-danger'>Inactive</span>";
        bootstrap.Modal.getOrCreateInstance(document.getElementById('currViewModal')).show();
      });
    };
    window.currEdit = function (id) {
      secureFetch(BASE + '/show/' + id).then(function (res) {
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var o = res.obj.defaultData; _reset();
        _v('currId', o.id); _v('currCode', o.code); _v('currName', o.name);
        _v('currSymbol', o.symbol || ''); _v('currDecimals', o.decimalPlaces);
        document.getElementById('currActive').checked = o.active;
        document.getElementById('currModalTitle').innerHTML = '<i class="fa fa-pencil me-1 text-warning"></i> Edit Currency';
        document.getElementById('currBtnText').textContent = 'Update';
        bootstrap.Modal.getOrCreateInstance(document.getElementById('currModal')).show();
      });
    };
    window.currToggle = function (id) { hsChangeStatus(BASE + '/toggle/' + id, dt, 'Currency'); };
    window.currDelete = function (id) { hsConfirmDelete(BASE + '/delete/' + id, dt); };

    function _onSubmit(e) {
      e.preventDefault();
      var sb = document.getElementById('currSubmitBtn'), sp = document.getElementById('currSpinner'), bt = document.getElementById('currBtnText');
      hsDisableButton(sb, sp, bt);
      secureFetch(BASE + '/save', { method: 'POST', body: JSON.stringify({
        id: document.getElementById('currId').value || null,
        code: document.getElementById('currCode').value,
        name: document.getElementById('currName').value,
        symbol: document.getElementById('currSymbol').value,
        decimalPlaces: parseInt(document.getElementById('currDecimals').value) || 2,
        active: document.getElementById('currActive').checked
      })}).then(function (d) {
        if (d.success) { Swal.fire({ icon: 'success', title: 'Saved!', text: d.message, timer: 1600, showConfirmButton: false });
          bootstrap.Modal.getOrCreateInstance(document.getElementById('currModal')).hide(); dt.ajax.reload(null, false);
        } else { Swal.fire('Error', d.message, 'error'); }
      }).catch(function (err) { Swal.fire('Error', err.message || 'Request failed.', 'error'); })
        .finally(function () { hsEnableButton(sb, sp, bt); });
    }
    function _reset() { document.getElementById('currForm').reset(); document.getElementById('currId').value = ''; document.getElementById('currActive').checked = true; document.getElementById('currDecimals').value = 2; }
    function _v(id, v) { var e = document.getElementById(id); if (e) e.value = v || ''; }
    function _st(id, v) { var e = document.getElementById(id); if (e) e.textContent = (v !== null && v !== undefined) ? v : '—'; }
  })();
  </script>
</section>
</html>
