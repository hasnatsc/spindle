<!DOCTYPE html>
<!--
  setup/country-index.html   GET /countries
  JS fns: countryShow / countryEdit / countryToggle / countryDelete / countryOpenCreate
-->
<html th:replace="~{layout/base :: layout('Countries', ~{::section})}" xmlns:th="http://www.thymeleaf.org">
<section>

  <ol class="breadcrumb float-xl-end">
    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Home</a></li>
    <li class="breadcrumb-item">Setup</li>
    <li class="breadcrumb-item active">Countries</li>
  </ol>
  <h1 class="page-header">Countries <small>manage country / location reference</small></h1>

  <div class="panel panel-inverse">
    <div class="panel-heading">
      <div class="panel-title">
        <a href="javascript:;" onclick="countryOpenCreate()">
          <span class="badge btn btn-outline-success"><i class="fa fa-plus me-1"></i> Add Country</span>
        </a>
      </div>
      <div class="panel-heading-btn">
        <a href="javascript:;" class="btn btn-sm btn-icon btn-default" data-toggle="panel-expand"><i class="fa fa-expand"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-success" data-toggle="panel-reload"><i class="fa fa-redo"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-warning" data-toggle="panel-collapse"><i class="fa fa-minus"></i></a>
      </div>
    </div>
    <div class="panel-body">
      <table id="countryTable" width="100%" class="table table-striped table-bordered align-middle">
        <thead><tr>
          <th width="1%">SL</th><th>ISO</th><th>ISO2</th><th>Name</th>
          <th>Native Name</th><th>Phone Code</th><th>Currency</th>
          <th class="text-center" width="7%">Status</th><th class="text-center" width="12%">Actions</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- CREATE / EDIT MODAL -->
    <div tabindex="-1" id="countryModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="countryModalTitle"><i class="fa fa-globe me-1 text-success"></i> Add Country</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="countryForm" novalidate>
            <div class="modal-body">
              <div class="hs-box"><div class="row g-2">
                <input type="hidden" id="countryId">
                <div class="col-md-2 view-group">
                  <input id="countryIso" type="text" placeholder="BGD" class="form-control hs_span_view text-uppercase" required maxlength="3">
                  <label for="countryIso" class="input-label">ISO 3 <span class="text-danger">*</span></label>
                </div>
                <div class="col-md-2 view-group">
                  <input id="countryIso2" type="text" placeholder="BD" class="form-control hs_span_view text-uppercase" required maxlength="2">
                  <label for="countryIso2" class="input-label">ISO 2 <span class="text-danger">*</span></label>
                </div>
                <div class="col-md-5 view-group">
                  <input id="countryName" type="text" placeholder="Country Name" class="form-control hs_span_view" required maxlength="150">
                  <label for="countryName" class="input-label">Name <span class="text-danger">*</span></label>
                </div>
                <div class="col-md-3 view-group">
                  <input id="countryPhone" type="text" placeholder="+880" class="form-control hs_span_view" maxlength="10">
                  <label for="countryPhone" class="input-label">Phone Code</label>
                </div>
                <div class="col-md-6 view-group">
                  <input id="countryNameNative" type="text" placeholder="বাংলাদেশ" class="form-control hs_span_view" maxlength="150">
                  <label for="countryNameNative" class="input-label">Native Name</label>
                </div>
                <div class="col-md-6 view-group">
                  <select id="countryCurrencyId" class="form-select hs_span_view hsSelectTwo" required>
                    <option value="">— Select Currency —</option>
                  </select>
                  <label for="countryCurrencyId" class="input-label">Currency <span class="text-danger">*</span></label>
                </div>
                <div class="col-12 mt-1">
                  <div class="form-check form-switch">
                    <input type="checkbox" id="countryActive" class="form-check-input" checked>
                    <label class="form-check-label" for="countryActive"><strong>Active</strong></label>
                  </div>
                </div>
              </div></div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-success" type="submit" id="countrySubmitBtn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="countrySpinner"></span>
                <span id="countryBtnText">Save</span>
              </button>
              <button type="button" class="btn btn-white" data-bs-dismiss="modal">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- VIEW MODAL -->
    <div tabindex="-1" id="countryViewModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title"><i class="fa fa-globe me-1 text-primary"></i> Country Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="hs-box"><div class="row g-2">
              <div class="col-md-2 view-group"><label class="view-label">ISO 3</label><span id="ctv_iso" class="form-control hs_span_show"></span></div>
              <div class="col-md-2 view-group"><label class="view-label">ISO 2</label><span id="ctv_iso2" class="form-control hs_span_show"></span></div>
              <div class="col-md-5 view-group"><label class="view-label">Name</label><span id="ctv_name" class="form-control hs_span_show"></span></div>
              <div class="col-md-3 view-group"><label class="view-label">Phone Code</label><span id="ctv_phone" class="form-control hs_span_show"></span></div>
              <div class="col-md-6 view-group"><label class="view-label">Native Name</label><span id="ctv_nameNative" class="form-control hs_span_show"></span></div>
              <div class="col-md-6 view-group"><label class="view-label">Currency</label><span id="ctv_currency" class="form-control hs_span_show"></span></div>
              <div class="col-md-4 view-group"><label class="view-label">Status</label><span id="ctv_status" class="form-control hs_span_show"></span></div>
            </div></div>
          </div>
          <div class="modal-footer"><button type="button" class="btn btn-white" data-bs-dismiss="modal">Close</button></div>
        </div>
      </div>
    </div>
  </div>

  <script th:inline="none">
  (function () {
    'use strict';
    const BASE = '/countries';
    var dt;
    document.addEventListener('DOMContentLoaded', function () {
      dt = $('#countryTable').DataTable({
        processing: true, serverSide: false, responsive: true, pageLength: 25,
        ajax: { url: BASE + '/list', type: 'GET' },
        columns: [
          { data: 'sl', orderable: false, width: '40px' },
          { data: 'iso_code' }, { data: 'iso_code2' }, { data: 'name' },
          { data: 'name_native', defaultContent: '—' },
          { data: 'phone_code', defaultContent: '—' },
          { data: 'currency_code' },
          { data: 'status', orderable: false, className: 'text-center' },
          { data: 'actions', orderable: false, className: 'text-center' }
        ],
        language: { emptyTable: 'No countries found.', processing: '<span class="spinner-border spinner-border-sm me-2"></span> Loading…' }
      });
      _loadCurrencies();
      document.getElementById('countryForm').addEventListener('submit', _onSubmit);
    });

    function _loadCurrencies(selected) {
      secureFetch('/currencies/active').then(function (data) {
        var sel = document.getElementById('countryCurrencyId');
        while (sel.options.length > 1) sel.remove(1);
        (data || []).forEach(function (c) {
          var opt = document.createElement('option');
          opt.value = c.id; opt.textContent = c.code + ' — ' + c.name;
          if (selected && String(c.id) === String(selected)) opt.selected = true;
          sel.appendChild(opt);
        });
      });
    }

    window.countryOpenCreate = function () {
      _reset(); document.getElementById('countryModalTitle').innerHTML = '<i class="fa fa-plus me-1 text-success"></i> Add Country';
      document.getElementById('countryBtnText').textContent = 'Save';
      bootstrap.Modal.getOrCreateInstance(document.getElementById('countryModal')).show();
    };
    window.countryShow = function (id) {
      secureFetch(BASE + '/show/' + id).then(function (res) {
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var o = res.obj.defaultData;
        _st('ctv_iso', o.isoCode); _st('ctv_iso2', o.isoCode2); _st('ctv_name', o.name);
        _st('ctv_nameNative', o.nameNative); _st('ctv_phone', o.phoneCode);
        _st('ctv_currency', (o.currencyCode || '') + (o.currencyName ? ' — ' + o.currencyName : ''));
        document.getElementById('ctv_status').innerHTML = o.active ? "<span class='badge bg-success'>Active</span>" : "<span class='badge bg-danger'>Inactive</span>";
        bootstrap.Modal.getOrCreateInstance(document.getElementById('countryViewModal')).show();
      });
    };
    window.countryEdit = function (id) {
      secureFetch(BASE + '/show/' + id).then(function (res) {
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var o = res.obj.defaultData; _reset();
        _loadCurrencies(o.currencyId);
        _v('countryId', o.id); _v('countryIso', o.isoCode); _v('countryIso2', o.isoCode2);
        _v('countryName', o.name); _v('countryNameNative', o.nameNative || '');
        _v('countryPhone', o.phoneCode || '');
        document.getElementById('countryActive').checked = o.active;
        document.getElementById('countryModalTitle').innerHTML = '<i class="fa fa-pencil me-1 text-warning"></i> Edit Country';
        document.getElementById('countryBtnText').textContent = 'Update';
        bootstrap.Modal.getOrCreateInstance(document.getElementById('countryModal')).show();
      });
    };
    window.countryToggle = function (id) { hsChangeStatus(BASE + '/toggle/' + id, dt, 'Country'); };
    window.countryDelete = function (id) { hsConfirmDelete(BASE + '/delete/' + id, dt); };

    function _onSubmit(e) {
      e.preventDefault();
      var sb = document.getElementById('countrySubmitBtn'), sp = document.getElementById('countrySpinner'), bt = document.getElementById('countryBtnText');
      hsDisableButton(sb, sp, bt);
      secureFetch(BASE + '/save', { method: 'POST', body: JSON.stringify({
        id: document.getElementById('countryId').value || null,
        currencyId: document.getElementById('countryCurrencyId').value,
        isoCode: document.getElementById('countryIso').value,
        isoCode2: document.getElementById('countryIso2').value,
        name: document.getElementById('countryName').value,
        nameNative: document.getElementById('countryNameNative').value,
        phoneCode: document.getElementById('countryPhone').value,
        active: document.getElementById('countryActive').checked
      })}).then(function (d) {
        if (d.success) { Swal.fire({ icon: 'success', title: 'Saved!', text: d.message, timer: 1600, showConfirmButton: false });
          bootstrap.Modal.getOrCreateInstance(document.getElementById('countryModal')).hide(); dt.ajax.reload(null, false);
        } else { Swal.fire('Error', d.message, 'error'); }
      }).catch(function (err) { Swal.fire('Error', err.message || 'Request failed.', 'error'); })
        .finally(function () { hsEnableButton(sb, sp, bt); });
    }
    function _reset() { document.getElementById('countryForm').reset(); document.getElementById('countryId').value = ''; document.getElementById('countryActive').checked = true; }
    function _v(id, v) { var e = document.getElementById(id); if (e) e.value = v || ''; }
    function _st(id, v) { var e = document.getElementById(id); if (e) e.textContent = v || '—'; }
  })();
  </script>
</section>
</html>
