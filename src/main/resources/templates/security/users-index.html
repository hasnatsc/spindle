<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════════╗
  ║  security/users-index.html                                           ║
  ║  Path  : src/main/resources/templates/security/users-index.html    ║
  ║  Extends: layout/base                                               ║
  ║  URL   : GET /users                                                 ║
  ║                                                                      ║
  ║  Fixes over uploaded version:                                        ║
  ║   • Removed raw <head>/<body> — now extends layout/base            ║
  ║   • Removed duplicate "Email" column in DataTable header/columns   ║
  ║   • dataEdit/dataShow/changePassword: uses                          ║
  ║     bootstrap.Modal.getOrCreateInstance() (not new bootstrap.Modal) ║
  ║   • confirmAndExecute calls now pass the DT instance (dataTables)  ║
  ║     not the raw DOM element (dataTable)                              ║
  ║   • dataShow: removed console.log, used template literals          ║
  ║   • changePassword: uses getOrCreateInstance                        ║
  ╚══════════════════════════════════════════════════════════════════════╝
-->
<html th:replace="~{layout/base :: layout('Users Management', ~{::section})}"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<section>

  <!-- Breadcrumb -->
  <ol class="breadcrumb float-xl-end">
    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Home</a></li>
    <li class="breadcrumb-item">Security</li>
    <li class="breadcrumb-item active">Users</li>
  </ol>
  <h1 class="page-header">Users Management <small>manage system users and access</small></h1>

  <div class="panel panel-inverse">

    <!-- Panel heading -->
    <div class="panel-heading">
      <div class="panel-title">
        <a href="javascript:;" onclick="userOpenCreate()">
          <span class="badge btn btn-outline-success">
            <i class="fa fa-user-plus me-1"></i> Create User
          </span>
        </a>
      </div>
      <div class="panel-heading-btn">
        <a href="javascript:;" class="btn btn-sm btn-icon btn-default" data-toggle="panel-expand">
          <i class="fa fa-expand"></i>
        </a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-success" data-toggle="panel-reload">
          <i class="fa fa-redo"></i>
        </a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-warning" data-toggle="panel-collapse">
          <i class="fa fa-minus"></i>
        </a>
      </div>
    </div>

    <!-- Panel body — DataTable -->
    <div class="panel-body">
      <table id="defaultTable" width="100%"
             class="table table-striped table-bordered align-middle text-nowrap">
        <thead>
          <tr>
            <th width="1%">SL</th>
            <th>Username</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Roles</th>
            <th class="text-center" width="8%">Status</th>
            <th>Created At</th>
            <th class="text-center" width="10%">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- Modal fragments -->
    <div th:replace="~{security/users-form     :: modalForm}"></div>
    <div th:replace="~{security/users-view     :: modalView}"></div>
    <div th:replace="~{security/users-password :: passwordModal}"></div>

  </div><!-- /panel -->

  <!-- ══ PAGE SCRIPT ══════════════════════════════════════════════════ -->
  <script>
  (function () {
    'use strict';

    /* ── State ──────────────────────────────────────────────────────── */
    var dataTables; // DataTable API instance — used by form fragment too

    /* ── DataTable init ─────────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', function () {

      dataTables = $('#defaultTable').DataTable({
        processing : true,
        serverSide : true,
        responsive : true,
        pageLength : 25,
        ajax: { url: '/users/list', type: 'GET' },
        columns: [
          { data: 'sl',         orderable: false, width: '40px' },
          { data: 'username'   },
          { data: 'full_name'  },
          { data: 'email'      },
          { data: 'phone'      },
          { data: 'roles',     orderable: false },
          { data: 'status',    orderable: false, className: 'text-center' },
          { data: 'created_at'},
          { data: 'actions',   orderable: false, className: 'text-center' }
        ],
        language: {
          emptyTable : 'No users found.',
          zeroRecords: 'No users matched the search.',
          processing : '<span class="spinner-border spinner-border-sm me-2"></span> Loading…'
        }
      });

      // Expose instance globally so form fragment can call dataTables.ajax.reload()
      window._userDT = dataTables;

    }); // end DOMContentLoaded

    /* ── Open CREATE modal ──────────────────────────────────────────── */
    window.userOpenCreate = function () {
      // Reset form first, then show modal
      if (typeof resetUserForm === 'function') resetUserForm();
      bootstrap.Modal.getOrCreateInstance(
        document.getElementById('defaultModal')
      ).show();
    };

    /* ── VIEW ───────────────────────────────────────────────────────── */
    window.dataShow = function (id) {
      secureFetch('/users/show/' + id).then(function (res) {
        var u = res.obj.defaultData;

        document.getElementById('username_show').textContent  = u.username  || '—';
        document.getElementById('fullName_show').textContent  = u.fullName  || '—';
        document.getElementById('email_show').textContent     = u.email     || '—';
        document.getElementById('phone_show').textContent     = u.phone     || '—';
        document.getElementById('dashboard_show').textContent = u.defaultDashboard || '—';

        document.getElementById('status_show').innerHTML = u.enabled
          ? "<span class='badge bg-success'>Active</span>"
          : "<span class='badge bg-danger'>Disabled</span>";

        document.getElementById('roles_show').innerHTML = buildBadges(u.roleNames, 'bg-primary', 'No Roles', function (n) { return n.replace('ROLE_', ''); });
        document.getElementById('organizations_show').innerHTML = buildBadges(u.organizationNames, 'bg-info');
        document.getElementById('businessUnits_show').innerHTML = buildBadges(u.businessUnitNames, 'bg-success');
        document.getElementById('costCenters_show').innerHTML   = buildBadges(u.costCenterNames,   'bg-warning');
        document.getElementById('warehouses_show').innerHTML    = buildBadges(u.warehouseNames,    'bg-purple');

        document.getElementById('createdAt_show').textContent  = u.createdAt   || '—';
        document.getElementById('updatedAt_show').textContent  = u.updatedAt   || '—';
        document.getElementById('lastLoginAt_show').textContent = u.lastLoginAt || 'Never';

        bootstrap.Modal.getOrCreateInstance(
          document.getElementById('defaultModalShow')
        ).show();
      }).catch(function (err) {
        Swal.fire('Error', err.message, 'error');
      });
    };

    /* ── EDIT ───────────────────────────────────────────────────────── */
    window.dataEdit = function (id) {
      secureFetch('/users/show/' + id).then(function (res) {
        var u = res.obj.defaultData;

        // Reset form state first
        if (typeof resetUserForm === 'function') resetUserForm();

        // Populate fields
        setVal('id',               u.id       || '');
        setVal('username',         u.username  || '');
        setVal('email',            u.email     || '');
        setVal('fullName',         u.fullName  || '');
        setVal('phone',            u.phone     || '');
        setVal('defaultDashboard', u.defaultDashboard || '');

        document.getElementById('enabled').checked = !!u.enabled;

        setSelect2('roleIds',         u.roleIds);
        setSelect2('organizationIds', u.organizationIds);
        setSelect2('businessUnitIds', u.businessUnitIds);
        setSelect2('costCenterIds',   u.costCenterIds);
        setSelect2('warehouseIds',    u.warehouseIds);

        // Hide password fields on edit
        document.getElementById('passwordSection').style.display         = 'none';
        document.getElementById('passwordFieldWrapper').style.display    = 'none';
        document.getElementById('confirmPasswordFieldWrapper').style.display = 'none';
        document.getElementById('password').removeAttribute('required');
        document.getElementById('confirmPassword').removeAttribute('required');

        document.getElementById('asgModalLabel').textContent = 'Edit User';

        bootstrap.Modal.getOrCreateInstance(
          document.getElementById('defaultModal')
        ).show();

      }).catch(function (err) {
        Swal.fire('Error', err.message, 'error');
      });
    };

    /* ── DELETE ─────────────────────────────────────────────────────── */
    window.dataDelete = function (id) {
      confirmAndExecute({
        title:        'Delete User?',
        text:         "This user will be soft-deleted and cannot log in.",
        icon:         'warning',
        confirmText:  'Yes, delete!',
        confirmColor: '#d33',
        url:          '/users/delete/' + id,
        method:       'DELETE',
        successTitle: 'Deleted!',
        reloadTable:  true,
        dataTable:    dataTables      // ✅ pass DT instance, not raw DOM element
      });
    };

    /* ── TOGGLE STATUS ──────────────────────────────────────────────── */
    window.dataChangeStatus = function (id) {
      confirmAndExecute({
        title:        'Change Status?',
        text:         "This will toggle the user's active status.",
        icon:         'question',
        url:          '/users/toggle-status/' + id,
        method:       'POST',
        successTitle: 'Status Changed!',
        reloadTable:  true,
        dataTable:    dataTables      // ✅ pass DT instance
      });
    };

    /* ── CHANGE PASSWORD ────────────────────────────────────────────── */
    window.changePassword = function (id) {
      document.getElementById('userId').value = id;
      document.getElementById('newPassword').value = '';
      document.getElementById('confirmPasswordChange').value = '';
      bootstrap.Modal.getOrCreateInstance(         // ✅ getOrCreateInstance
        document.getElementById('passwordModal')
      ).show();
    };

    /* ── HELPERS ────────────────────────────────────────────────────── */
    function setVal(id, val) {
      var el = document.getElementById(id);
      if (el) el.value = val;
    }

    function setSelect2(id, ids) {
      var $el = $('#' + id);
      $el.val(null).trigger('change');
      if (ids && ids.length) $el.val(ids).trigger('change');
    }

    function buildBadges(arr, cssClass, emptyLabel, transformFn) {
      emptyLabel = emptyLabel || 'None';
      if (!arr || !arr.length) {
        return "<span class='badge bg-secondary'>" + emptyLabel + "</span>";
      }
      return arr.map(function (item) {
        var label = transformFn ? transformFn(item) : item;
        return "<span class='badge " + cssClass + " me-1'>" + escHtml(label) + "</span>";
      }).join('');
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

  })();
  </script>

</section>
</html>
