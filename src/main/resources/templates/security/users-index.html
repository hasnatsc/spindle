<!DOCTYPE html>
<!--
  security/users-index.html
  Path  : src/main/resources/templates/security/users-index.html
  URL   : GET /users

  JS function → endpoint mapping:
    userShow(id)    → GET    /users/show/{id}       → opens view modal
    userEdit(id)    → GET    /users/show/{id}       → populates edit form
    userToggle(id)  → POST   /users/toggle/{id}     → toggle active/inactive
    userPwd(id)     → opens passwordModal (no fetch here)
    userDelete(id)  → DELETE /users/delete/{id}

  DataTable columns: sl / username / full_name / email / phone /
                     roles / status / created_at / actions
  — keys must match UserServiceImpl.datatableList() row map exactly.
-->
<html th:replace="~{layout/base :: layout('Users Management', ~{::section})}"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<section>

  <!-- Breadcrumb -->
  <ol class="breadcrumb float-xl-end">
    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Home</a></li>
    <li class="breadcrumb-item">Security</li>
    <li class="breadcrumb-item active">Users</li>
  </ol>
  <h1 class="page-header">
    Users Management <small>manage system users and access</small>
  </h1>

  <div class="panel panel-inverse">

    <!-- Panel heading -->
    <div class="panel-heading">
      <div class="panel-title">
        <a href="javascript:;" onclick="userOpenCreate()">
          <span class="badge btn btn-outline-success">
            <i class="fa fa-user-plus me-1"></i> Create User
          </span>
        </a>
      </div>
      <div class="panel-heading-btn">
        <a href="javascript:;" class="btn btn-sm btn-icon btn-default" data-toggle="panel-expand">
          <i class="fa fa-expand"></i>
        </a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-success" data-toggle="panel-reload">
          <i class="fa fa-redo"></i>
        </a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-warning" data-toggle="panel-collapse">
          <i class="fa fa-minus"></i>
        </a>
      </div>
    </div>

    <!-- Panel body — DataTable -->
    <div class="panel-body">
      <table id="defaultTable" width="100%"
             class="table table-striped table-bordered align-middle text-nowrap">
        <thead>
          <tr>
            <th width="1%">SL</th>
            <th>Username</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Roles</th>
            <th class="text-center" width="8%">Status</th>
            <th>Created At</th>
            <th class="text-center" width="12%">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- Modal fragments -->
    <div th:replace="~{security/users-form     :: modalForm}"></div>
    <div th:replace="~{security/users-view     :: modalView}"></div>
    <div th:replace="~{security/users-password :: passwordModal}"></div>

  </div><!-- /panel -->

  <!-- ══ PAGE SCRIPT ════════════════════════════════════════════════════════ -->
  <script>
  (function () {
    'use strict';

    /* ── State ──────────────────────────────────────────────────────────── */
    var dataTables;

    /* ── DataTable init ─────────────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', function () {

      dataTables = $('#defaultTable').DataTable({
        processing : true,
        serverSide : true,
        responsive : true,
        pageLength : 25,
        ajax: { url: '/users/list', type: 'GET' },
        columns: [
          { data: 'sl',         orderable: false, width: '40px' },
          { data: 'username'   },
          { data: 'full_name'  },
          { data: 'email'      },
          { data: 'phone'      },
          { data: 'roles',     orderable: false },
          { data: 'status',    orderable: false, className: 'text-center' },
          { data: 'created_at'},
          { data: 'actions',   orderable: false, className: 'text-center' }
        ],
        language: {
          emptyTable : 'No users found.',
          zeroRecords: 'No users matched the search.',
          processing : '<span class="spinner-border spinner-border-sm me-2"></span> Loading…'
        }
      });

      /* Expose globally so form fragment can reload after save */
      window._userDT = dataTables;

    });

    /* ══ CREATE ══════════════════════════════════════════════════════════ */
    window.userOpenCreate = function () {
      if (typeof resetUserForm === 'function') resetUserForm();
      bootstrap.Modal.getOrCreateInstance(
        document.getElementById('defaultModal')
      ).show();
    };

    /* ══ VIEW ════════════════════════════════════════════════════════════ */
    window.userShow = function (id) {
      secureFetch('/users/show/' + id).then(function (res) {
        if (!res.success) {
          Swal.fire('Error', res.message, 'error');
          return;
        }
        var u = res.obj.defaultData;

        setText('username_show',  u.username);
        setText('fullName_show',  u.fullName   || '—');
        setText('email_show',     u.email);
        setText('phone_show',     u.phone      || '—');
        setText('dashboard_show', u.defaultDashboardLabel || u.defaultDashboard || '—');

        document.getElementById('status_show').innerHTML = u.enabled
          ? "<span class='badge bg-success'>Active</span>"
          : "<span class='badge bg-danger'>Disabled</span>";

        /* Roles */
        document.getElementById('roles_show').innerHTML =
          badges(u.roleNames, 'bg-primary', 'No Roles',
                 function (n) { return n.replace('ROLE_', ''); });

        /* Access control */
        document.getElementById('organizations_show').innerHTML =
          badges(u.organizationNames, 'bg-info');
        document.getElementById('businessUnits_show').innerHTML =
          badges(u.businessUnitNames, 'bg-success');
        document.getElementById('costCenters_show').innerHTML =
          badges(u.costCenterNames,   'bg-warning text-dark');
        document.getElementById('warehouses_show').innerHTML =
          badges(u.warehouseNames,    'bg-secondary');

        /* Audit */
        setText('createdAt_show',   u.createdAt   || '—');
        setText('updatedAt_show',   u.updatedAt   || '—');
        setText('lastLoginAt_show', u.lastLoginAt || 'Never');

        bootstrap.Modal.getOrCreateInstance(
          document.getElementById('defaultModalShow')
        ).show();
      }).catch(function (err) {
        Swal.fire('Error', err.message || 'Failed to load user.', 'error');
      });
    };

    /* ══ EDIT ════════════════════════════════════════════════════════════ */
    window.userEdit = function (id) {
      secureFetch('/users/show/' + id).then(function (res) {
        if (!res.success) {
          Swal.fire('Error', res.message, 'error');
          return;
        }
        /* Delegate form population to form fragment's exposed function */
        if (typeof populateEditForm === 'function') {
          populateEditForm(res.obj.defaultData);
        }
        bootstrap.Modal.getOrCreateInstance(
          document.getElementById('defaultModal')
        ).show();
      }).catch(function (err) {
        Swal.fire('Error', err.message || 'Failed to load user.', 'error');
      });
    };

    /* ══ TOGGLE STATUS ═══════════════════════════════════════════════════ */
    window.userToggle = function (id) {
      Swal.fire({
        title:             'Change Status?',
        text:              "This will toggle the user's active/inactive status.",
        icon:              'question',
        showCancelButton:  true,
        confirmButtonColor:'#3085d6',
        cancelButtonColor: '#aaa',
        confirmButtonText: 'Yes, toggle!'
      }).then(function (result) {
        if (!result.isConfirmed) return;
        secureFetch('/users/toggle/' + id, { method: 'POST' })
          .then(function (data) {
            if (data.success) {
              Swal.fire({ icon: 'success', title: 'Done!', text: data.message,
                          timer: 1600, showConfirmButton: false });
              dataTables.ajax.reload(null, false);
            } else {
              Swal.fire('Error', data.message, 'error');
            }
          }).catch(function (err) {
            Swal.fire('Error', err.message || 'Request failed.', 'error');
          });
      });
    };

    /* ══ CHANGE PASSWORD ═════════════════════════════════════════════════ */
    window.userPwd = function (id) {
      /* Set the user id into the password modal's hidden field */
      var uid = document.getElementById('userId');
      if (uid) uid.value = id;
      /* Clear password fields */
      var np  = document.getElementById('newPassword');
      var cpw = document.getElementById('confirmPasswordChange');
      if (np)  np.value  = '';
      if (cpw) cpw.value = '';
      bootstrap.Modal.getOrCreateInstance(
        document.getElementById('passwordModal')
      ).show();
    };

    /* ══ DELETE ══════════════════════════════════════════════════════════ */
    window.userDelete = function (id) {
      Swal.fire({
        title:             'Delete User?',
        text:              'The user will be soft-deleted and cannot log in.',
        icon:              'warning',
        showCancelButton:  true,
        confirmButtonColor:'#d33',
        cancelButtonColor: '#aaa',
        confirmButtonText: 'Yes, delete!'
      }).then(function (result) {
        if (!result.isConfirmed) return;
        secureFetch('/users/delete/' + id, { method: 'DELETE' })
          .then(function (data) {
            if (data.success) {
              Swal.fire({ icon: 'success', title: 'Deleted!', text: data.message,
                          timer: 1600, showConfirmButton: false });
              dataTables.ajax.reload(null, false);
            } else {
              Swal.fire('Error', data.message, 'error');
            }
          }).catch(function (err) {
            Swal.fire('Error', err.message || 'Request failed.', 'error');
          });
      });
    };

    /* ══ HELPERS ═════════════════════════════════════════════════════════ */

    function setText(id, text) {
      var el = document.getElementById(id);
      if (el) el.textContent = text || '—';
    }

    function badges(arr, cssClass, emptyLabel, transformFn) {
      emptyLabel = emptyLabel || 'None';
      if (!arr || !arr.length) {
        return "<span class='badge bg-secondary'>" + emptyLabel + "</span>";
      }
      var items = Array.isArray(arr) ? arr : Array.from(arr);
      return items.map(function (item) {
        var label = transformFn ? transformFn(item) : item;
        return "<span class='badge " + cssClass + " me-1'>" + esc(label) + "</span>";
      }).join('');
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

  })();
  </script>

</section>
</html>
