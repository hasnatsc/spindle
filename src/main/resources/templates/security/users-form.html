<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════════╗
  ║  security/users-form.html                                            ║
  ║  Fragment: modalForm                                                 ║
  ║  Path: src/main/resources/templates/security/users-form.html       ║
  ║                                                                      ║
  ║  Inject: <div th:replace="~{security/users-form :: modalForm}">     ║
  ║                                                                      ║
  ║  Fixes over uploaded version:                                        ║
  ║   • openModal() renamed to resetUserForm() + exposed on window      ║
  ║     so users-index.html can call it safely before showing modal     ║
  ║   • openModal() no longer shows the modal itself (index does)       ║
  ║   • hsAfterSaveMessages: passes window._userDT (DT instance)        ║
  ║     instead of dataTables (undefined in this fragment scope)        ║
  ║   • getOrCreateInstance instead of new bootstrap.Modal()            ║
  ║   • ensureArray: removed stray console.log()                        ║
  ║   • All reference data loaded once on DOMContentLoaded, not on      ║
  ║     every modal open                                                 ║
  ║   • Select2 properly initialised after options are populated        ║
  ╚══════════════════════════════════════════════════════════════════════╝
-->
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<div th:fragment="modalForm">

  <!-- ══ CREATE / EDIT USER MODAL ══════════════════════════════════ -->
  <div tabindex="-1" aria-hidden="true" id="defaultModal" class="modal fade">
    <div class="modal-dialog modal-dialog-centered modal-xl modal-dialog-scrollable">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title" id="asgModalLabel">
            <i class="fa fa-user-plus me-1 text-success"></i> Create User
          </h5>
          <button type="button" data-bs-dismiss="modal"
                  class="btn-close" aria-label="Close"></button>
        </div>

        <form id="asgModalForm" novalidate>
          <div class="modal-body">
            <div id="successMessages"></div>
            <div class="hs-box">
              <div class="row g-2">

                <input name="id" id="id" type="hidden">

                <!-- ── Basic Information ─────────────────────────── -->
                <div class="col-12">
                  <h6 class="text-primary mb-2">
                    <i class="fa fa-user me-1"></i> Basic Information
                  </h6>
                  <hr class="mt-0 mb-2">
                </div>

                <div class="col-md-6 view-group">
                  <input name="username" id="username"
                         placeholder="Enter Username"
                         type="text" class="form-control hs_span_view" required>
                  <label for="username" class="input-label">
                    Username <span class="text-danger">*</span>
                  </label>
                </div>

                <div class="col-md-6 view-group">
                  <input name="fullName" id="fullName"
                         placeholder="Enter Full Name"
                         type="text" class="form-control hs_span_view">
                  <label for="fullName" class="input-label">Full Name</label>
                </div>

                <div class="col-md-4 view-group">
                  <input name="email" id="email"
                         placeholder="Enter Email"
                         type="email" class="form-control hs_span_view" required>
                  <label for="email" class="input-label">
                    Email <span class="text-danger">*</span>
                  </label>
                </div>

                <div class="col-md-4 view-group">
                  <input name="phone" id="phone"
                         placeholder="Enter Phone Number"
                         type="text" class="form-control hs_span_view">
                  <label for="phone" class="input-label">Phone</label>
                </div>

                <div class="col-md-4 mb-2 select-group">
                  <label for="defaultDashboard" class="view-label">
                    Default Dashboard <span class="text-danger">*</span>
                  </label>
                  <select name="defaultDashboard" id="defaultDashboard"
                          class="form-select" required>
                    <option value="">Select Dashboard</option>
                  </select>
                </div>

                <!-- ── Password (create only) ──────────────────── -->
                <div class="col-12" id="passwordSection">
                  <hr class="mt-1 mb-2">
                  <h6 class="text-warning mb-2">
                    <i class="fa fa-lock me-1"></i> Password
                  </h6>
                </div>

                <div class="col-md-6 view-group" id="passwordFieldWrapper">
                  <input name="password" id="password"
                         placeholder="Enter Password"
                         type="password" class="form-control hs_span_view" required
                         autocomplete="new-password">
                  <label for="password" class="input-label">
                    Password <span class="text-danger">*</span>
                  </label>
                </div>

                <div class="col-md-6 view-group" id="confirmPasswordFieldWrapper">
                  <input name="confirmPassword" id="confirmPassword"
                         placeholder="Confirm Password"
                         type="password" class="form-control hs_span_view" required
                         autocomplete="new-password">
                  <label for="confirmPassword" class="input-label">
                    Confirm Password <span class="text-danger">*</span>
                  </label>
                </div>

                <!-- ── Roles ───────────────────────────────────── -->
                <div class="col-12">
                  <hr class="mt-1 mb-2">
                  <h6 class="text-success mb-2">
                    <i class="fa fa-shield-alt me-1"></i> Roles &amp; Permissions
                  </h6>
                </div>

                <div class="col-md-12 mb-2 select-group">
                  <label for="roleIds" class="view-label">Roles</label>
                  <select name="roleIds" id="roleIds"
                          class="hsSelectTwo form-control" multiple></select>
                </div>

                <!-- ── Access Control ─────────────────────────── -->
                <div class="col-12">
                  <hr class="mt-1 mb-2">
                  <h6 class="text-info mb-1">
                    <i class="fa fa-building me-1"></i> Access Control
                  </h6>
                  <p class="text-muted small mb-2">
                    User can work only in the selected Organizations,
                    Business Units, Cost Centers, and Warehouses.
                  </p>
                </div>

                <div class="col-md-6 mb-2 select-group">
                  <label for="organizationIds" class="view-label">Allowed Organizations</label>
                  <select name="organizationIds" id="organizationIds"
                          class="hsSelectTwo form-control" multiple></select>
                </div>

                <div class="col-md-6 mb-2 select-group">
                  <label for="businessUnitIds" class="view-label">Allowed Business Units</label>
                  <select name="businessUnitIds" id="businessUnitIds"
                          class="hsSelectTwo form-control" multiple></select>
                </div>

                <div class="col-md-6 mb-2 select-group">
                  <label for="costCenterIds" class="view-label">Allowed Cost Centers</label>
                  <select name="costCenterIds" id="costCenterIds"
                          class="hsSelectTwo form-control" multiple></select>
                </div>

                <div class="col-md-6 mb-2 select-group">
                  <label for="warehouseIds" class="view-label">Allowed Warehouses</label>
                  <select name="warehouseIds" id="warehouseIds"
                          class="hsSelectTwo form-control" multiple></select>
                </div>

                <!-- ── Status ─────────────────────────────────── -->
                <div class="col-12">
                  <hr class="mt-1 mb-2">
                  <h6 class="text-secondary mb-2">
                    <i class="fa fa-info-circle me-1"></i> Status
                  </h6>
                </div>

                <div class="col-md-12 mb-2">
                  <div class="form-check form-switch">
                    <input type="checkbox" name="enabled" id="enabled"
                           class="form-check-input" checked>
                    <label class="form-check-label" for="enabled">
                      <strong>Active</strong>
                      <span class="text-muted ms-1">(uncheck to disable login)</span>
                    </label>
                  </div>
                </div>

              </div><!-- /row -->
            </div><!-- /hs-box -->
          </div><!-- /modal-body -->

          <div class="modal-footer">
            <button class="btn btn-success" type="submit" id="submitBtn">
              <span class="spinner-border spinner-border-sm me-2 d-none" id="spinner"></span>
              <span id="btnText">Save</span>
            </button>
            <button type="button" data-bs-dismiss="modal" class="btn btn-white">Cancel</button>
          </div>
        </form>

      </div>
    </div>
  </div>
  <!-- END modal -->

  <!-- ══ FORM SCRIPT ══════════════════════════════════════════════ -->
  <script>
  (function () {
    'use strict';

    var form      = null;
    var submitBtn = null;
    var spinner   = null;
    var btnText   = null;

    /* ── DOMContentLoaded: load reference data + init form ───────── */
    document.addEventListener('DOMContentLoaded', function () {

      form      = document.getElementById('asgModalForm');
      submitBtn = document.getElementById('submitBtn');
      spinner   = document.getElementById('spinner');
      btnText   = document.getElementById('btnText');

      // Load all reference data once on page load
      loadOptions('/users/roles/all',         'roleIds',         function (r) { return r.name + (r.description ? ' — ' + r.description : ''); });
      loadOptions('/users/organizations/all', 'organizationIds', function (r) { return r.name + (r.code ? ' (' + r.code + ')' : ''); });
      loadOptions('/users/business-units/all','businessUnitIds', function (r) { return r.name + (r.code ? ' (' + r.code + ')' : ''); });
      loadOptions('/users/cost-centers/all',  'costCenterIds',   function (r) { return r.name + (r.code ? ' (' + r.code + ')' : ''); });
      loadOptions('/users/warehouses/all',    'warehouseIds',    function (r) { return r.name + (r.code ? ' (' + r.code + ')' : ''); });
      loadOptions('/users/dashboards/all',    'defaultDashboard',function (r) { return r.displayName; }, function (r) { return r.name; });

      // Init Parsley validation
      $(form).parsley();

      // Form submit handler
      form.addEventListener('submit', onFormSubmit);

    }); // end DOMContentLoaded


    /* ── Form submit ─────────────────────────────────────────────── */
    function onFormSubmit(e) {
      e.preventDefault();

      var isEditing = !!document.getElementById('id').value;
      var password  = document.getElementById('password').value;
      var confirm   = document.getElementById('confirmPassword').value;

      // Validate password on create
      if (!isEditing) {
        if (!password || password.length < 6) {
          Swal.fire({ icon: 'error', title: 'Validation', text: 'Password must be at least 6 characters.' });
          return;
        }
        if (password !== confirm) {
          Swal.fire({ icon: 'error', title: 'Validation', text: 'Passwords do not match.' });
          return;
        }
      }

      hsDisableButton(submitBtn, spinner, btnText);

      var payload = objectifyForm(form);
      payload.enabled         = document.getElementById('enabled').checked;
      payload.roleIds         = getMultiSelectValues('roleIds');
      payload.organizationIds = getMultiSelectValues('organizationIds');
      payload.businessUnitIds = getMultiSelectValues('businessUnitIds');
      payload.costCenterIds   = getMultiSelectValues('costCenterIds');
      payload.warehouseIds    = getMultiSelectValues('warehouseIds');
      payload.defaultDashboard = document.getElementById('defaultDashboard').value;

      secureFetch('/users/save', {
        method: 'POST',
        body:   JSON.stringify(payload)
      })
      .then(function (data) {
        // ✅ Use window._userDT (the DT instance from users-index.html)
        hsAfterSaveMessages(data.message, data.success, form, window._userDT);
        if (data.success) {
          bootstrap.Modal.getOrCreateInstance(
            document.getElementById('defaultModal')
          ).hide();
        }
      })
      .catch(function (err) {
        hsAfterSaveMessages(err.message || 'Request failed.', false, null, null);
      })
      .finally(function () {
        hsEnableButton(submitBtn, spinner, btnText);
      });
    }


    /* ── resetUserForm — called by index before showing modal ─────── */
    window.resetUserForm = function () {
      if (!form) return;
      hsResetForm(form);
      document.getElementById('enabled').checked = true;
      document.getElementById('asgModalLabel').innerHTML =
        '<i class="fa fa-user-plus me-1 text-success"></i> Create User';

      // Reset all Select2 widgets
      ['roleIds', 'organizationIds', 'businessUnitIds', 'costCenterIds', 'warehouseIds'].forEach(function (id) {
        $('#' + id).val(null).trigger('change');
      });

      // Show password fields
      showEl('passwordSection',             true);
      showEl('passwordFieldWrapper',        true);
      showEl('confirmPasswordFieldWrapper', true);
      var pwd = document.getElementById('password');
      var cpw = document.getElementById('confirmPassword');
      if (pwd) pwd.setAttribute('required', 'required');
      if (cpw) cpw.setAttribute('required', 'required');
    };


    /* ── HELPERS ─────────────────────────────────────────────────── */

    /**
     * Load options into a <select> from an API endpoint.
     * Initialises Select2 after population.
     * @param {string}   url
     * @param {string}   selectId
     * @param {Function} textFn(item) → option label
     * @param {Function} [valueFn(item)] → option value (default: item.id)
     */
    function loadOptions(url, selectId, textFn, valueFn) {
      secureFetch(url).then(function (data) {
        var select = document.getElementById(selectId);
        if (!select) return;

        // Preserve placeholder option if present
        var placeholder = select.querySelector('option[value=""]');

        // Clear and re-add options
        while (select.options.length > 0) select.remove(0);
        if (placeholder) select.appendChild(placeholder);

        data.forEach(function (item) {
          var opt   = document.createElement('option');
          opt.value = valueFn ? valueFn(item) : item.id;
          opt.text  = textFn(item);
          select.appendChild(opt);
        });

        // Init Select2 if it's a multi-select (class hsSelectTwo)
        if (select.classList.contains('hsSelectTwo') || select.multiple) {
          var $el = $(select);
          if ($el.hasClass('select2-hidden-accessible')) $el.select2('destroy');
          $el.select2({
            dropdownParent: $('#defaultModal'),
            width:          '100%',
            placeholder:    'Select…',
            allowClear:     true
          });
        }
      }).catch(function (err) {
        console.warn('[users-form] Could not load ' + selectId + ':', err.message);
      });
    }

    function getMultiSelectValues(id) {
      var el = document.getElementById(id);
      if (!el) return [];
      return Array.from(el.selectedOptions).map(function (o) { return Number(o.value); }).filter(Boolean);
    }

    function showEl(id, visible) {
      var el = document.getElementById(id);
      if (el) el.style.display = visible ? '' : 'none';
    }

  })();
  </script>

</div><!-- /th:fragment -->
</body>
</html>
