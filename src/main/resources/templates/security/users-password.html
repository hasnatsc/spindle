<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════════╗
  ║  security/users-password.html                                        ║
  ║  Fragment: passwordModal                                             ║
  ║  Path: src/main/resources/templates/security/users-password.html   ║
  ║                                                                      ║
  ║  Inject: <div th:replace="~{security/users-password :: passwordModal}">
  ║                                                                      ║
  ║  Fixes over uploaded version:                                        ║
  ║   • bootstrap.Modal.getInstance → getOrCreateInstance               ║
  ║     (getInstance returns null before first open → crash)            ║
  ║   • submitWithSecureFetch: button label is now restored to          ║
  ║     "Change Password" correctly via stored originalText             ║
  ║     (works with the fixed application.js)                           ║
  ║   • All vars moved inside IIFE — no global leaks                    ║
  ║   • Parsley init guarded with null check                            ║
  ╚══════════════════════════════════════════════════════════════════════╝
-->
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="passwordModal">

  <div tabindex="-1" aria-hidden="true" id="passwordModal" class="modal fade">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">
            <i class="fa fa-key me-1 text-warning"></i> Change Password
          </h5>
          <button type="button" data-bs-dismiss="modal"
                  class="btn-close" aria-label="Close"></button>
        </div>

        <form id="passwordForm" novalidate>
          <div class="modal-body">
            <div class="hs-box">
              <div class="row g-2">

                <input type="hidden" id="userId" name="userId">

                <div class="col-12">
                  <div class="alert alert-info py-2 mb-1">
                    <i class="fa fa-info-circle me-1"></i>
                    Password must be at least <strong>6 characters</strong>.
                  </div>
                </div>

                <!-- New Password -->
                <div class="col-md-12 view-group">
                  <input name="newPassword" id="newPassword"
                         placeholder="Enter New Password"
                         type="password" class="form-control hs_span_view"
                         required autocomplete="new-password">
                  <label for="newPassword" class="input-label">
                    New Password <span class="text-danger">*</span>
                  </label>
                </div>

                <!-- Confirm Password -->
                <div class="col-md-12 view-group">
                  <input name="confirmPasswordChange" id="confirmPasswordChange"
                         placeholder="Confirm New Password"
                         type="password" class="form-control hs_span_view"
                         required autocomplete="new-password">
                  <label for="confirmPasswordChange" class="input-label">
                    Confirm Password <span class="text-danger">*</span>
                  </label>
                </div>

              </div>
            </div>
          </div><!-- /modal-body -->

          <div class="modal-footer">
            <button class="btn btn-primary" type="submit" id="passwordSubmitBtn">
              <span class="spinner-border spinner-border-sm me-2 d-none"
                    id="passwordSpinner"></span>
              <span id="passwordBtnText">Change Password</span>
            </button>
            <button type="button" data-bs-dismiss="modal"
                    class="btn btn-white">Cancel</button>
          </div>
        </form>

      </div>
    </div>
  </div>

  <!-- ══ SCRIPT ═════════════════════════════════════════════════════ -->
  <script>
  (function () {
    'use strict';

    document.addEventListener('DOMContentLoaded', function () {

      var form      = document.getElementById('passwordForm');
      var submitBtn = document.getElementById('passwordSubmitBtn');
      var spinner   = document.getElementById('passwordSpinner');
      var btnText   = document.getElementById('passwordBtnText');

      if (!form) return;

      // Init Parsley if available
      if (typeof $ !== 'undefined' && $.fn.parsley) {
        $(form).parsley();
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();

        var newPassword  = document.getElementById('newPassword').value;
        var confirmPwd   = document.getElementById('confirmPasswordChange').value;
        var userId       = document.getElementById('userId').value;

        // Client-side validation
        if (newPassword !== confirmPwd) {
          Swal.fire({ icon: 'error', title: 'Error!', text: 'Passwords do not match!' });
          return;
        }
        if (newPassword.length < 6) {
          Swal.fire({ icon: 'error', title: 'Error!', text: 'Password must be at least 6 characters!' });
          return;
        }

        submitWithSecureFetch({
          url:          '/users/change-password/' + userId,
          method:       'POST',
          body:         { newPassword: newPassword, confirmPassword: confirmPwd },
          submitBtn:    submitBtn,
          spinner:      spinner,
          btnText:      btnText,
          loadingText:  'Changing…',
          successTitle: 'Success!',
          onSuccess: function () {
            // ✅ getOrCreateInstance — safe to call even before first open
            bootstrap.Modal.getOrCreateInstance(
              document.getElementById('passwordModal')
            ).hide();
            form.reset();
          }
        });
      });

    }); // end DOMContentLoaded

  })();
  </script>

</div>

</body>
</html>
