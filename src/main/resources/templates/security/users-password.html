<!DOCTYPE html>
<!--
  FRAGMENT: security/users-password :: passwordModal
  Change Password modal.
  Inject: <div th:replace="~{security/users-password :: passwordModal}"></div>
-->
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="passwordModal">

  <div class="modal fade" id="passwordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">
            <i class="fa fa-key me-1 text-warning"></i> Change Password
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <form id="passwordForm" novalidate>
          <div class="modal-body">
            <div class="hs-box">
              <div class="row">

                <input type="hidden" id="pwdUserId">

                <div class="col-12 mb-2">
                  <div class="alert alert-info py-2 mb-0">
                    <i class="fa fa-info-circle me-1"></i>
                    Password must be at least <strong>8 characters</strong>.
                  </div>
                </div>

                <div class="col-12 view-group">
                  <input type="password" id="pwdNewPassword" name="newPassword"
                         class="form-control hs_span_view"
                         placeholder="Enter new password" required
                         autocomplete="new-password">
                  <label for="pwdNewPassword" class="input-label">
                    New Password <span class="text-danger">*</span>
                  </label>
                </div>

                <div class="col-12 view-group">
                  <input type="password" id="pwdConfirmPassword" name="confirmPassword"
                         class="form-control hs_span_view"
                         placeholder="Confirm new password" required
                         autocomplete="new-password">
                  <label for="pwdConfirmPassword" class="input-label">
                    Confirm Password <span class="text-danger">*</span>
                  </label>
                </div>

              </div>
            </div>
          </div><!-- /modal-body -->

          <div class="modal-footer">
            <button type="submit" class="btn btn-primary" id="pwdSubmitBtn">
              <span class="spinner-border spinner-border-sm me-2 d-none" id="pwdSpinner"></span>
              <span id="pwdBtnText">Change Password</span>
            </button>
            <button type="button" class="btn btn-white" data-bs-dismiss="modal">Cancel</button>
          </div>
        </form>

      </div>
    </div>
  </div>

  <script>
  (function () {
    const form      = document.getElementById('passwordForm');
    const submitBtn = document.getElementById('pwdSubmitBtn');
    const spinner   = document.getElementById('pwdSpinner');
    const btnText   = document.getElementById('pwdBtnText');

    document.addEventListener('DOMContentLoaded', function () {
      form.addEventListener('submit', function (e) {
        e.preventDefault();

        const id  = document.getElementById('pwdUserId').value;
        const pw  = document.getElementById('pwdNewPassword').value;
        const cpw = document.getElementById('pwdConfirmPassword').value;

        if (!pw || pw.length < 8) {
          Swal.fire('Validation', 'Password must be at least 8 characters.', 'error');
          return;
        }
        if (pw !== cpw) {
          Swal.fire('Validation', 'Passwords do not match.', 'error');
          return;
        }

        submitWithSecureFetch({
          url:         `/users/change-password/${id}`,
          method:      'POST',
          body:        { newPassword: pw, confirmPassword: cpw },
          submitBtn,
          spinner,
          btnText,
          loadingText: 'Saving…',
          successTitle:'Password Changed!',
          onSuccess:   () => {
            bootstrap.Modal.getInstance(
                document.getElementById('passwordModal')
            )?.hide();
            form.reset();
          }
        });
      });
    });
  })();
  </script>

</div>
</body>
</html>
