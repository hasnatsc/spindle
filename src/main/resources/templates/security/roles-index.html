<!DOCTYPE html>
<!--
  security/roles-index.html
  URL: GET /roles
  JS fns: roleShow / roleEdit / roleToggle / roleDelete / roleOpenCreate
-->
<html th:replace="~{layout/base :: layout('Roles Management', ~{::section})}"
      xmlns:th="http://www.thymeleaf.org">
<section>

  <ol class="breadcrumb float-xl-end">
    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Home</a></li>
    <li class="breadcrumb-item">Security</li>
    <li class="breadcrumb-item active">Roles</li>
  </ol>
  <h1 class="page-header">Roles Management <small>define roles and assign permissions</small></h1>

  <div class="panel panel-inverse">
    <div class="panel-heading">
      <div class="panel-title">
        <a href="javascript:;" onclick="roleOpenCreate()">
          <span class="badge btn btn-outline-success">
            <i class="fa fa-plus me-1"></i> Create Role
          </span>
        </a>
      </div>
      <div class="panel-heading-btn">
        <a href="javascript:;" class="btn btn-sm btn-icon btn-success" data-toggle="panel-reload"><i class="fa fa-redo"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-warning" data-toggle="panel-collapse"><i class="fa fa-minus"></i></a>
      </div>
    </div>
    <div class="panel-body">
      <table id="roleTable" width="100%"
             class="table table-striped table-bordered align-middle text-nowrap">
        <thead>
          <tr>
            <th width="1%">SL</th>
            <th>Role Name</th>
            <th>Display Name</th>
            <th>Name (BN)</th>
            <th>Description</th>
            <th class="text-center">Permissions</th>
            <th class="text-center">Users</th>
            <th class="text-center" width="7%">Status</th>
            <th>Created At</th>
            <th class="text-center" width="12%">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- ══ CREATE / EDIT MODAL ═══════════════════════════════════════════════ -->
    <div tabindex="-1" id="roleModal" class="modal fade" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="roleModalTitle">
              <i class="fa fa-user-shield me-1 text-success"></i> Create Role
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="roleForm" novalidate>
            <div class="modal-body">
              <div class="hs-box">
                <div class="row g-2">
                  <input type="hidden" id="roleId">

                  <!-- Basic -->
                  <div class="col-12">
                    <h6 class="text-primary mb-1"><i class="fa fa-tag me-1"></i> Role Information</h6>
                    <hr class="mt-0 mb-2">
                  </div>

                  <div class="col-md-6 view-group">
                    <input id="roleName" placeholder="e.g. SALES_MANAGER"
                           type="text" class="form-control hs_span_view" required maxlength="100">
                    <label for="roleName" class="input-label">
                      Role Name <span class="text-danger">*</span>
                      <small class="text-muted">(ROLE_ prefix added automatically)</small>
                    </label>
                  </div>

                  <div class="col-md-6 view-group">
                    <input id="roleNameBn" placeholder="বাংলা নাম"
                           type="text" class="form-control hs_span_view" maxlength="250">
                    <label for="roleNameBn" class="input-label">Name (Bengali)</label>
                  </div>

                  <div class="col-md-12 view-group">
                    <input id="roleDescription" placeholder="Brief description of this role's purpose"
                           type="text" class="form-control hs_span_view" maxlength="255">
                    <label for="roleDescription" class="input-label">Description</label>
                  </div>

                  <div class="col-md-6 mb-2">
                    <label for="roleMasterRole" class="view-label">Master Role</label>
                    <select id="roleMasterRole" class="form-select">
                      <option value="">— Select master role —</option>
                    </select>
                  </div>

                  <div class="col-md-6 mb-2 d-flex align-items-end pb-2">
                    <div class="form-check form-switch">
                      <input type="checkbox" id="roleActive" class="form-check-input" checked>
                      <label class="form-check-label" for="roleActive">
                        <strong>Active</strong>
                      </label>
                    </div>
                  </div>

                  <!-- Permissions -->
                  <div class="col-12">
                    <hr class="mt-1 mb-2">
                    <h6 class="text-success mb-1">
                      <i class="fa fa-key me-1"></i> Permissions
                      <small class="text-muted ms-2" id="permCountBadge"></small>
                    </h6>
                    <div class="mb-2 d-flex gap-2 flex-wrap">
                      <button type="button" class="btn btn-xs btn-outline-success" onclick="selectAllPerms()">Select All</button>
                      <button type="button" class="btn btn-xs btn-outline-secondary" onclick="clearAllPerms()">Clear All</button>
                      <input type="text" id="permSearch" class="form-control form-control-sm" placeholder="Filter permissions…" style="max-width:220px">
                    </div>
                    <div id="permissionsContainer" style="max-height:380px;overflow-y:auto;border:1px solid var(--bs-border-color);border-radius:6px;padding:10px">
                      <div class="text-center text-muted py-3"><i class="fa fa-spinner fa-spin me-1"></i> Loading permissions…</div>
                    </div>
                  </div>

                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-success" type="submit" id="roleSubmitBtn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="roleSpinner"></span>
                <span id="roleBtnText">Save Role</span>
              </button>
              <button type="button" class="btn btn-white" data-bs-dismiss="modal">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- ══ VIEW MODAL ════════════════════════════════════════════════════════ -->
    <div tabindex="-1" id="roleViewModal" class="modal fade" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title"><i class="fa fa-user-shield me-1 text-primary"></i> Role Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="hs-box">
              <div class="row g-2">
                <div class="col-md-6 view-group">
                  <label class="view-label">Role Name</label>
                  <span id="rv_name" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-6 view-group">
                  <label class="view-label">Display Name</label>
                  <span id="rv_displayName" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-6 view-group">
                  <label class="view-label">Name (Bengali)</label>
                  <span id="rv_nameBn" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-6 view-group">
                  <label class="view-label">Master Role</label>
                  <span id="rv_masterRole" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-12 view-group">
                  <label class="view-label">Description</label>
                  <span id="rv_description" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Status</label>
                  <span id="rv_status" class="form-control hs_span_show" style="min-height:38px"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Permissions</label>
                  <span id="rv_permCount" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Created At</label>
                  <span id="rv_createdAt" class="form-control hs_span_show"></span>
                </div>
                <div class="col-12">
                  <label class="view-label">Assigned Permissions</label>
                  <div id="rv_permissions" class="form-control" style="height:auto;min-height:60px"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-white" data-bs-dismiss="modal"><i class="fa fa-times me-1"></i> Close</button>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /panel -->

  <!-- ══ SCRIPT ════════════════════════════════════════════════════════════ -->
  <script>
  (function () {
    'use strict';

    var dt;
    var allPermsGrouped = {};  // module → [{id,name,description}]

    /* ── DataTable ────────────────────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', function () {
      dt = $('#roleTable').DataTable({
        processing: true, serverSide: true, responsive: true, pageLength: 25,
        ajax: { url: '/roles/list', type: 'GET' },
        columns: [
          { data: 'sl',          orderable: false, width: '40px' },
          { data: 'name',        orderable: false },
          { data: 'display_name'},
          { data: 'name_bn' },
          { data: 'description' },
          { data: 'permissions', orderable: false, className: 'text-center' },
          { data: 'users',       orderable: false, className: 'text-center' },
          { data: 'status',      orderable: false, className: 'text-center' },
          { data: 'created_at' },
          { data: 'actions',     orderable: false, className: 'text-center' }
        ],
        language: { emptyTable: 'No roles found.', processing: '<span class="spinner-border spinner-border-sm me-2"></span> Loading…' }
      });
      window._roleDT = dt;

      /* Load permissions once for the form */
      loadPermissions();

      /* Load master role options */
      loadMasterRoles();

      /* Permission filter input */
      document.getElementById('permSearch').addEventListener('input', function () {
        filterPermissions(this.value.trim().toLowerCase());
      });

      /* Form submit */
      document.getElementById('roleForm').addEventListener('submit', onSubmit);
    });

    /* ── OPEN CREATE ──────────────────────────────────────────────────────── */
    window.roleOpenCreate = function () {
      resetForm();
      document.getElementById('roleModalTitle').innerHTML =
        '<i class="fa fa-plus me-1 text-success"></i> Create Role';
      document.getElementById('roleBtnText').textContent = 'Save Role';
      bootstrap.Modal.getOrCreateInstance(document.getElementById('roleModal')).show();
    };

    /* ── VIEW ────────────────────────────────────────────────────────────── */
    window.roleShow = function (id) {
      secureFetch('/roles/show/' + id).then(function (res) {
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var r = res.obj.defaultData;
        setText('rv_name',        r.name);
        setText('rv_displayName', r.displayName || r.name.replace('ROLE_',''));
        setText('rv_nameBn',      r.nameBn || '—');
        setText('rv_masterRole',  r.masterRole || '—');
        setText('rv_description', r.description || '—');
        setText('rv_permCount',   (r.permissionCount || 0) + ' permissions');
        setText('rv_createdAt',   r.createdAt || '—');
        document.getElementById('rv_status').innerHTML = r.active
          ? "<span class='badge bg-success'>Active</span>"
          : "<span class='badge bg-danger'>Inactive</span>";
        var perms = Array.isArray(r.permissionNames) ? r.permissionNames : Array.from(r.permissionNames || []);
        document.getElementById('rv_permissions').innerHTML = perms.length
          ? perms.map(function(n){ return "<span class='badge bg-secondary me-1 mb-1'>"+esc(n)+"</span>"; }).join('')
          : "<span class='text-muted'>None</span>";
        bootstrap.Modal.getOrCreateInstance(document.getElementById('roleViewModal')).show();
      });
    };

    /* ── EDIT ────────────────────────────────────────────────────────────── */
    window.roleEdit = function (id) {
      secureFetch('/roles/show/' + id).then(function (res) {
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var r = res.obj.defaultData;
        resetForm();
        document.getElementById('roleId').value = r.id;
        document.getElementById('roleName').value = r.name.replace('ROLE_','');
        document.getElementById('roleNameBn').value = r.nameBn || '';
        document.getElementById('roleDescription').value = r.description || '';
        document.getElementById('roleMasterRole').value = r.masterRole || '';
        document.getElementById('roleActive').checked = r.active;

        /* Tick assigned permissions */
        var ids = Array.isArray(r.permissionIds) ? r.permissionIds : Array.from(r.permissionIds || []);
        ids.forEach(function (id) {
          var cb = document.getElementById('perm_' + id);
          if (cb) cb.checked = true;
        });
        updatePermCount();

        document.getElementById('roleModalTitle').innerHTML =
          '<i class="fa fa-pencil me-1 text-warning"></i> Edit Role';
        document.getElementById('roleBtnText').textContent = 'Update Role';
        bootstrap.Modal.getOrCreateInstance(document.getElementById('roleModal')).show();
      });
    };

    /* ── TOGGLE ──────────────────────────────────────────────────────────── */
    window.roleToggle = function (id) {
      Swal.fire({ title:'Change Status?', icon:'question',
        showCancelButton:true, confirmButtonText:'Yes, toggle!',
        confirmButtonColor:'#3085d6' }).then(function(r){
        if (!r.isConfirmed) return;
        secureFetch('/roles/toggle/' + id, { method:'POST' }).then(function(data){
          if (data.success) { dt.ajax.reload(null,false); }
          else Swal.fire('Error', data.message, 'error');
        });
      });
    };

    /* ── DELETE ──────────────────────────────────────────────────────────── */
    window.roleDelete = function (id) {
      Swal.fire({ title:'Delete Role?', text:'This cannot be undone.', icon:'warning',
        showCancelButton:true, confirmButtonColor:'#d33', confirmButtonText:'Yes, delete!' })
        .then(function(r){
        if (!r.isConfirmed) return;
        secureFetch('/roles/delete/' + id, { method:'DELETE' }).then(function(data){
          if (data.success) {
            Swal.fire({ icon:'success', title:'Deleted!', text:data.message, timer:1500, showConfirmButton:false });
            dt.ajax.reload(null,false);
          } else Swal.fire('Error', data.message, 'error');
        });
      });
    };

    /* ── SUBMIT ──────────────────────────────────────────────────────────── */
    function onSubmit(e) {
      e.preventDefault();
      var submitBtn = document.getElementById('roleSubmitBtn');
      var spinner   = document.getElementById('roleSpinner');
      var btnText   = document.getElementById('roleBtnText');
      hsDisableButton(submitBtn, spinner, btnText);

      var permIds = Array.from(
        document.querySelectorAll('#permissionsContainer input[type=checkbox]:checked')
      ).map(function(cb){ return Number(cb.value); });

      var payload = {
        id:           document.getElementById('roleId').value || null,
        name:         document.getElementById('roleName').value.trim(),
        nameBn:       document.getElementById('roleNameBn').value.trim(),
        description:  document.getElementById('roleDescription').value.trim(),
        masterRole:   document.getElementById('roleMasterRole').value || null,
        active:       document.getElementById('roleActive').checked,
        permissionIds: permIds
      };

      secureFetch('/roles/save', { method:'POST', body: JSON.stringify(payload) })
        .then(function(data){
          if (data.success) {
            Swal.fire({ icon:'success', title:'Success!', text:data.message, timer:1600, showConfirmButton:false });
            bootstrap.Modal.getOrCreateInstance(document.getElementById('roleModal')).hide();
            dt.ajax.reload(null,false);
          } else {
            Swal.fire('Error', data.message, 'error');
          }
        })
        .catch(function(err){ Swal.fire('Error', err.message||'Failed.', 'error'); })
        .finally(function(){ hsEnableButton(submitBtn, spinner, btnText); });
    }

    /* ── PERMISSIONS PANEL ───────────────────────────────────────────────── */
    function loadPermissions() {
      secureFetch('/roles/permissions/all').then(function(grouped){
        allPermsGrouped = grouped;
        renderPermissions(grouped);
      }).catch(function(err){ console.warn('perms:', err.message); });
    }

    function renderPermissions(grouped) {
      var container = document.getElementById('permissionsContainer');
      var html = '';
      Object.keys(grouped).forEach(function(module){
        html += "<div class='mb-3'>";
        html += "<div class='fw-semibold text-primary mb-1 border-bottom pb-1'>"
              + "<i class='fa fa-cube me-1'></i>" + esc(module) + "</div>";
        html += "<div class='row g-1'>";
        grouped[module].forEach(function(p){
          html += "<div class='col-md-6 perm-item' data-name='" + esc(p.name.toLowerCase()) + "'>";
          html += "<div class='form-check'>";
          html += "<input type='checkbox' class='form-check-input perm-cb' id='perm_" + p.id
                + "' value='" + p.id + "' onchange='updatePermCount()'>";
          html += "<label class='form-check-label small' for='perm_" + p.id + "'>"
                + "<code class='text-success' style='font-size:.75rem'>" + esc(p.name) + "</code>";
          if (p.description) html += "<br><span class='text-muted' style='font-size:.7rem'>" + esc(p.description) + "</span>";
          html += "</label></div></div>";
        });
        html += "</div></div>";
      });
      container.innerHTML = html || '<p class="text-muted">No permissions found.</p>';
    }

    function filterPermissions(q) {
      document.querySelectorAll('#permissionsContainer .perm-item').forEach(function(el){
        el.style.display = (!q || el.dataset.name.includes(q)) ? '' : 'none';
      });
    }

    window.selectAllPerms = function() {
      document.querySelectorAll('#permissionsContainer .perm-cb').forEach(function(cb){ cb.checked = true; });
      updatePermCount();
    };

    window.clearAllPerms = function() {
      document.querySelectorAll('#permissionsContainer .perm-cb').forEach(function(cb){ cb.checked = false; });
      updatePermCount();
    };

    window.updatePermCount = function() {
      var n = document.querySelectorAll('#permissionsContainer .perm-cb:checked').length;
      document.getElementById('permCountBadge').textContent = '(' + n + ' selected)';
    };

    /* ── MASTER ROLE OPTIONS ────────────────────────────────────────────── */
    function loadMasterRoles() {
      secureFetch('/roles/list?draw=1&start=0&length=200').then(function(data){
        var sel = document.getElementById('roleMasterRole');
        (data.data||[]).forEach(function(r){
          var opt = document.createElement('option');
          opt.value = r.display_name; // store canonical ROLE_xxx form
          opt.text  = r.display_name;
          sel.appendChild(opt);
        });
      }).catch(function(){});
    }

    /* ── HELPERS ─────────────────────────────────────────────────────────── */
    function resetForm() {
      document.getElementById('roleForm').reset();
      document.getElementById('roleId').value = '';
      document.getElementById('roleActive').checked = true;
      clearAllPerms();
      document.getElementById('permCountBadge').textContent = '';
    }

    function setText(id, val) {
      var el = document.getElementById(id); if (el) el.textContent = val || '—';
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

  })();
  </script>

</section>
</html>
