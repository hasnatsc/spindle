<!DOCTYPE html>
<!--
  security/menus-index.html
  URL: GET /menus
  JS fns: menuShow / menuEdit / menuToggle / menuDelete / menuOpenCreate
-->
<html th:replace="~{layout/base :: layout('Menu Management', ~{::section})}"
      xmlns:th="http://www.thymeleaf.org">
<section>

  <ol class="breadcrumb float-xl-end">
    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Home</a></li>
    <li class="breadcrumb-item">Security</li>
    <li class="breadcrumb-item active">Menus</li>
  </ol>
  <h1 class="page-header">Menu Management <small>configure navigation menus and access</small></h1>

  <div class="panel panel-inverse">
    <div class="panel-heading">
      <div class="panel-title">
        <a href="javascript:;" onclick="menuOpenCreate()">
          <span class="badge btn btn-outline-success"><i class="fa fa-plus me-1"></i> Add Menu</span>
        </a>
      </div>
      <div class="panel-heading-btn">
        <a href="javascript:;" class="btn btn-sm btn-icon btn-success" data-toggle="panel-reload"><i class="fa fa-redo"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-warning" data-toggle="panel-collapse"><i class="fa fa-minus"></i></a>
      </div>
    </div>

    <div class="panel-body">
      <table id="menuTable" width="100%"
             class="table table-striped table-bordered align-middle">
        <thead>
          <tr>
            <th width="1%">SL</th>
            <th>Code</th>
            <th>Name</th>
            <th>Type</th>
            <th>Parent</th>
            <th>URL</th>
            <th>Icon</th>
            <th class="text-center" width="4%">Order</th>
            <th class="text-center" width="7%">Status</th>
            <th class="text-center" width="12%">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- ══ CREATE / EDIT MODAL ═════════════════════════════════════════════ -->
    <div tabindex="-1" id="menuModal" class="modal fade" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="menuModalTitle">
              <i class="fa fa-bars me-1 text-success"></i> Add Menu
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="menuForm" novalidate>
            <div class="modal-body">
              <div class="hs-box">
                <div class="row g-2">
                  <input type="hidden" id="menuId">

                  <!-- Section: Identity -->
                  <div class="col-12">
                    <h6 class="text-primary mb-1"><i class="fa fa-tag me-1"></i> Menu Identity</h6>
                    <hr class="mt-0 mb-2">
                  </div>

                  <div class="col-md-4 view-group">
                    <input id="menuCode" placeholder="e.g. INV_ITEM"
                           type="text" class="form-control hs_span_view text-uppercase"
                           required maxlength="80" style="font-family:monospace">
                    <label for="menuCode" class="input-label">
                      Menu Code <span class="text-danger">*</span>
                    </label>
                  </div>

                  <div class="col-md-8 view-group">
                    <input id="menuName" placeholder="e.g. Items / Products"
                           type="text" class="form-control hs_span_view" required maxlength="120">
                    <label for="menuName" class="input-label">
                      Menu Name <span class="text-danger">*</span>
                    </label>
                  </div>

                  <div class="col-md-6 view-group">
                    <input id="menuUrl" placeholder="/inventory/items"
                           type="text" class="form-control hs_span_view" maxlength="300">
                    <label for="menuUrl" class="input-label">URL <small class="text-muted">(null for MODULE/GROUP)</small></label>
                  </div>

                  <div class="col-md-6 view-group">
                    <input id="menuIcon" placeholder="fa fa-boxes"
                           type="text" class="form-control hs_span_view" maxlength="100">
                    <label for="menuIcon" class="input-label">
                      Icon Class
                      <span id="iconPreview" class="ms-2 text-primary"></span>
                    </label>
                  </div>

                  <!-- Section: Hierarchy -->
                  <div class="col-12">
                    <hr class="mt-1 mb-2">
                    <h6 class="text-info mb-1"><i class="fa fa-sitemap me-1"></i> Hierarchy & Ordering</h6>
                  </div>

                  <div class="col-md-4 mb-2">
                    <label for="menuType" class="view-label">Menu Type <span class="text-danger">*</span></label>
                    <select id="menuType" class="form-select" required onchange="onTypeChange()">
                      <option value="LEAF">LEAF (clickable page)</option>
                      <option value="GROUP">GROUP (submenu header)</option>
                      <option value="MODULE">MODULE (top-level)</option>
                    </select>
                  </div>

                  <div class="col-md-5 mb-2" id="parentSection">
                    <label for="menuParentId" class="view-label">Parent Menu</label>
                    <select id="menuParentId" class="form-select">
                      <option value="">— No Parent (root) —</option>
                    </select>
                  </div>

                  <div class="col-md-3 view-group">
                    <input id="menuOrder" type="number" value="10"
                           class="form-control hs_span_view" min="0" max="9999">
                    <label for="menuOrder" class="input-label">Display Order</label>
                  </div>

                  <!-- Section: Access -->
                  <div class="col-12">
                    <hr class="mt-1 mb-2">
                    <h6 class="text-success mb-1"><i class="fa fa-lock me-1"></i> Access Control</h6>
                  </div>

                  <div class="col-md-6 mb-2">
                    <label for="menuModule" class="view-label">Module Name</label>
                    <select id="menuModule" class="form-select">
                      <option value="">— Select module —</option>
                      <option>DASHBOARD</option><option>INVENTORY</option>
                      <option>PURCHASE</option><option>SALES</option>
                      <option>ACCOUNTS</option><option>HRM</option>
                      <option>PRODUCTION</option><option>COMMERCIAL</option>
                      <option>SETUP</option><option>SECURITY</option>
                      <option>APPROVALS</option><option>REPORTS</option>
                    </select>
                  </div>

                  <div class="col-md-6 mb-2">
                    <label for="menuPermission" class="view-label">Required Permission</label>
                    <select id="menuPermission" class="form-select">
                      <option value="">— None —</option>
                    </select>
                  </div>

                  <div class="col-md-4 mb-2">
                    <label for="menuTarget" class="view-label">Link Target</label>
                    <select id="menuTarget" class="form-select">
                      <option value="_self">_self (same tab)</option>
                      <option value="_blank">_blank (new tab)</option>
                    </select>
                  </div>

                  <!-- Flags -->
                  <div class="col-md-4 mb-2 d-flex align-items-end pb-2">
                    <div class="form-check form-switch me-3">
                      <input type="checkbox" id="menuActive" class="form-check-input" checked>
                      <label class="form-check-label" for="menuActive"><strong>Active</strong></label>
                    </div>
                    <div class="form-check form-switch">
                      <input type="checkbox" id="menuVisible" class="form-check-input" checked>
                      <label class="form-check-label" for="menuVisible"><strong>Visible</strong></label>
                    </div>
                  </div>

                  <div class="col-md-4 view-group">
                    <input id="menuDescription" placeholder="Optional description"
                           type="text" class="form-control hs_span_view" maxlength="255">
                    <label for="menuDescription" class="input-label">Description</label>
                  </div>

                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-success" type="submit" id="menuSubmitBtn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="menuSpinner"></span>
                <span id="menuBtnText">Save Menu</span>
              </button>
              <button type="button" class="btn btn-white" data-bs-dismiss="modal">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- ══ VIEW MODAL ════════════════════════════════════════════════════════ -->
    <div tabindex="-1" id="menuViewModal" class="modal fade" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title"><i class="fa fa-bars me-1 text-primary"></i> Menu Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="hs-box">
              <div class="row g-2">
                <div class="col-md-4 view-group"><label class="view-label">Menu Code</label>
                  <span id="mv_code" class="form-control hs_span_show" style="font-family:monospace"></span></div>
                <div class="col-md-8 view-group"><label class="view-label">Menu Name</label>
                  <span id="mv_name" class="form-control hs_span_show"></span></div>
                <div class="col-md-3 view-group"><label class="view-label">Type</label>
                  <span id="mv_type" class="form-control hs_span_show"></span></div>
                <div class="col-md-3 view-group"><label class="view-label">Module</label>
                  <span id="mv_module" class="form-control hs_span_show"></span></div>
                <div class="col-md-6 view-group"><label class="view-label">URL</label>
                  <span id="mv_url" class="form-control hs_span_show" style="font-family:monospace"></span></div>
                <div class="col-md-4 view-group"><label class="view-label">Icon</label>
                  <span id="mv_icon" class="form-control hs_span_show"></span></div>
                <div class="col-md-4 view-group"><label class="view-label">Required Permission</label>
                  <span id="mv_permission" class="form-control hs_span_show" style="font-family:monospace"></span></div>
                <div class="col-md-2 view-group"><label class="view-label">Order</label>
                  <span id="mv_order" class="form-control hs_span_show"></span></div>
                <div class="col-md-2 view-group"><label class="view-label">Target</label>
                  <span id="mv_target" class="form-control hs_span_show"></span></div>
                <div class="col-md-4 view-group"><label class="view-label">Status</label>
                  <span id="mv_status" class="form-control hs_span_show" style="min-height:38px"></span></div>
                <div class="col-md-4 view-group"><label class="view-label">Created At</label>
                  <span id="mv_createdAt" class="form-control hs_span_show"></span></div>
                <div class="col-md-4 view-group"><label class="view-label">Updated At</label>
                  <span id="mv_updatedAt" class="form-control hs_span_show"></span></div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-white" data-bs-dismiss="modal"><i class="fa fa-times me-1"></i> Close</button>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /panel -->

  <script>
  (function () {
    'use strict';
    var dt;

    document.addEventListener('DOMContentLoaded', function () {
      dt = $('#menuTable').DataTable({
        processing: true, serverSide: true, responsive: true, pageLength: 25,
        ajax: { url: '/menus/list', type: 'GET' },
        columns: [
          { data: 'sl',        orderable: false, width: '40px' },
          { data: 'menu_code', orderable: false },
          { data: 'menu_name' },
          { data: 'menu_type', orderable: false, className: 'text-center' },
          { data: 'parent' },
          { data: 'menu_url',  orderable: false },
          { data: 'icon',      orderable: false },
          { data: 'order',     className: 'text-center' },
          { data: 'status',    orderable: false, className: 'text-center' },
          { data: 'actions',   orderable: false, className: 'text-center' }
        ],
        language: { emptyTable: 'No menus found.', processing: '<span class="spinner-border spinner-border-sm me-2"></span> Loading…' }
      });
      window._menuDT = dt;
      loadParents();
      loadPermissionOptions();

      /* Live icon preview */
      document.getElementById('menuIcon').addEventListener('input', function(){
        document.getElementById('iconPreview').innerHTML = this.value
          ? '<i class="' + esc(this.value) + '"></i>' : '';
      });

      document.getElementById('menuForm').addEventListener('submit', onSubmit);
    });

    /* ── OPEN CREATE ──────────────────────────────────────────────────────── */
    window.menuOpenCreate = function () {
      resetForm();
      document.getElementById('menuModalTitle').innerHTML = '<i class="fa fa-plus me-1 text-success"></i> Add Menu';
      document.getElementById('menuBtnText').textContent = 'Save Menu';
      bootstrap.Modal.getOrCreateInstance(document.getElementById('menuModal')).show();
    };

    /* ── VIEW ─────────────────────────────────────────────────────────────── */
    window.menuShow = function (id) {
      secureFetch('/menus/show/' + id).then(function(res){
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var m = res.obj.defaultData;
        setText('mv_code',       m.menuCode);
        setText('mv_name',       m.menuName);
        setText('mv_type',       m.menuType);
        setText('mv_module',     m.moduleName || '—');
        setText('mv_url',        m.menuUrl    || '—');
        setText('mv_icon',       m.icon       || '—');
        setText('mv_permission', m.requiredPermission || '—');
        setText('mv_order',      m.displayOrder);
        setText('mv_target',     m.target     || '_self');
        setText('mv_createdAt',  m.createdAt  || '—');
        setText('mv_updatedAt',  m.updatedAt  || '—');
        document.getElementById('mv_status').innerHTML =
          m.active ? "<span class='badge bg-success'>Active</span>"
                   : "<span class='badge bg-danger'>Inactive</span>";
        bootstrap.Modal.getOrCreateInstance(document.getElementById('menuViewModal')).show();
      });
    };

    /* ── EDIT ─────────────────────────────────────────────────────────────── */
    window.menuEdit = function (id) {
      secureFetch('/menus/show/' + id).then(function(res){
        if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
        var m = res.obj.defaultData;
        resetForm();
        document.getElementById('menuId').value          = m.id;
        document.getElementById('menuCode').value        = m.menuCode;
        document.getElementById('menuName').value        = m.menuName;
        document.getElementById('menuUrl').value         = m.menuUrl         || '';
        document.getElementById('menuIcon').value        = m.icon            || '';
        document.getElementById('menuType').value        = m.menuType        || 'LEAF';
        document.getElementById('menuParentId').value    = m.parentId        || '';
        document.getElementById('menuOrder').value       = m.displayOrder    || 0;
        document.getElementById('menuModule').value      = m.moduleName      || '';
        document.getElementById('menuPermission').value  = m.requiredPermission || '';
        document.getElementById('menuTarget').value      = m.target          || '_self';
        document.getElementById('menuDescription').value = m.description     || '';
        document.getElementById('menuActive').checked    = m.active;
        document.getElementById('menuVisible').checked   = m.visible;
        document.getElementById('iconPreview').innerHTML = m.icon
          ? '<i class="' + esc(m.icon) + '"></i>' : '';
        onTypeChange();
        document.getElementById('menuModalTitle').innerHTML = '<i class="fa fa-pencil me-1 text-warning"></i> Edit Menu';
        document.getElementById('menuBtnText').textContent = 'Update Menu';
        bootstrap.Modal.getOrCreateInstance(document.getElementById('menuModal')).show();
      });
    };

    /* ── TOGGLE ───────────────────────────────────────────────────────────── */
    window.menuToggle = function (id) {
      Swal.fire({ title:'Change Status?', icon:'question', showCancelButton:true,
        confirmButtonText:'Toggle', confirmButtonColor:'#3085d6' }).then(function(r){
        if (!r.isConfirmed) return;
        secureFetch('/menus/toggle/' + id, { method:'POST' }).then(function(data){
          data.success ? dt.ajax.reload(null,false) : Swal.fire('Error', data.message, 'error');
        });
      });
    };

    /* ── DELETE ───────────────────────────────────────────────────────────── */
    window.menuDelete = function (id) {
      Swal.fire({ title:'Delete Menu?', text:'Child menus must be removed first.', icon:'warning',
        showCancelButton:true, confirmButtonColor:'#d33', confirmButtonText:'Yes, delete!' })
        .then(function(r){
        if (!r.isConfirmed) return;
        secureFetch('/menus/delete/' + id, { method:'DELETE' }).then(function(data){
          if (data.success) {
            Swal.fire({ icon:'success', title:'Deleted!', text:data.message, timer:1500, showConfirmButton:false });
            dt.ajax.reload(null,false);
          } else Swal.fire('Error', data.message, 'error');
        });
      });
    };

    /* ── SUBMIT ───────────────────────────────────────────────────────────── */
    function onSubmit(e) {
      e.preventDefault();
      var submitBtn = document.getElementById('menuSubmitBtn');
      var spinner   = document.getElementById('menuSpinner');
      var btnText   = document.getElementById('menuBtnText');
      hsDisableButton(submitBtn, spinner, btnText);

      var payload = {
        id:                 document.getElementById('menuId').value || null,
        menuCode:           document.getElementById('menuCode').value.trim().toUpperCase(),
        menuName:           document.getElementById('menuName').value.trim(),
        menuUrl:            document.getElementById('menuUrl').value.trim() || null,
        icon:               document.getElementById('menuIcon').value.trim() || null,
        parentId:           document.getElementById('menuParentId').value || null,
        displayOrder:       parseInt(document.getElementById('menuOrder').value) || 0,
        menuType:           document.getElementById('menuType').value,
        moduleName:         document.getElementById('menuModule').value || null,
        requiredPermission: document.getElementById('menuPermission').value || null,
        description:        document.getElementById('menuDescription').value.trim() || null,
        target:             document.getElementById('menuTarget').value,
        active:             document.getElementById('menuActive').checked,
        visible:            document.getElementById('menuVisible').checked
      };

      secureFetch('/menus/save', { method:'POST', body: JSON.stringify(payload) })
        .then(function(data){
          if (data.success) {
            Swal.fire({ icon:'success', title:'Success!', text:data.message, timer:1600, showConfirmButton:false });
            bootstrap.Modal.getOrCreateInstance(document.getElementById('menuModal')).hide();
            dt.ajax.reload(null,false);
            loadParents(); /* refresh parent dropdown */
          } else Swal.fire('Error', data.message, 'error');
        })
        .catch(function(err){ Swal.fire('Error', err.message||'Failed.', 'error'); })
        .finally(function(){ hsEnableButton(submitBtn, spinner, btnText); });
    }

    /* ── UI HELPERS ───────────────────────────────────────────────────────── */
    function onTypeChange() {
      var type    = document.getElementById('menuType').value;
      var section = document.getElementById('parentSection');
      /* MODULE has no parent; GROUP/LEAF need parent */
      section.style.display = (type === 'MODULE') ? 'none' : '';
    }

    function loadParents() {
      secureFetch('/menus/parents/all').then(function(data){
        var sel = document.getElementById('menuParentId');
        var current = sel.value;
        while (sel.options.length > 1) sel.remove(1);
        data.forEach(function(m){
          var opt = document.createElement('option');
          opt.value = m.id;
          opt.text  = '[' + m.menuType + '] ' + m.menuName + ' (' + m.menuCode + ')';
          sel.appendChild(opt);
        });
        if (current) sel.value = current;
      }).catch(function(){});
    }

    function loadPermissionOptions() {
      secureFetch('/menus/permissions/all').then(function(data){
        var sel = document.getElementById('menuPermission');
        data.forEach(function(p){
          var opt = document.createElement('option');
          opt.value = p.name;
          opt.text  = p.name + (p.description ? ' — ' + p.description : '');
          sel.appendChild(opt);
        });
      }).catch(function(){});
    }

    function resetForm() {
      document.getElementById('menuForm').reset();
      document.getElementById('menuId').value = '';
      document.getElementById('menuActive').checked  = true;
      document.getElementById('menuVisible').checked = true;
      document.getElementById('menuType').value = 'LEAF';
      document.getElementById('menuOrder').value = 10;
      document.getElementById('iconPreview').innerHTML = '';
      onTypeChange();
    }

    function setText(id, val) {
      var el = document.getElementById(id); if (el) el.textContent = val || '—';
    }

    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

  })();
  </script>

</section>
</html>
