<!DOCTYPE html>
<!-- storefront/sf-account-profile.html  GET /account/profile -->
<html th:replace="~{ecommerce/storefront/layout/sf-base :: layout('My Profile', ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<main>
  <section class="sf-portal">
    <div class="container">
      <div class="row g-4">
        <div class="col-lg-3">
          <div th:replace="~{ecommerce/storefront/fragments/sf-account-sidebar :: sidebar('profile')}"></div>
        </div>
        <div class="col-lg-9">
          <h1 class="mb-4">My Profile</h1>

          <div style="background:var(--white);border:1px solid var(--linen);border-radius:6px;padding:28px;max-width:520px">
            <form id="sfProfileForm">
              <div class="row g-2">
                <div class="col-6 sf-field">
                  <label>First Name</label>
                  <input type="text" id="sfPFirstName" th:value="${customer.firstName}" required>
                </div>
                <div class="col-6 sf-field">
                  <label>Last Name</label>
                  <input type="text" id="sfPLastName" th:value="${customer.lastName}">
                </div>
              </div>
              <div class="sf-field">
                <label>Phone Number</label>
                <input type="text" th:value="${customer.phone}" disabled style="opacity:0.6">
              </div>
              <div class="sf-field">
                <label>Email</label>
                <input type="email" id="sfPEmail" th:value="${customer.email}" placeholder="you@example.com">
              </div>
              <div class="sf-field">
                <label>Customer Code</label>
                <input type="text" th:value="${customer.customerCode}" disabled style="opacity:0.6;font-family:var(--font-mono)">
              </div>
              <div id="sfProfileMsg" style="font-size:0.85rem;margin-bottom:14px"></div>
              <button type="submit" class="sf-btn sf-btn--primary" id="sfProfileSaveBtn">Save Changes</button>
            </form>
          </div>

        </div>
      </div>
    </div>
  </section>

  <script th:inline="none">
    document.getElementById('sfProfileForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var btn = document.getElementById('sfProfileSaveBtn');
      var msg = document.getElementById('sfProfileMsg');
      btn.disabled = true; btn.textContent = 'Saving…';
      sfFetch('/account/profile', {
        method: 'POST',
        body: JSON.stringify({
          firstName: document.getElementById('sfPFirstName').value,
          lastName: document.getElementById('sfPLastName').value,
          email: document.getElementById('sfPEmail').value
        })
      }).then(function (d) {
        msg.style.color = d.success ? 'var(--sage)' : 'var(--rust)';
        msg.textContent = d.message;
        btn.disabled = false; btn.textContent = 'Save Changes';
      }).catch(function () {
        msg.style.color = 'var(--rust)'; msg.textContent = 'Something went wrong.';
        btn.disabled = false; btn.textContent = 'Save Changes';
      });
    });
  </script>
</main>
</html>
