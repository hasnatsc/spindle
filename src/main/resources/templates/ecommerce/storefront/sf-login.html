<!DOCTYPE html>
<!-- storefront/sf-login.html  GET /account/login -->
<html th:replace="~{ecommerce/storefront/layout/sf-base :: layout('Sign In', ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<main>
  <div class="sf-auth-wrap">
    <div class="sf-auth-card">
      <h2 class="mb-1">Welcome back</h2>
      <p style="color:var(--grey);font-size:0.9rem;margin-bottom:24px">Sign in to track orders and check out faster.</p>

      <form id="sfLoginForm">
        <div class="sf-field">
          <label>Phone or Email</label>
          <input type="text" id="sfIdentifier" placeholder="01XXXXXXXXX or you@example.com" required autofocus>
        </div>
        <div class="sf-field">
          <label>Password</label>
          <input type="password" id="sfPassword" placeholder="••••••••" required>
          <div class="sf-field-error" id="sfLoginError"></div>
        </div>
        <button type="submit" class="sf-btn sf-btn--primary sf-btn--block" id="sfLoginBtn">Sign In</button>
      </form>

      <div class="sf-auth-switch">
        New here? <a th:href="@{/account/register(redirect=${redirectUrl})}">Create an account</a>
      </div>
    </div>
  </div>

  <script th:inline="none">
    var sfRedirectUrl = /*[[${redirectUrl}]]*/ '/account/dashboard';
    document.getElementById('sfLoginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var btn = document.getElementById('sfLoginBtn');
      var errEl = document.getElementById('sfLoginError');
      errEl.textContent = '';
      btn.disabled = true; btn.textContent = 'Signing in…';
      sfFetch('/account/login', {
        method: 'POST',
        body: JSON.stringify({ identifier: document.getElementById('sfIdentifier').value, password: document.getElementById('sfPassword').value })
      }).then(function (d) {
        if (d.success) { window.location.href = sfRedirectUrl; }
        else { errEl.textContent = d.message; btn.disabled = false; btn.textContent = 'Sign In'; }
      }).catch(function () { errEl.textContent = 'Something went wrong. Please try again.'; btn.disabled = false; btn.textContent = 'Sign In'; });
    });
  </script>
</main>
</html>
