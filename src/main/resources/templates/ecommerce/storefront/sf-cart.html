<!DOCTYPE html>
<!-- storefront/sf-cart.html  GET /cart -->
<html th:replace="~{ecommerce/storefront/layout/sf-base :: layout('Your Cart', ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<main>
  <section class="sf-cart-page">
    <div class="container">
      <h1 class="mb-4">Your Cart</h1>

      <div th:if="${cart.items == null or cart.items.isEmpty()}" class="sf-cart-empty">
        <i class="fa-solid fa-bag-shopping" style="font-size:2.4rem;color:var(--linen);margin-bottom:16px;display:block"></i>
        <p>Your cart is empty.</p>
        <a href="/shop" class="sf-btn sf-btn--primary mt-2">Start Shopping</a>
      </div>

      <div class="row g-5" th:unless="${cart.items == null or cart.items.isEmpty()}" id="sfCartContainer">
        <div class="col-lg-8">
          <div id="sfCartLines">
            <div class="sf-cart-line" th:each="item : ${cart.items}" th:attr="data-item-id=${item.id}">
              <img th:src="${item.productImage ?: 'https://placehold.co/200x240/E8E1D3/8A8275?text=ASG'}" th:alt="${item.productTitle}">
              <div class="sf-cart-line-info">
                <a th:href="@{'/product/' + ${item.productSlug}}"><div class="sf-cart-line-title" th:text="${item.productTitle}">Product</div></a>
                <div class="sf-cart-line-variant" th:if="${item.variantName}" th:text="${item.variantName}">Variant</div>
                <div class="sf-cart-line-price">
                  ৳<span th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT')}">600</span> ×
                  <input type="number" class="sf-cart-qty-input" min="1" th:value="${item.quantity}" style="width:50px;border:1px solid var(--linen);border-radius:3px;text-align:center;font-family:var(--font-mono)">
                </div>
                <span class="sf-cart-remove" onclick="sfRemoveCartItem(this)">Remove</span>
              </div>
              <div style="font-family:var(--font-mono);font-weight:600;align-self:flex-start" th:text="'৳' + ${#numbers.formatDecimal(item.lineTotal, 0, 'COMMA', 0, 'POINT')}">৳600</div>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="sf-cart-summary">
            <div class="sf-summary-row"><span>Subtotal</span><span id="sfSumSubtotal" th:text="'৳' + ${#numbers.formatDecimal(cart.subtotal, 0, 'COMMA', 0, 'POINT')}">৳1,800</span></div>
            <div class="sf-summary-row"><span>Shipping</span><span id="sfSumShipping" th:text="${cart.shippingCharge != null and cart.shippingCharge == 0} ? 'Free' : ('৳' + ${#numbers.formatDecimal(cart.shippingCharge, 0, 'COMMA', 0, 'POINT')})">Free</span></div>
            <div class="sf-summary-row total"><span>Total</span><span id="sfSumTotal" th:text="'৳' + ${#numbers.formatDecimal(cart.grandTotal, 0, 'COMMA', 0, 'POINT')}">৳1,800</span></div>
            <a href="/checkout" class="sf-btn sf-btn--accent sf-btn--block mt-3">Proceed to Checkout <i class="fa fa-arrow-right"></i></a>
            <a href="/shop" class="sf-btn sf-btn--outline sf-btn--block mt-2">Continue Shopping</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script th:inline="none">
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.sf-cart-qty-input').forEach(function (input) {
        var debounce;
        input.addEventListener('change', function () {
          clearTimeout(debounce);
          var itemId = input.closest('.sf-cart-line').dataset.itemId;
          var qty = Math.max(1, parseInt(input.value || '1'));
          input.value = qty;
          sfFetch('/cart/update/' + itemId, { method: 'POST', body: JSON.stringify({ quantity: qty }) })
            .then(function (d) {
              if (d.success) { sfRefreshCartSummary(d.cart); }
              else { sfToast(d.message, true); }
            });
        });
      });
    });

    function sfRemoveCartItem(el) {
      var itemId = el.closest('.sf-cart-line').dataset.itemId;
      sfFetch('/cart/remove/' + itemId, { method: 'DELETE' }).then(function (d) {
        if (d.success) {
          el.closest('.sf-cart-line').remove();
          sfRefreshCartSummary(d.cart);
          sfToast('Removed from cart.');
          if (!d.cart.items || d.cart.items.length === 0) setTimeout(function () { location.reload(); }, 600);
        }
      });
    }

    function sfRefreshCartSummary(cart) {
      document.getElementById('sfSumSubtotal').textContent = '৳' + Math.round(cart.subtotal).toLocaleString();
      document.getElementById('sfSumShipping').textContent = cart.shippingCharge == 0 ? 'Free' : '৳' + Math.round(cart.shippingCharge).toLocaleString();
      document.getElementById('sfSumTotal').textContent = '৳' + Math.round(cart.grandTotal).toLocaleString();
      var badge = document.getElementById('sfCartCount');
      if (badge) badge.textContent = cart.totalItems || 0;
    }
  </script>
</main>
</html>
