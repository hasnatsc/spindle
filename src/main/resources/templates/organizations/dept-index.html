<!DOCTYPE html>
<!--
  organizations/dept-index.html
  URL : GET /departments

  JS fn → endpoint:
    deptShow(id)   GET    /departments/show/{id}
    deptEdit(id)   GET    /departments/show/{id}
    deptToggle(id) POST   /departments/toggle/{id}
    deptDelete(id) DELETE /departments/delete/{id}
    (save)         POST   /departments/save

  DataTable columns must match DepartmentController.list() row-map keys:
    sl, code, name, organization, parent, description, status, created_at, actions
-->
<html th:replace="~{layout/base :: layout('Departments', ~{::section})}" xmlns:th="http://www.thymeleaf.org">

<section>

  <!-- Breadcrumb -->
  <ol class="breadcrumb float-xl-end">
    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Home</a></li>
    <li class="breadcrumb-item">Organisation</li>
    <li class="breadcrumb-item active">Departments</li>
  </ol>
  <h1 class="page-header">Departments <small>manage organisational departments and hierarchy</small></h1>

  <!-- ═══════════════════════════════════════════════════════════ PANEL -->
  <div class="panel panel-inverse">

    <div class="panel-heading">
      <div class="panel-title">
        <a href="javascript:;" onclick="deptOpenCreate()">
          <span class="badge btn btn-outline-success">
            <i class="fa fa-plus me-1"></i> Add Department
          </span>
        </a>
      </div>
      <div class="panel-heading-btn">
        <a href="javascript:;" class="btn btn-sm btn-icon btn-default" data-toggle="panel-expand"><i class="fa fa-expand"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-success" data-toggle="panel-reload"><i class="fa fa-redo"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-warning" data-toggle="panel-collapse"><i class="fa fa-minus"></i></a>
      </div>
    </div>

    <div class="panel-body">
      <table id="deptTable" width="100%"
             class="table table-striped table-bordered align-middle text-nowrap">
        <thead>
          <tr>
            <th width="1%">SL</th>
            <th>Code</th>
            <th>Name</th>
            <th>Organisation</th>
            <th>Parent</th>
            <th>Description</th>
            <th class="text-center" width="7%">Status</th>
            <th>Created At</th>
            <th class="text-center" width="12%">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- ═══════════════════════════════════════════ CREATE / EDIT MODAL -->
    <div tabindex="-1" id="deptModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="deptModalTitle">
              <i class="fa fa-building-user me-1 text-success"></i> Add Department
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="deptForm" novalidate>
            <div class="modal-body">
              <div class="hs-box">
                <div class="row g-2">
                  <input type="hidden" id="deptId">

                  <!-- Organisation -->
                  <div class="col-md-12 view-group">
                    <select id="deptOrgId" class="form-select hs_span_view hsSelectTwo" required>
                      <option value="">— Select Organisation —</option>
                    </select>
                    <label for="deptOrgId" class="input-label">
                      Organisation <span class="text-danger">*</span>
                    </label>
                  </div>

                  <!-- Code -->
                  <div class="col-md-4 view-group">
                    <input id="deptCode" type="text" placeholder="e.g. PROD"
                           class="form-control hs_span_view text-uppercase"
                           maxlength="50">
                    <label for="deptCode" class="input-label">Code</label>
                  </div>

                  <!-- Name -->
                  <div class="col-md-8 view-group">
                    <input id="deptName" type="text" placeholder="Department Name"
                           class="form-control hs_span_view" required maxlength="100">
                    <label for="deptName" class="input-label">
                      Name <span class="text-danger">*</span>
                    </label>
                  </div>

                  <!-- Parent Department -->
                  <div class="col-md-12 view-group">
                    <select id="deptParentId" class="form-select hs_span_view hsSelectTwo">
                      <option value="">— No Parent (Root) —</option>
                    </select>
                    <label for="deptParentId" class="input-label">Parent Department</label>
                  </div>

                  <!-- Description -->
                  <div class="col-md-12 view-group">
                    <textarea id="deptDesc" class="form-control hs_span_view"
                              rows="2" placeholder="Optional description…"
                              maxlength="500"></textarea>
                    <label for="deptDesc" class="input-label">Description</label>
                  </div>

                  <!-- Active toggle -->
                  <div class="col-md-12 mt-1">
                    <div class="form-check form-switch">
                      <input type="checkbox" id="deptActive" class="form-check-input" checked>
                      <label class="form-check-label" for="deptActive"><strong>Active</strong></label>
                    </div>
                  </div>

                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-success" type="submit" id="deptSubmitBtn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="deptSpinner"></span>
                <span id="deptBtnText">Save</span>
              </button>
              <button type="button" class="btn btn-white" data-bs-dismiss="modal">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════ VIEW MODAL -->
    <div tabindex="-1" id="deptViewModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">
              <i class="fa fa-building-user me-1 text-primary"></i> Department Details
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="hs-box">
              <div class="row g-2">
                <div class="col-md-4 view-group">
                  <label class="view-label">Code</label>
                  <span id="dv_code" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-8 view-group">
                  <label class="view-label">Name</label>
                  <span id="dv_name" class="form-control hs_span_show"></span>
                </div>
                <div class="col-12 view-group">
                  <label class="view-label">Organisation</label>
                  <span id="dv_org" class="form-control hs_span_show"></span>
                </div>
                <div class="col-12 view-group">
                  <label class="view-label">Parent Department</label>
                  <span id="dv_parent" class="form-control hs_span_show"></span>
                </div>
                <div class="col-12 view-group">
                  <label class="view-label">Description</label>
                  <span id="dv_desc" class="form-control hs_span_show" style="min-height:38px"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Status</label>
                  <span id="dv_status" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Created At</label>
                  <span id="dv_createdAt" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Updated By</label>
                  <span id="dv_updatedBy" class="form-control hs_span_show"></span>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-white" data-bs-dismiss="modal">
              <i class="fa fa-times me-1"></i> Close
            </button>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /panel -->


  <!-- ═══════════════════════════════════════════════════════════ SCRIPT -->
  <script th:inline="none">
  (function () {
    'use strict';

    const BASE_URL = '/departments';
    var dt;

    /* ── DataTable init ──────────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', function () {

      dt = $('#deptTable').DataTable({
        processing : true,
        serverSide : true,
        responsive : true,
        pageLength : 25,
        ajax       : { url: BASE_URL + '/list', type: 'GET' },
        columns    : [
          { data: 'sl',           orderable: false, width: '40px' },
          { data: 'code',         defaultContent: '—' },
          { data: 'name' },
          { data: 'organization', defaultContent: '' },
          { data: 'parent',       defaultContent: '—' },
          { data: 'description',  defaultContent: '—' },
          { data: 'status',       orderable: false, className: 'text-center' },
          { data: 'created_at',   defaultContent: '' },
          { data: 'actions',      orderable: false, className: 'text-center' }
        ],
        language: {
          emptyTable : 'No departments found.',
          processing : '<span class="spinner-border spinner-border-sm me-2"></span> Loading…'
        }
      });

      _loadOrgs();
      document.getElementById('deptForm').addEventListener('submit', _onSubmit);
    });

    /* ── Load Organisation dropdown ──────────────────────────────────── */
    function _loadOrgs() {
      secureFetch('/organizations/active')
        .then(function (data) {
          var sel = document.getElementById('deptOrgId');
          while (sel.options.length > 1) sel.remove(1);
          (data || []).forEach(function (o) {
            var opt = document.createElement('option');
            opt.value       = o.id;
            opt.textContent = o.name + ' (' + o.code + ')';
            sel.appendChild(opt);
          });
        });
    }

    /* ── Load parent departments (excluding current record) ──────────── */
    function _loadParents(excludeId) {
      var url = BASE_URL + '/parents/all?excludeId=' + (excludeId || 0);
      secureFetch(url)
        .then(function (data) {
          var sel = document.getElementById('deptParentId');
          while (sel.options.length > 1) sel.remove(1);
          (data || []).forEach(function (d) {
            var opt = document.createElement('option');
            opt.value       = d.id;
            opt.textContent = d.name + (d.code ? ' (' + d.code + ')' : '');
            sel.appendChild(opt);
          });
        });
    }

    /* ── Open modal for CREATE ───────────────────────────────────────── */
    window.deptOpenCreate = function () {
      _resetForm();
      _loadParents(0);
      document.getElementById('deptModalTitle').innerHTML =
        '<i class="fa fa-plus me-1 text-success"></i> Add Department';
      document.getElementById('deptBtnText').textContent = 'Save';
      bootstrap.Modal.getOrCreateInstance(document.getElementById('deptModal')).show();
    };

    /* ── View ────────────────────────────────────────────────────────── */
    window.deptShow = function (id) {
      secureFetch(BASE_URL + '/show/' + id)
        .then(function (res) {
          if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
          var o = res.obj.defaultData;
          _setText('dv_code',      o.code);
          _setText('dv_name',      o.name);
          _setText('dv_org',       o.organizationName);
          _setText('dv_parent',    o.parentDepartmentName || '—');
          _setText('dv_desc',      o.description);
          _setText('dv_createdAt', o.createdAt);
          _setText('dv_updatedBy', o.updatedBy);
          document.getElementById('dv_status').innerHTML = o.active
            ? "<span class='badge bg-success'>Active</span>"
            : "<span class='badge bg-danger'>Inactive</span>";
          bootstrap.Modal.getOrCreateInstance(document.getElementById('deptViewModal')).show();
        });
    };

    /* ── Edit ────────────────────────────────────────────────────────── */
    window.deptEdit = function (id) {
      secureFetch(BASE_URL + '/show/' + id)
        .then(function (res) {
          if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
          var o = res.obj.defaultData;
          _resetForm();
          _loadParents(o.id);
          _val('deptId',   o.id);
          _val('deptCode', o.code || '');
          _val('deptName', o.name);
          _val('deptDesc', o.description || '');
          document.getElementById('deptOrgId').value    = o.organizationId || '';
          document.getElementById('deptActive').checked = o.active;
          /* parent set after _loadParents resolves */
          setTimeout(function () {
            document.getElementById('deptParentId').value = o.parentDepartmentId || '';
          }, 300);
          document.getElementById('deptModalTitle').innerHTML =
            '<i class="fa fa-pencil me-1 text-warning"></i> Edit Department';
          document.getElementById('deptBtnText').textContent = 'Update';
          bootstrap.Modal.getOrCreateInstance(document.getElementById('deptModal')).show();
        });
    };

    /* ── Toggle status ───────────────────────────────────────────────── */
    window.deptToggle = function (id) {
      hsChangeStatus(BASE_URL + '/toggle/' + id, dt, 'Department');
    };

    /* ── Delete ──────────────────────────────────────────────────────── */
    window.deptDelete = function (id) {
      hsConfirmDelete(BASE_URL + '/delete/' + id, dt);
    };

    /* ── Form submit (create / update) ──────────────────────────────── */
    function _onSubmit(e) {
      e.preventDefault();
      var sb = document.getElementById('deptSubmitBtn');
      var sp = document.getElementById('deptSpinner');
      var bt = document.getElementById('deptBtnText');
      hsDisableButton(sb, sp, bt);

      var payload = {
        id                 : document.getElementById('deptId').value || null,
        organizationId     : document.getElementById('deptOrgId').value,
        code               : document.getElementById('deptCode').value || null,
        name               : document.getElementById('deptName').value,
        description        : document.getElementById('deptDesc').value,
        parentDepartmentId : document.getElementById('deptParentId').value || null,
        active             : document.getElementById('deptActive').checked
      };

      secureFetch(BASE_URL + '/save', { method: 'POST', body: JSON.stringify(payload) })
        .then(function (d) {
          if (d.success) {
            Swal.fire({ icon: 'success', title: 'Saved!', text: d.message, timer: 1600, showConfirmButton: false });
            bootstrap.Modal.getOrCreateInstance(document.getElementById('deptModal')).hide();
            dt.ajax.reload(null, false);
          } else {
            Swal.fire('Error', d.message, 'error');
          }
        })
        .catch(function (err) { Swal.fire('Error', err.message || 'Request failed.', 'error'); })
        .finally(function () { hsEnableButton(sb, sp, bt); });
    }

    /* ── Helpers ─────────────────────────────────────────────────────── */
    function _resetForm() {
      document.getElementById('deptForm').reset();
      document.getElementById('deptId').value      = '';
      document.getElementById('deptActive').checked = true;
    }
    function _val(id, v)     { var e = document.getElementById(id); if (e) e.value       = v || ''; }
    function _setText(id, v) { var e = document.getElementById(id); if (e) e.textContent = v || '—'; }

  })();
  </script>

</section>
</html>
