<!DOCTYPE html>
<!--
  organizations/cc-index.html
  URL : GET /cost-centers

  JS fn → endpoint:
    ccShow(id)   GET    /cost-centers/show/{id}
    ccEdit(id)   GET    /cost-centers/show/{id}
    ccToggle(id) POST   /cost-centers/toggle/{id}
    ccDelete(id) DELETE /cost-centers/delete/{id}
    (save)       POST   /cost-centers/save

  DataTable columns must match CostCenterController.list() row-map keys:
    sl, code, name, type, business_unit, parent, manager, status, created_at, actions
-->
<html th:replace="~{layout/base :: layout('Cost Centers', ~{::section})}" xmlns:th="http://www.thymeleaf.org">

<section>

  <!-- Breadcrumb -->
  <ol class="breadcrumb float-xl-end">
    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Home</a></li>
    <li class="breadcrumb-item">Organisation</li>
    <li class="breadcrumb-item active">Cost Centers</li>
  </ol>
  <h1 class="page-header">Cost Centers <small>manage financial tracking units per business unit</small></h1>

  <!-- ═══════════════════════════════════════════════════════════ PANEL -->
  <div class="panel panel-inverse">

    <div class="panel-heading">
      <div class="panel-title">
        <a href="javascript:;" onclick="ccOpenCreate()">
          <span class="badge btn btn-outline-success">
            <i class="fa fa-plus me-1"></i> Add Cost Center
          </span>
        </a>
      </div>
      <div class="panel-heading-btn">
        <a href="javascript:;" class="btn btn-sm btn-icon btn-default" data-toggle="panel-expand"><i class="fa fa-expand"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-success" data-toggle="panel-reload"><i class="fa fa-redo"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-warning" data-toggle="panel-collapse"><i class="fa fa-minus"></i></a>
      </div>
    </div>

    <div class="panel-body">
      <table id="ccTable" width="100%"
             class="table table-striped table-bordered align-middle text-nowrap">
        <thead>
          <tr>
            <th width="1%">SL</th>
            <th>Code</th>
            <th>Name</th>
            <th>Type</th>
            <th>Business Unit</th>
            <th>Parent</th>
            <th>Manager</th>
            <th class="text-center" width="7%">Status</th>
            <th>Created At</th>
            <th class="text-center" width="12%">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- ═══════════════════════════════════════════ CREATE / EDIT MODAL -->
    <div tabindex="-1" id="ccModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="ccModalTitle">
              <i class="fa fa-sitemap me-1 text-success"></i> Add Cost Center
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="ccForm" novalidate>
            <div class="modal-body">
              <div class="hs-box">
                <div class="row g-2">
                  <input type="hidden" id="ccId">

                  <!-- Business Unit -->
                  <div class="col-md-6 view-group">
                    <select id="ccBuId" class="form-select hs_span_view hsSelectTwo" required>
                      <option value="">— Select Business Unit —</option>
                    </select>
                    <label for="ccBuId" class="input-label">
                      Business Unit <span class="text-danger">*</span>
                    </label>
                  </div>

                  <!-- Type -->
                  <div class="col-md-6 view-group">
                    <select id="ccType" class="form-select hs_span_view">
                      <option value="">— Select Type —</option>
                      <option value="DEPARTMENT">Department</option>
                      <option value="PROJECT">Project</option>
                      <option value="BRANCH">Branch</option>
                      <option value="DIVISION">Division</option>
                      <option value="PRODUCT">Product</option>
                      <option value="SERVICE">Service</option>
                    </select>
                    <label for="ccType" class="input-label">Type</label>
                  </div>

                  <!-- Code -->
                  <div class="col-md-4 view-group">
                    <input id="ccCode" type="text" placeholder="e.g. CC-SPIN-01"
                           class="form-control hs_span_view text-uppercase"
                           required maxlength="50">
                    <label for="ccCode" class="input-label">
                      Code <span class="text-danger">*</span>
                    </label>
                  </div>

                  <!-- Name -->
                  <div class="col-md-8 view-group">
                    <input id="ccName" type="text" placeholder="Cost Center Name"
                           class="form-control hs_span_view" required maxlength="200">
                    <label for="ccName" class="input-label">
                      Name <span class="text-danger">*</span>
                    </label>
                  </div>

                  <!-- Parent Cost Center -->
                  <div class="col-md-12 view-group">
                    <select id="ccParentId" class="form-select hs_span_view hsSelectTwo">
                      <option value="">— No Parent (Root) —</option>
                    </select>
                    <label for="ccParentId" class="input-label">Parent Cost Center</label>
                  </div>

                  <!-- Manager Name / Email -->
                  <div class="col-md-6 view-group">
                    <input id="ccManagerName" type="text" placeholder="Manager Name"
                           class="form-control hs_span_view" maxlength="100">
                    <label for="ccManagerName" class="input-label">Manager Name</label>
                  </div>
                  <div class="col-md-6 view-group">
                    <input id="ccManagerEmail" type="email" placeholder="manager@company.com"
                           class="form-control hs_span_view" maxlength="100">
                    <label for="ccManagerEmail" class="input-label">Manager Email</label>
                  </div>

                  <!-- Description -->
                  <div class="col-md-12 view-group">
                    <textarea id="ccDesc" class="form-control hs_span_view"
                              rows="2" placeholder="Optional description…"
                              maxlength="1000"></textarea>
                    <label for="ccDesc" class="input-label">Description</label>
                  </div>

                  <!-- Active toggle -->
                  <div class="col-md-12 mt-1">
                    <div class="form-check form-switch">
                      <input type="checkbox" id="ccActive" class="form-check-input" checked>
                      <label class="form-check-label" for="ccActive"><strong>Active</strong></label>
                    </div>
                  </div>

                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-success" type="submit" id="ccSubmitBtn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="ccSpinner"></span>
                <span id="ccBtnText">Save</span>
              </button>
              <button type="button" class="btn btn-white" data-bs-dismiss="modal">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════ VIEW MODAL -->
    <div tabindex="-1" id="ccViewModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">
              <i class="fa fa-sitemap me-1 text-primary"></i> Cost Center Details
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="hs-box">
              <div class="row g-2">
                <div class="col-md-4 view-group">
                  <label class="view-label">Code</label>
                  <span id="cv_code" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-8 view-group">
                  <label class="view-label">Name</label>
                  <span id="cv_name" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-6 view-group">
                  <label class="view-label">Type</label>
                  <span id="cv_type" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-6 view-group">
                  <label class="view-label">Business Unit</label>
                  <span id="cv_bu" class="form-control hs_span_show"></span>
                </div>
                <div class="col-12 view-group">
                  <label class="view-label">Parent Cost Center</label>
                  <span id="cv_parent" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-6 view-group">
                  <label class="view-label">Manager Name</label>
                  <span id="cv_managerName" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-6 view-group">
                  <label class="view-label">Manager Email</label>
                  <span id="cv_managerEmail" class="form-control hs_span_show"></span>
                </div>
                <div class="col-12 view-group">
                  <label class="view-label">Description</label>
                  <span id="cv_desc" class="form-control hs_span_show" style="min-height:38px"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Status</label>
                  <span id="cv_status" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Created At</label>
                  <span id="cv_createdAt" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Updated By</label>
                  <span id="cv_updatedBy" class="form-control hs_span_show"></span>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-white" data-bs-dismiss="modal">
              <i class="fa fa-times me-1"></i> Close
            </button>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /panel -->


  <!-- ═══════════════════════════════════════════════════════════ SCRIPT -->
  <script th:inline="none">
  (function () {
    'use strict';

    const BASE_URL = '/cost-centers';
    var dt;
    var _editingId = null;   /* track current id when loading parent list */

    /* ── DataTable init ──────────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', function () {

      dt = $('#ccTable').DataTable({
        processing : true,
        serverSide : false,
        responsive : true,
        pageLength : 25,
        ajax       : { url: BASE_URL + '/list', type: 'GET' },
        columns    : [
          { data: 'sl',            orderable: false, width: '40px' },
          { data: 'code' },
          { data: 'name' },
          { data: 'type',          orderable: false, className: 'text-center' },
          { data: 'business_unit', defaultContent: '' },
          { data: 'parent',        defaultContent: '—' },
          { data: 'manager',       defaultContent: '—' },
          { data: 'status',        orderable: false, className: 'text-center' },
          { data: 'created_at',    defaultContent: '' },
          { data: 'actions',       orderable: false, className: 'text-center' }
        ],
        language: {
          emptyTable : 'No cost centers found.',
          processing : '<span class="spinner-border spinner-border-sm me-2"></span> Loading…'
        }
      });

      _loadBUs();
      document.getElementById('ccForm').addEventListener('submit', _onSubmit);
    });

    /* ── Load Business Unit dropdown ─────────────────────────────────── */
    function _loadBUs() {
      secureFetch('/business-units/active-list')
        .then(function (data) {
          var sel = document.getElementById('ccBuId');
          while (sel.options.length > 1) sel.remove(1);
          (data || []).forEach(function (b) {
            var opt = document.createElement('option');
            opt.value       = b.id;
            opt.textContent = b.name + ' (' + b.code + ')';
            sel.appendChild(opt);
          });
        });
    }

    /* ── Load parent cost centers (excluding current record) ─────────── */
    function _loadParents(excludeId) {
      var url = BASE_URL + '/parents/all?excludeId=' + (excludeId || 0);
      secureFetch(url)
        .then(function (data) {
          var sel = document.getElementById('ccParentId');
          while (sel.options.length > 1) sel.remove(1);
          (data || []).forEach(function (c) {
            var opt = document.createElement('option');
            opt.value       = c.id;
            opt.textContent = c.name + ' (' + c.code + ')';
            sel.appendChild(opt);
          });
        });
    }

    /* ── Open modal for CREATE ───────────────────────────────────────── */
    window.ccOpenCreate = function () {
      _editingId = null;
      _resetForm();
      _loadParents(0);
      document.getElementById('ccModalTitle').innerHTML =
        '<i class="fa fa-plus me-1 text-success"></i> Add Cost Center';
      document.getElementById('ccBtnText').textContent = 'Save';
      bootstrap.Modal.getOrCreateInstance(document.getElementById('ccModal')).show();
    };

    /* ── View ────────────────────────────────────────────────────────── */
    window.ccShow = function (id) {
      secureFetch(BASE_URL + '/show/' + id)
        .then(function (res) {
          if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
          var o = res.obj.defaultData;
          _setText('cv_code',         o.costCenterCode);
          _setText('cv_name',         o.costCenterName);
          _setText('cv_type',         o.costCenterType || '—');
          _setText('cv_bu',           o.businessUnitName);
          _setText('cv_parent',       o.parentCostCenterName || '—');
          _setText('cv_managerName',  o.managerName);
          _setText('cv_managerEmail', o.managerEmail);
          _setText('cv_desc',         o.description);
          _setText('cv_createdAt',    o.createdAt);
          _setText('cv_updatedBy',    o.updatedBy);
          document.getElementById('cv_status').innerHTML = o.active
            ? "<span class='badge bg-success'>Active</span>"
            : "<span class='badge bg-danger'>Inactive</span>";
          bootstrap.Modal.getOrCreateInstance(document.getElementById('ccViewModal')).show();
        });
    };

    /* ── Edit ────────────────────────────────────────────────────────── */
    window.ccEdit = function (id) {
      secureFetch(BASE_URL + '/show/' + id)
        .then(function (res) {
          if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
          var o = res.obj.defaultData;
          _editingId = o.id;
          _resetForm();
          _loadParents(o.id);
          _val('ccId',           o.id);
          _val('ccCode',         o.costCenterCode);
          _val('ccName',         o.costCenterName);
          _val('ccDesc',         o.description || '');
          _val('ccManagerName',  o.managerName  || '');
          _val('ccManagerEmail', o.managerEmail || '');
          document.getElementById('ccBuId').value    = o.businessUnitId    || '';
          document.getElementById('ccType').value    = o.costCenterType    || '';
          document.getElementById('ccActive').checked = o.active;
          /* parent is set after _loadParents resolves — handled via timeout */
          setTimeout(function () {
            document.getElementById('ccParentId').value = o.parentCostCenterId || '';
          }, 300);
          document.getElementById('ccModalTitle').innerHTML =
            '<i class="fa fa-pencil me-1 text-warning"></i> Edit Cost Center';
          document.getElementById('ccBtnText').textContent = 'Update';
          bootstrap.Modal.getOrCreateInstance(document.getElementById('ccModal')).show();
        });
    };

    /* ── Toggle status ───────────────────────────────────────────────── */
    window.ccToggle = function (id) {
      hsChangeStatus(BASE_URL + '/toggle/' + id, dt, 'Cost Center');
    };

    /* ── Delete ──────────────────────────────────────────────────────── */
    window.ccDelete = function (id) {
      hsConfirmDelete(BASE_URL + '/delete/' + id, dt);
    };

    /* ── Form submit (create / update) ──────────────────────────────── */
    function _onSubmit(e) {
      e.preventDefault();
      var sb = document.getElementById('ccSubmitBtn');
      var sp = document.getElementById('ccSpinner');
      var bt = document.getElementById('ccBtnText');
      hsDisableButton(sb, sp, bt);

      var payload = {
        id                 : document.getElementById('ccId').value || null,
        businessUnitId     : document.getElementById('ccBuId').value,
        costCenterCode     : document.getElementById('ccCode').value,
        costCenterName     : document.getElementById('ccName').value,
        costCenterType     : document.getElementById('ccType').value || null,
        parentCostCenterId : document.getElementById('ccParentId').value || null,
        managerName        : document.getElementById('ccManagerName').value,
        managerEmail       : document.getElementById('ccManagerEmail').value,
        description        : document.getElementById('ccDesc').value,
        active             : document.getElementById('ccActive').checked
      };

      secureFetch(BASE_URL + '/save', { method: 'POST', body: JSON.stringify(payload) })
        .then(function (d) {
          if (d.success) {
            Swal.fire({ icon: 'success', title: 'Saved!', text: d.message, timer: 1600, showConfirmButton: false });
            bootstrap.Modal.getOrCreateInstance(document.getElementById('ccModal')).hide();
            dt.ajax.reload(null, false);
          } else {
            Swal.fire('Error', d.message, 'error');
          }
        })
        .catch(function (err) { Swal.fire('Error', err.message || 'Request failed.', 'error'); })
        .finally(function () { hsEnableButton(sb, sp, bt); });
    }

    /* ── Helpers ─────────────────────────────────────────────────────── */
    function _resetForm() {
      document.getElementById('ccForm').reset();
      document.getElementById('ccId').value      = '';
      document.getElementById('ccActive').checked = true;
      _editingId = null;
    }
    function _val(id, v)     { var e = document.getElementById(id); if (e) e.value       = v || ''; }
    function _setText(id, v) { var e = document.getElementById(id); if (e) e.textContent = v || '—'; }

  })();
  </script>

</section>
</html>
