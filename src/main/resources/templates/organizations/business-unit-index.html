<!DOCTYPE html>
<!--
  organization/business-unit-index.html
  URL : GET /business-units

  JS fn → endpoint:
    buShow(id)   GET    /business-units/show/{id}
    buEdit(id)   GET    /business-units/show/{id}
    buToggle(id) POST   /business-units/toggle/{id}
    buDelete(id) DELETE /business-units/delete/{id}
    (save)       POST   /business-units/save

  DataTable columns must match BusinessUnitService.datatableList() row-map keys:
    sl, code, name, organization_name, description, status, created_at, actions
-->
<html th:replace="~{layout/base :: layout('Business Units', ~{::section})}" xmlns:th="http://www.thymeleaf.org">

<section>

  <!-- Breadcrumb -->
  <ol class="breadcrumb float-xl-end">
    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Home</a></li>
    <li class="breadcrumb-item">Organisation</li>
    <li class="breadcrumb-item active">Business Units</li>
  </ol>
  <h1 class="page-header">Business Units <small>manage operational units per organisation</small></h1>

  <!-- ═══════════════════════════════════════════════════════════ PANEL -->
  <div class="panel panel-inverse">

    <div class="panel-heading">
      <div class="panel-title">
        <a href="javascript:;" onclick="buOpenCreate()">
          <span class="badge btn btn-outline-success">
            <i class="fa fa-plus me-1"></i> Add Business Unit
          </span>
        </a>
      </div>
      <div class="panel-heading-btn">
        <a href="javascript:;" class="btn btn-sm btn-icon btn-default" data-toggle="panel-expand"><i class="fa fa-expand"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-success" data-toggle="panel-reload"><i class="fa fa-redo"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-warning" data-toggle="panel-collapse"><i class="fa fa-minus"></i></a>
      </div>
    </div>

    <div class="panel-body">
      <table id="buTable" width="100%"
             class="table table-striped table-bordered align-middle text-nowrap">
        <thead>
          <tr>
            <th width="1%">SL</th>
            <th>Code</th>
            <th>Name</th>
            <th>Organisation</th>
            <th>Description</th>
            <th class="text-center" width="7%">Status</th>
            <th>Created At</th>
            <th class="text-center" width="12%">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- ═══════════════════════════════════════════ CREATE / EDIT MODAL -->
    <div tabindex="-1" id="buModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="buModalTitle">
              <i class="fa fa-briefcase me-1 text-success"></i> Add Business Unit
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="buForm" novalidate>
            <div class="modal-body">
              <div class="hs-box">
                <div class="row g-2">
                  <input type="hidden" id="buId">

                  <!-- Organisation -->
                  <div class="col-md-12 view-group">
                    <select id="buOrgId" class="form-select hs_span_view hsSelectTwo" required>
                      <option value="">— Select Organisation —</option>
                    </select>
                    <label for="buOrgId" class="input-label">
                      Organisation <span class="text-danger">*</span>
                    </label>
                  </div>

                  <!-- Code -->
                  <div class="col-md-4 view-group">
                    <input id="buCode" type="text" placeholder="e.g. DHAKA"
                           class="form-control hs_span_view text-uppercase"
                           required maxlength="50">
                    <label for="buCode" class="input-label">
                      Code <span class="text-danger">*</span>
                    </label>
                  </div>

                  <!-- Name -->
                  <div class="col-md-8 view-group">
                    <input id="buName" type="text" placeholder="Business Unit Name"
                           class="form-control hs_span_view"
                           required maxlength="200">
                    <label for="buName" class="input-label">
                      Name <span class="text-danger">*</span>
                    </label>
                  </div>

                  <!-- Description -->
                  <div class="col-md-12 view-group">
                    <textarea id="buDesc" class="form-control hs_span_view"
                              rows="2" placeholder="Optional description…"
                              maxlength="1000"></textarea>
                    <label for="buDesc" class="input-label">Description</label>
                  </div>

                  <!-- Active toggle -->
                  <div class="col-md-12 mt-1">
                    <div class="form-check form-switch">
                      <input type="checkbox" id="buActive" class="form-check-input" checked>
                      <label class="form-check-label" for="buActive"><strong>Active</strong></label>
                    </div>
                  </div>

                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-success" type="submit" id="buSubmitBtn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="buSpinner"></span>
                <span id="buBtnText">Save</span>
              </button>
              <button type="button" class="btn btn-white" data-bs-dismiss="modal">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════ VIEW MODAL -->
    <div tabindex="-1" id="buViewModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">
              <i class="fa fa-briefcase me-1 text-primary"></i> Business Unit Details
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="hs-box">
              <div class="row g-2">
                <div class="col-md-4 view-group">
                  <label class="view-label">Code</label>
                  <span id="bv_code" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-8 view-group">
                  <label class="view-label">Name</label>
                  <span id="bv_name" class="form-control hs_span_show"></span>
                </div>
                <div class="col-12 view-group">
                  <label class="view-label">Organisation</label>
                  <span id="bv_org" class="form-control hs_span_show"></span>
                </div>
                <div class="col-12 view-group">
                  <label class="view-label">Description</label>
                  <span id="bv_desc" class="form-control hs_span_show" style="min-height:38px"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Status</label>
                  <span id="bv_status" class="form-control hs_span_show" style="min-height:38px"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Created At</label>
                  <span id="bv_createdAt" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Updated By</label>
                  <span id="bv_updatedBy" class="form-control hs_span_show"></span>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-white" data-bs-dismiss="modal">
              <i class="fa fa-times me-1"></i> Close
            </button>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /panel -->


  <!-- ═══════════════════════════════════════════════════════════ SCRIPT -->
  <script th:inline="none">
  (function () {
    'use strict';

    const BASE_URL = '/business-units';
    var dt;

    /* ── DataTable init ──────────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', function () {

      dt = $('#buTable').DataTable({
        processing : true,
        serverSide : true,
        responsive : true,
        pageLength : 25,
        ajax       : { url: BASE_URL + '/list', type: 'GET' },
        columns    : [
          { data: 'sl',                orderable: false, width: '40px' },
          { data: 'code' },
          { data: 'name' },
          { data: 'organization_name', defaultContent: '' },
          { data: 'description',       defaultContent: '' },
          { data: 'status',            orderable: false, className: 'text-center' },
          { data: 'created_at',        defaultContent: '' },
          { data: 'actions',           orderable: false, className: 'text-center' }
        ],
        language: {
          emptyTable : 'No business units found.',
          processing : '<span class="spinner-border spinner-border-sm me-2"></span> Loading…'
        }
      });

      _loadOrgs();
      document.getElementById('buForm').addEventListener('submit', _onSubmit);
    });

    /* ── Load organisation dropdown ──────────────────────────────────── */
    function _loadOrgs() {
      secureFetch(BASE_URL + '/organizations/all')
        .then(function (data) {
          var sel = document.getElementById('buOrgId');
          /* clear existing options except placeholder */
          while (sel.options.length > 1) sel.remove(1);
          data.forEach(function (o) {
            var opt = document.createElement('option');
            opt.value       = o.id;
            opt.textContent = o.name + ' (' + o.code + ')';
            sel.appendChild(opt);
          });
        });
    }

    /* ── Open modal for CREATE ───────────────────────────────────────── */
    window.buOpenCreate = function () {
      _resetForm();
      document.getElementById('buModalTitle').innerHTML =
        '<i class="fa fa-plus me-1 text-success"></i> Add Business Unit';
      document.getElementById('buBtnText').textContent = 'Save';
      bootstrap.Modal.getOrCreateInstance(document.getElementById('buModal')).show();
    };

    /* ── View ────────────────────────────────────────────────────────── */
    window.buShow = function (id) {
      secureFetch(BASE_URL + '/show/' + id)
        .then(function (res) {
          if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
          var o = res.obj.defaultData;
          _setText('bv_code',      o.code);
          _setText('bv_name',      o.name);
          _setText('bv_org',       o.organizationName);
          _setText('bv_desc',      o.description);
          _setText('bv_createdAt', o.createdAt);
          _setText('bv_updatedBy', o.updatedBy);
          document.getElementById('bv_status').innerHTML = o.active
            ? "<span class='badge bg-success'>Active</span>"
            : "<span class='badge bg-danger'>Inactive</span>";
          bootstrap.Modal.getOrCreateInstance(document.getElementById('buViewModal')).show();
        });
    };

    /* ── Edit ────────────────────────────────────────────────────────── */
    window.buEdit = function (id) {
      secureFetch(BASE_URL + '/show/' + id)
        .then(function (res) {
          if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
          var o = res.obj.defaultData;
          _resetForm();
          _val('buId',   o.id);
          _val('buCode', o.code);
          _val('buName', o.name);
          _val('buDesc', o.description || '');
          document.getElementById('buOrgId').value    = o.organizationId || '';
          document.getElementById('buActive').checked = o.active;
          document.getElementById('buModalTitle').innerHTML =
            '<i class="fa fa-pencil me-1 text-warning"></i> Edit Business Unit';
          document.getElementById('buBtnText').textContent = 'Update';
          bootstrap.Modal.getOrCreateInstance(document.getElementById('buModal')).show();
        });
    };

    /* ── Toggle status ───────────────────────────────────────────────── */
    window.buToggle = function (id) {
      hsChangeStatus(BASE_URL + '/toggle/' + id, dt, 'Business Unit');
    };

    /* ── Delete ──────────────────────────────────────────────────────── */
    window.buDelete = function (id) {
      hsConfirmDelete(BASE_URL + '/delete/' + id, dt);
    };

    /* ── Form submit (create / update) ──────────────────────────────── */
    function _onSubmit(e) {
      e.preventDefault();
      var sb = document.getElementById('buSubmitBtn');
      var sp = document.getElementById('buSpinner');
      var bt = document.getElementById('buBtnText');
      hsDisableButton(sb, sp, bt);

      var payload = {
        id             : document.getElementById('buId').value || null,
        organizationId : document.getElementById('buOrgId').value,
        code           : document.getElementById('buCode').value,
        name           : document.getElementById('buName').value,
        description    : document.getElementById('buDesc').value,
        active         : document.getElementById('buActive').checked
      };

      secureFetch(BASE_URL + '/save', { method: 'POST', body: JSON.stringify(payload) })
        .then(function (d) {
          if (d.success) {
            Swal.fire({ icon: 'success', title: 'Saved!', text: d.message, timer: 1600, showConfirmButton: false });
            bootstrap.Modal.getOrCreateInstance(document.getElementById('buModal')).hide();
            dt.ajax.reload(null, false);
          } else {
            Swal.fire('Error', d.message, 'error');
          }
        })
        .catch(function (err) { Swal.fire('Error', err.message || 'Request failed.', 'error'); })
        .finally(function () { hsEnableButton(sb, sp, bt); });
    }

    /* ── Helpers ─────────────────────────────────────────────────────── */
    function _resetForm() {
      document.getElementById('buForm').reset();
      document.getElementById('buId').value         = '';
      document.getElementById('buActive').checked   = true;
    }
    function _val(id, v)  { var e = document.getElementById(id); if (e) e.value       = v || ''; }
    function _setText(id, v) { var e = document.getElementById(id); if (e) e.textContent = v || '—'; }

  })();
  </script>

</section>
</html>
