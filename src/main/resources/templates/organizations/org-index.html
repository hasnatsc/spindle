<!DOCTYPE html>
<!--
  organizations/org-index.html
  URL : GET /organizations

  JS fn → endpoint:
    orgShow(id)   GET    /organizations/show/{id}
    orgEdit(id)   GET    /organizations/show/{id}
    orgToggle(id) POST   /organizations/toggle/{id}
    orgDelete(id) DELETE /organizations/delete/{id}
    (save)        POST   /organizations/save

  DataTable columns must match OrganizationController.list() row-map keys:
    sl, code, name, name_bn, email, phone, country, status, created_at, actions
-->
<html th:replace="~{layout/base :: layout('Organizations', ~{::section})}" xmlns:th="http://www.thymeleaf.org">

<section>

  <!-- Breadcrumb -->
  <ol class="breadcrumb float-xl-end">
    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Home</a></li>
    <li class="breadcrumb-item">Organisation</li>
    <li class="breadcrumb-item active">Organizations</li>
  </ol>
  <h1 class="page-header">Organizations <small>manage company / group entities</small></h1>

  <!-- ═══════════════════════════════════════════════════════════ PANEL -->
  <div class="panel panel-inverse">

    <div class="panel-heading">
      <div class="panel-title">
        <a href="javascript:;" onclick="orgOpenCreate()">
          <span class="badge btn btn-outline-success">
            <i class="fa fa-plus me-1"></i> Add Organization
          </span>
        </a>
      </div>
      <div class="panel-heading-btn">
        <a href="javascript:;" class="btn btn-sm btn-icon btn-default" data-toggle="panel-expand"><i class="fa fa-expand"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-success" data-toggle="panel-reload"><i class="fa fa-redo"></i></a>
        <a href="javascript:;" class="btn btn-sm btn-icon btn-warning" data-toggle="panel-collapse"><i class="fa fa-minus"></i></a>
      </div>
    </div>

    <div class="panel-body">
      <table id="orgTable" width="100%"
             class="table table-striped table-bordered align-middle text-nowrap">
        <thead>
          <tr>
            <th width="1%">SL</th>
            <th>Code</th>
            <th>Name</th>
            <th>Name (BN)</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Country</th>
            <th class="text-center" width="7%">Status</th>
            <th>Created At</th>
            <th class="text-center" width="12%">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- ═══════════════════════════════════════════ CREATE / EDIT MODAL -->
    <div tabindex="-1" id="orgModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="orgModalTitle">
              <i class="fa fa-building me-1 text-success"></i> Add Organization
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="orgForm" novalidate>
            <div class="modal-body">
              <div class="hs-box">
                <div class="row g-2">
                  <input type="hidden" id="orgId">

                  <!-- Code -->
                  <div class="col-md-3 view-group">
                    <input id="orgCode" type="text" placeholder="e.g. HASNAT"
                           class="form-control hs_span_view text-uppercase"
                           required maxlength="50">
                    <label for="orgCode" class="input-label">Code <span class="text-danger">*</span></label>
                  </div>

                  <!-- Name -->
                  <div class="col-md-5 view-group">
                    <input id="orgName" type="text" placeholder="Organization Name"
                           class="form-control hs_span_view" required maxlength="200">
                    <label for="orgName" class="input-label">Name <span class="text-danger">*</span></label>
                  </div>

                  <!-- Name BN -->
                  <div class="col-md-4 view-group">
                    <input id="orgNameBn" type="text" placeholder="নাম (বাংলা)"
                           class="form-control hs_span_view" maxlength="200">
                    <label for="orgNameBn" class="input-label">Name (Bangla)</label>
                  </div>

                  <!-- About -->
                  <div class="col-md-12 view-group">
                    <textarea id="orgAbout" class="form-control hs_span_view"
                              rows="2" placeholder="About the organization…"></textarea>
                    <label for="orgAbout" class="input-label">About</label>
                  </div>

                  <!-- Address -->
                  <div class="col-md-12 view-group">
                    <textarea id="orgAddress" class="form-control hs_span_view"
                              rows="2" placeholder="Full address…"></textarea>
                    <label for="orgAddress" class="input-label">Address</label>
                  </div>

                  <!-- City / State / Country / Postal -->
                  <div class="col-md-3 view-group">
                    <input id="orgCity" type="text" placeholder="City"
                           class="form-control hs_span_view" maxlength="100">
                    <label for="orgCity" class="input-label">City</label>
                  </div>
                  <div class="col-md-3 view-group">
                    <input id="orgState" type="text" placeholder="State / Division"
                           class="form-control hs_span_view" maxlength="100">
                    <label for="orgState" class="input-label">State</label>
                  </div>
                  <div class="col-md-3 view-group">
                    <input id="orgCountry" type="text" placeholder="Country"
                           class="form-control hs_span_view" maxlength="100">
                    <label for="orgCountry" class="input-label">Country</label>
                  </div>
                  <div class="col-md-3 view-group">
                    <input id="orgPostalCode" type="text" placeholder="Postal Code"
                           class="form-control hs_span_view" maxlength="20">
                    <label for="orgPostalCode" class="input-label">Postal Code</label>
                  </div>

                  <!-- Phone / Email / Website -->
                  <div class="col-md-4 view-group">
                    <input id="orgPhone" type="text" placeholder="+880 1x xx xx xxxx"
                           class="form-control hs_span_view" maxlength="20">
                    <label for="orgPhone" class="input-label">Phone</label>
                  </div>
                  <div class="col-md-4 view-group">
                    <input id="orgEmail" type="email" placeholder="info@company.com"
                           class="form-control hs_span_view" maxlength="100">
                    <label for="orgEmail" class="input-label">Email</label>
                  </div>
                  <div class="col-md-4 view-group">
                    <input id="orgWebsite" type="text" placeholder="https://www.company.com"
                           class="form-control hs_span_view" maxlength="255">
                    <label for="orgWebsite" class="input-label">Website</label>
                  </div>

                  <!-- Tax / VAT / BIN -->
                  <div class="col-md-4 view-group">
                    <input id="orgTaxId" type="text" placeholder="TIN / Tax ID"
                           class="form-control hs_span_view" maxlength="50">
                    <label for="orgTaxId" class="input-label">Tax ID</label>
                  </div>
                  <div class="col-md-4 view-group">
                    <input id="orgVatNo" type="text" placeholder="VAT Number"
                           class="form-control hs_span_view" maxlength="50">
                    <label for="orgVatNo" class="input-label">VAT No.</label>
                  </div>
                  <div class="col-md-4 view-group">
                    <input id="orgBinNo" type="text" placeholder="BIN Number"
                           class="form-control hs_span_view" maxlength="50">
                    <label for="orgBinNo" class="input-label">BIN No.</label>
                  </div>

                  <!-- Active toggle -->
                  <div class="col-md-12 mt-1">
                    <div class="form-check form-switch">
                      <input type="checkbox" id="orgActive" class="form-check-input" checked>
                      <label class="form-check-label" for="orgActive"><strong>Active</strong></label>
                    </div>
                  </div>

                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-success" type="submit" id="orgSubmitBtn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="orgSpinner"></span>
                <span id="orgBtnText">Save</span>
              </button>
              <button type="button" class="btn btn-white" data-bs-dismiss="modal">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════ VIEW MODAL -->
    <div tabindex="-1" id="orgViewModal" class="modal fade">
      <div class="modal-dialog modal-dialog-centered modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">
              <i class="fa fa-building me-1 text-primary"></i> Organization Details
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="hs-box">
              <div class="row g-2">
                <div class="col-md-3 view-group">
                  <label class="view-label">Code</label>
                  <span id="ov_code" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-5 view-group">
                  <label class="view-label">Name</label>
                  <span id="ov_name" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Name (Bangla)</label>
                  <span id="ov_nameBn" class="form-control hs_span_show"></span>
                </div>
                <div class="col-12 view-group">
                  <label class="view-label">About</label>
                  <span id="ov_about" class="form-control hs_span_show" style="min-height:38px"></span>
                </div>
                <div class="col-12 view-group">
                  <label class="view-label">Address</label>
                  <span id="ov_address" class="form-control hs_span_show" style="min-height:38px"></span>
                </div>
                <div class="col-md-3 view-group">
                  <label class="view-label">City</label>
                  <span id="ov_city" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-3 view-group">
                  <label class="view-label">State</label>
                  <span id="ov_state" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-3 view-group">
                  <label class="view-label">Country</label>
                  <span id="ov_country" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-3 view-group">
                  <label class="view-label">Postal Code</label>
                  <span id="ov_postalCode" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Phone</label>
                  <span id="ov_phone" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Email</label>
                  <span id="ov_email" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Website</label>
                  <span id="ov_website" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Tax ID</label>
                  <span id="ov_taxId" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">VAT No.</label>
                  <span id="ov_vatNo" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">BIN No.</label>
                  <span id="ov_binNo" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Status</label>
                  <span id="ov_status" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Created At</label>
                  <span id="ov_createdAt" class="form-control hs_span_show"></span>
                </div>
                <div class="col-md-4 view-group">
                  <label class="view-label">Updated By</label>
                  <span id="ov_updatedBy" class="form-control hs_span_show"></span>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-white" data-bs-dismiss="modal">
              <i class="fa fa-times me-1"></i> Close
            </button>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /panel -->


  <!-- ═══════════════════════════════════════════════════════════ SCRIPT -->
  <script th:inline="none">
  (function () {
    'use strict';

    const BASE_URL = '/organizations';
    var dt;

    /* ── DataTable init ──────────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', function () {

      dt = $('#orgTable').DataTable({
        processing : true,
        serverSide : true,
        responsive : true,
        pageLength : 25,
        ajax       : { url: BASE_URL + '/list', type: 'GET' },
        columns    : [
          { data: 'sl',         orderable: false, width: '40px' },
          { data: 'code' },
          { data: 'name' },
          { data: 'name_bn',    defaultContent: '—' },
          { data: 'email',      defaultContent: '—' },
          { data: 'phone',      defaultContent: '—' },
          { data: 'country',    defaultContent: '—' },
          { data: 'status',     orderable: false, className: 'text-center' },
          { data: 'created_at', defaultContent: '—' },
          { data: 'actions',    orderable: false, className: 'text-center' }
        ],
        language: {
          emptyTable : 'No organizations found.',
          processing : '<span class="spinner-border spinner-border-sm me-2"></span> Loading…'
        }
      });

      document.getElementById('orgForm').addEventListener('submit', _onSubmit);
    });

    /* ── Open modal for CREATE ───────────────────────────────────────── */
    window.orgOpenCreate = function () {
      _resetForm();
      document.getElementById('orgModalTitle').innerHTML =
        '<i class="fa fa-plus me-1 text-success"></i> Add Organization';
      document.getElementById('orgBtnText').textContent = 'Save';
      bootstrap.Modal.getOrCreateInstance(document.getElementById('orgModal')).show();
    };

    /* ── View ────────────────────────────────────────────────────────── */
    window.orgShow = function (id) {
      secureFetch(BASE_URL + '/show/' + id)
        .then(function (res) {
          if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
          var o = res.obj.defaultData;
          _setText('ov_code',       o.code);
          _setText('ov_name',       o.name);
          _setText('ov_nameBn',     o.nameBn);
          _setText('ov_about',      o.about);
          _setText('ov_address',    o.address);
          _setText('ov_city',       o.city);
          _setText('ov_state',      o.state);
          _setText('ov_country',    o.country);
          _setText('ov_postalCode', o.postalCode);
          _setText('ov_phone',      o.phone);
          _setText('ov_email',      o.email);
          _setText('ov_website',    o.website);
          _setText('ov_taxId',      o.taxId);
          _setText('ov_vatNo',      o.vatNo);
          _setText('ov_binNo',      o.binNo);
          _setText('ov_createdAt',  o.createdAt);
          _setText('ov_updatedBy',  o.updatedBy);
          document.getElementById('ov_status').innerHTML = o.active
            ? "<span class='badge bg-success'>Active</span>"
            : "<span class='badge bg-danger'>Inactive</span>";
          bootstrap.Modal.getOrCreateInstance(document.getElementById('orgViewModal')).show();
        });
    };

    /* ── Edit ────────────────────────────────────────────────────────── */
    window.orgEdit = function (id) {
      secureFetch(BASE_URL + '/show/' + id)
        .then(function (res) {
          if (!res.success) { Swal.fire('Error', res.message, 'error'); return; }
          var o = res.obj.defaultData;
          _resetForm();
          _val('orgId',         o.id);
          _val('orgCode',       o.code);
          _val('orgName',       o.name);
          _val('orgNameBn',     o.nameBn);
          _val('orgAbout',      o.about);
          _val('orgAddress',    o.address);
          _val('orgCity',       o.city);
          _val('orgState',      o.state);
          _val('orgCountry',    o.country);
          _val('orgPostalCode', o.postalCode);
          _val('orgPhone',      o.phone);
          _val('orgEmail',      o.email);
          _val('orgWebsite',    o.website);
          _val('orgTaxId',      o.taxId);
          _val('orgVatNo',      o.vatNo);
          _val('orgBinNo',      o.binNo);
          document.getElementById('orgActive').checked = o.active;
          document.getElementById('orgModalTitle').innerHTML =
            '<i class="fa fa-pencil me-1 text-warning"></i> Edit Organization';
          document.getElementById('orgBtnText').textContent = 'Update';
          bootstrap.Modal.getOrCreateInstance(document.getElementById('orgModal')).show();
        });
    };

    /* ── Toggle status ───────────────────────────────────────────────── */
    window.orgToggle = function (id) {
      hsChangeStatus(BASE_URL + '/toggle/' + id, dt, 'Organization');
    };

    /* ── Delete ──────────────────────────────────────────────────────── */
    window.orgDelete = function (id) {
      hsConfirmDelete(BASE_URL + '/delete/' + id, dt);
    };

    /* ── Form submit (create / update) ──────────────────────────────── */
    function _onSubmit(e) {
      e.preventDefault();
      var sb = document.getElementById('orgSubmitBtn');
      var sp = document.getElementById('orgSpinner');
      var bt = document.getElementById('orgBtnText');
      hsDisableButton(sb, sp, bt);

      var payload = {
        id          : document.getElementById('orgId').value || null,
        code        : document.getElementById('orgCode').value,
        name        : document.getElementById('orgName').value,
        nameBn      : document.getElementById('orgNameBn').value,
        about       : document.getElementById('orgAbout').value,
        address     : document.getElementById('orgAddress').value,
        city        : document.getElementById('orgCity').value,
        state       : document.getElementById('orgState').value,
        country     : document.getElementById('orgCountry').value,
        postalCode  : document.getElementById('orgPostalCode').value,
        phone       : document.getElementById('orgPhone').value,
        email       : document.getElementById('orgEmail').value,
        website     : document.getElementById('orgWebsite').value,
        taxId       : document.getElementById('orgTaxId').value,
        vatNo       : document.getElementById('orgVatNo').value,
        binNo       : document.getElementById('orgBinNo').value,
        active      : document.getElementById('orgActive').checked
      };

      secureFetch(BASE_URL + '/save', { method: 'POST', body: JSON.stringify(payload) })
        .then(function (d) {
          if (d.success) {
            Swal.fire({ icon: 'success', title: 'Saved!', text: d.message, timer: 1600, showConfirmButton: false });
            bootstrap.Modal.getOrCreateInstance(document.getElementById('orgModal')).hide();
            dt.ajax.reload(null, false);
          } else {
            Swal.fire('Error', d.message, 'error');
          }
        })
        .catch(function (err) { Swal.fire('Error', err.message || 'Request failed.', 'error'); })
        .finally(function () { hsEnableButton(sb, sp, bt); });
    }

    /* ── Helpers ─────────────────────────────────────────────────────── */
    function _resetForm() {
      document.getElementById('orgForm').reset();
      document.getElementById('orgId').value      = '';
      document.getElementById('orgActive').checked = true;
    }
    function _val(id, v)     { var e = document.getElementById(id); if (e) e.value       = v || ''; }
    function _setText(id, v) { var e = document.getElementById(id); if (e) e.textContent = v || '—'; }

  })();
  </script>

</section>
</html>
