spring.application.name=spindle


# ============================================================================
# DATABASE (PostgreSQL + Hikari)
# Use ENV variables in production instead of hard-coding values
# ============================================================================

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/spindle}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:asg2020}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.pool-name=SpindleserpHikariPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true

# ============================================================================
# JPA / HIBERNATE
# ============================================================================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true

# ============================================================================
# SPRING SESSION (JDBC-backed — stores sessions in PostgreSQL)
# ============================================================================
#
# FIX 1 — initialize-schema must be NEVER after first run.
#
#   "always" means Spring drops and recreates SPRING_SESSION and
#   SPRING_SESSION_ATTRIBUTES on every application startup.
#   This deletes every live session in the database. When the server
#   restarts and a user's browser still has the old JSESSIONID cookie,
#   there is no matching row → Spring Session cannot find the session →
#   the request is treated as unauthenticated → "session expired".
#
#   Set to "never" once the tables exist (they are auto-created on first
#   run with "always"). Flyway migration V1 also creates them explicitly,
#   so "never" is safe from the first deployment onward.
#
#   If you need to start fresh: truncate SPRING_SESSION manually.
#   Do NOT use "always" in a running application.
#
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.jdbc.table-name=SPRING_SESSION

# FIX 2 — Use ONE timeout, defined here only.
#
#   Two timeout settings existed:
#     server.servlet.session.timeout=30m  ← servlet container timeout
#     spring.session.timeout=30m          ← Spring Session JDBC timeout
#
#   These are two separate mechanisms. The servlet container manages
#   the HttpSession object in memory; Spring Session JDBC manages the
#   persistent row in PostgreSQL. When BOTH are set, the servlet container
#   can invalidate the in-memory session independently of the JDBC row,
#   causing a mismatch that appears as "session expired" even when the
#   JDBC row still exists.
#
#   With Spring Session active (store-type=jdbc), the servlet container
#   session is replaced entirely by the Spring Session implementation.
#   Only spring.session.timeout should be set. Remove server.servlet.session.timeout.
#
spring.session.timeout=30m

# FIX 3 — Pin the session cookie name explicitly.
#
#   Spring Session already defaults to a cookie named "SESSION" (not the
#   servlet container's "JSESSIONID") whenever store-type=jdbc is active.
#   That implicit default was the root cause of a real bug: SecurityConfig's
#   logout handler was calling deleteCookies("JSESSIONID", ...) — deleting a
#   cookie that never existed — so the browser kept the real "SESSION"
#   cookie after every logout. The next request (including the next login)
#   then carried a cookie pointing at a row that invalidateHttpSession(true)
#   had already deleted, producing exactly the "session expired on first
#   login" symptom. Setting this explicitly removes the ambiguity for good —
#   keep it in sync with SecurityConfig's .deleteCookies("SESSION", ...) call.
#
server.servlet.session.cookie.name=SESSION

# ============================================================================
# THYMELEAF
# ============================================================================

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML


# ============================================================================
# LOGGING  (tune per environment)
# ============================================================================

logging.level.root=WARN
logging.level.com.asg.spindleserp=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN