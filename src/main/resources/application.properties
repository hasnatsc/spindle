spring.application.name=spindle


# ============================================================================
# DATABASE (PostgreSQL + Hikari)
# Use ENV variables in production instead of hard-coding values
# ============================================================================

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/spindle}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:asg2020}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.pool-name=SpindleserpHikariPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true

# ============================================================================
# JPA / HIBERNATE
# ============================================================================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true